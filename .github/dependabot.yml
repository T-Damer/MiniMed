version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      javascript-minor-and-patch:
        update-types:
- minor
- patch
    ignore:
      - dependency-name: typescript
        update-types:
- version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
- "*"
  - package-ecosystem: pip
    directory: /tools/ingest
    schedule:
      interval: weekly
