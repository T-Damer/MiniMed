name: One-shot format compact query taxonomy

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-format-compact-taxonomy.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: uv run --project tools/ingest ruff format tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py
      - run: rm .github/workflows/one-shot-format-compact-taxonomy.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py .github/workflows/one-shot-format-compact-taxonomy.yml
          git commit -m "style(benchmarks): format compact query taxonomy"
          git push origin HEAD:agent/clinical-query-benchmark
