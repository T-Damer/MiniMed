name: One-shot clinical benchmark formatter

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-format-clinical-benchmark.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: >-
          uv run --project tools/ingest ruff format
          tools/ingest/src/localmed_ingest/clinical_queries.py
          tools/ingest/tests/test_clinical_queries.py
          tools/ingest/src/localmed_ingest/cli.py
      - run: >-
          uv run --project tools/ingest ruff check --fix
          tools/ingest/src/localmed_ingest/clinical_queries.py
          tools/ingest/tests/test_clinical_queries.py
          tools/ingest/src/localmed_ingest/cli.py
      - run: rm .github/workflows/one-shot-format-clinical-benchmark.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ingest/src/localmed_ingest/clinical_queries.py tools/ingest/tests/test_clinical_queries.py tools/ingest/src/localmed_ingest/cli.py .github/workflows/one-shot-format-clinical-benchmark.yml
          git commit -m "style(benchmarks): apply Ruff formatting"
          git push origin HEAD:agent/clinical-query-benchmark
