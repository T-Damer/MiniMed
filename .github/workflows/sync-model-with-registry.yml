name: Sync model branch with merged registry

on:
  push:
    branches: [agent/local-model-auto-selection]
    paths:
      - .github/workflows/sync-model-with-registry.yml

permissions:
  contents: write

concurrency:
  group: sync-model-with-registry
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - name: Merge current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-ff --no-commit origin/main
          rm -f .github/workflows/sync-model-with-registry.yml
          git add -A
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Verify combined tree
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm verify
      - name: Commit synchronized branch
        shell: bash
        run: |
          set -euo pipefail
          git commit -m 'Merge main into agent/local-model-auto-selection'
          git push origin HEAD:agent/local-model-auto-selection
