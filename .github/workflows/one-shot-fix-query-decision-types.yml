name: One-shot fix query decision literal types

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-fix-query-decision-types.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py')
          text = path.read_text(encoding='utf-8')
          old = '''        secondary = [
            decision for decision in ranked[1:] if scores[decision] >= max(2, top_score - 1)
        ][:3]
        matched_signals = [
            f"{decision}:{label}"
            for decision in [primary, *secondary]
            for label in signals_by_decision[decision]
        ]
'''
          new = '''        secondary_candidates: list[DecisionKind] = []
        for decision in ranked[1:]:
            if scores[decision] >= max(2, top_score - 1):
                secondary_candidates.append(decision)
        secondary = secondary_candidates[:3]
        ordered_decisions: list[DecisionKind] = [primary]
        ordered_decisions.extend(secondary)
        matched_signals = [
            f"{decision}:{label}"
            for decision in ordered_decisions
            for label in signals_by_decision[decision]
        ]
'''
          if old not in text:
              raise SystemExit('expected decision block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - run: >-
          uv run --project tools/ingest ruff format
          tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py
      - run: >-
          uv run --project tools/ingest ruff check
          tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py
          tools/ingest/src/localmed_ingest/clinical_query_annotations.py
          tools/ingest/tests/test_clinical_query_annotations.py
      - run: uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
      - run: rm .github/russian-query-pyright.txt .github/workflows/one-shot-fix-query-decision-types.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py .github/russian-query-pyright.txt .github/workflows/one-shot-fix-query-decision-types.yml
          git commit -m "fix(benchmarks): preserve decision literal types"
          git push origin HEAD:agent/clinical-query-benchmark
