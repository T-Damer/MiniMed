name: Diagnose local model check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: diagnose-local-model-check
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/local-model-auto-selection'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format and capture diagnostics
        shell: bash
        run: |
          set +e
          pnpm check --write >/tmp/local-model-check.log 2>&1
          status=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$status" -eq 0 ]; then
            rm -f .local-model-check.log
            rm -f .github/workflows/apply-local-model-format.yml
            rm -f .github/workflows/diagnose-local-model-check.yml
            git add -A
            git commit -m 'style(models): format local model harness'
            git push origin HEAD:agent/local-model-auto-selection
            exit 0
          fi
          {
            echo '# Local model check failure'
            echo
            echo '```text'
            tail -n 300 /tmp/local-model-check.log
            echo '```'
          } >.local-model-check.log
          git add -A
          git commit -m 'chore(ci): record local model check failure'
          git push origin HEAD:agent/local-model-auto-selection
          exit 1
