name: Apply final clinical search patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-final-clinical-search-patch.yml

permissions:
  contents: write

concurrency:
  group: apply-final-clinical-search-patch
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: python tools/one_shot_finish_clinical_search.py
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/app/src/features/library/DocumentLibrary.tsx')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '<span class="clinical-signals" aria-label="Клинические области">',
              '<span class="clinical-signals" aria-hidden="true">',
          )
          path.write_text(text, encoding='utf-8')
          PY
      - run: >-
          pnpm exec biome check --write
          apps/app/src/app/App.tsx
          apps/app/src/components/AppGlyph.tsx
          apps/app/src/components/ClinicalGlyph.tsx
          apps/app/src/features/library/DocumentLibrary.tsx
          apps/app/src/features/library/KnowledgeGraph.tsx
          apps/app/src/features/modules/ModuleCatalogView.tsx
          apps/app/src/features/search/SearchWorkspace.tsx
          apps/app/src/main.tsx
          apps/app/src/state/document-navigation.ts
          apps/app/src/styles/clinical-ux.css
          apps/app/e2e/search.spec.ts
          packages/search-lexical/src/analysis.ts
          packages/search-lexical/src/intent.ts
          packages/search-lexical/src/symptom-expressions.ru.json
          packages/search-lexical/tests/query.test.ts
      - run: |
          rm -f \
            .github/workflows/apply-clinical-search-patch.yml \
            .github/workflows/apply-final-clinical-search-patch.yml \
            .github/workflows/diagnose-clinical-search-biome.yml \
            .github/workflows/one-shot-finish-clinical-search.yml \
            tools/one_shot_finish_clinical_search.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finish clinical search and archive UX"
          git push origin HEAD:agent/content-module-installer
