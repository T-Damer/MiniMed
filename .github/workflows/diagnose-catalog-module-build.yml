name: Diagnose catalog metadata build

on:
  pull_request:
    branches: [agent/drug-law-catalogs]
    paths:
      - tools/ingest/src/localmed_ingest/catalog_module_builder.py
      - tools/ingest/src/localmed_ingest/catalog_module_cli.py
      - tools/ingest/tests/test_catalog_module_builder.py
      - docs/CATALOG_METADATA_MODULES.md

permissions:
  contents: read

jobs:
  build:
    if: github.event.pull_request.head.ref == 'agent/catalog-module-builder'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Capture fixture build output
        shell: bash
        run: |
          mkdir -p diagnostics data/build
          set +e
          {
            echo '=== CLINICAL LEDGER ==='
            uv run --project tools/ingest medbase-clinical-catalog build \
              --source tools/ingest/tests/fixtures/clinical-catalog-sample.json \
              --taxonomy content/clinical-module-taxonomy.yaml \
              --overrides content/clinical-coverage-overrides.yaml \
              --generated-at 2026-07-23T00:00:00Z \
              --output data/build/clinical-coverage-sample.json
            echo "LEDGER_EXIT=$?"
            echo
            echo '=== WORKSPACES ==='
            uv run --project tools/ingest medbase-catalog-modules build \
              --ledger data/build/clinical-coverage-sample.json \
              --output-root data/build/catalog-metadata-fixture \
              --family clinical \
              --version 0.3.5-fixture \
              --built-at 2026-07-23T00:00:00Z \
              --force
            echo "WORKSPACES_EXIT=$?"
            echo
            echo '=== COMPILE ==='
            mkdir -p data/build/catalog-metadata-fixture-db
            for workspace in data/build/catalog-metadata-fixture/*; do
              [ -d "$workspace" ] || continue
              name="$(basename "$workspace")"
              echo "--- $name ---"
              uv run --project tools/ingest medbase lint --input "$workspace"
              echo "LINT_EXIT=$?"
              uv run --project tools/ingest medbase build \
                --input "$workspace" \
                --output "data/build/catalog-metadata-fixture-db/${name}.db"
              echo "BUILD_EXIT=$?"
            done
          } > diagnostics/build.txt 2>&1
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-module-build-diagnostic
          path: diagnostics
          if-no-files-found: error
