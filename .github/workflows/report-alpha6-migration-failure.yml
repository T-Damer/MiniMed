name: Report alpha 6 migration failure

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/report-alpha6-migration-failure.yml

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Extract concise verifier findings
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29698567263 --repo "$GITHUB_REPOSITORY" --log-failed > failed.log
          sed -r 's/\x1B\[[0-9;]*[mK]//g' failed.log \
            | grep -E 'lint/|error TS|Type error| × |Process completed|Verification phase|ERR_|Error:|failed|FAIL|AssertionError|No matching version|lockfile|rejected|non-fast-forward|nothing to commit' \
            | tail -n 320 > findings.log || true
          {
            echo 'Alpha.6 migration publication findings:'
            echo
            echo '```text'
            cat findings.log
            echo '```'
          } > comment.md
          gh issue comment 50 --repo "$GITHUB_REPOSITORY" --body-file comment.md
