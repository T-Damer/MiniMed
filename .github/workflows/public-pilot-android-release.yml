name: Public Russian pilot Android release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-pilot-0.3.1-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: 0.3.1
  RELEASE_TAG: v0.3.1
  APK_NAME: MiniMed-0.3.1-rf-public-pilot-debug.apk
  BUILD_TOOLS_VERSION: 36.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;${BUILD_TOOLS_VERSION}"

      - name: Install and verify
        run: |
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm verify
          pnpm content:lint:pilot
          pnpm content:build:pilot
          pnpm benchmark:pilot
          pnpm benchmark:queries:coverage
          pnpm benchmark:queries:contracts
          pnpm content:rebuild:regulatory
          cp data/build/rf-public-pilot.db apps/app/public/content/core-demo.db
          cp data/build/rf-public-pilot-report.json apps/app/public/content/core-demo-report.json
          pnpm build:app
          pnpm native:sync:android

      - name: Assemble debug-signed APK
        working-directory: apps/app/android
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Verify final APK and embedded source-linked corpus
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-output
          apk_source="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          apk="release-output/${APK_NAME}"
          original_db="data/build/rf-public-pilot.db"
          extracted_db="$RUNNER_TEMP/rf-public-pilot-from-apk.db"

          test -s "$apk_source"
          cp "$apk_source" "$apk"
          unzip -l "$apk" | tee release-output/APK-CONTENTS.txt
          embedded_path="$(unzip -Z1 "$apk" | awk '/(^|\/)core-demo\.db$/ { print; exit }')"
          test -n "$embedded_path"
          printf '%s\n' "$embedded_path" | tee release-output/EMBEDDED-DB-PATH.txt
          unzip -p "$apk" "$embedded_path" > "$extracted_db"
          cmp "$original_db" "$extracted_db"

          aapt="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/aapt"
          apksigner="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          "$aapt" dump badging "$apk" | tee release-output/APK-BADGING.txt
          "$aapt" dump permissions "$apk" | tee release-output/APK-PERMISSIONS.txt
          "$apksigner" verify --verbose --print-certs "$apk" | tee release-output/APK-SIGNATURE.txt

          EMBEDDED_PATH="$embedded_path" SOURCE_SHA="$(git rev-parse HEAD)" APK_FILE="$apk" python3 - <<'PY'
          import hashlib
          import json
          import os
          import sqlite3
          from pathlib import Path

          expected_recommendations = {'281_3', '360_3', '381_3', '563_2', '58_2', '714_2', '755_1'}
          expected_medications = {
              'medication.paracetamol.suspension.120mg-5ml',
              'medication.ibuprofen.suspension.100mg-5ml',
              'medication.amoxicillin.tablet.500mg',
              'medication.amoxicillin-clavulanate.suspension.400mg-57mg-5ml',
              'medication.azithromycin.suspension.200mg-5ml',
              'medication.ceftriaxone.injection.1g',
              'medication.oral-rehydration-salts.powder.18-9g',
              'medication.oseltamivir.capsule.30mg',
          }
          apk = Path(os.environ['APK_FILE'])
          db_path = Path(os.environ['RUNNER_TEMP']) / 'rf-public-pilot-from-apk.db'
          report = json.loads(Path('data/build/rf-public-pilot-report.json').read_text(encoding='utf-8'))
          db = sqlite3.connect(f'file:{db_path}?mode=ro', uri=True)
          try:
              quick_check = db.execute('PRAGMA quick_check').fetchone()[0]
              foreign_key_violations = len(db.execute('PRAGMA foreign_key_check').fetchall())
              pack = db.execute('SELECT id, version, schema_version FROM content_packs').fetchone()
              documents = db.execute(
                  'SELECT id, title, source_type, metadata_json FROM documents ORDER BY id'
              ).fetchall()
              sections = db.execute('SELECT COUNT(*) FROM sections').fetchone()[0]
              chunks = db.execute(
                  'SELECT id, document_version_id, original_text, metadata_json FROM chunks'
              ).fetchall()
              aliases = db.execute('SELECT COUNT(*) FROM aliases').fetchone()[0]
              profiles = db.execute('SELECT COUNT(*) FROM embedding_profiles').fetchone()[0]
              embeddings = db.execute('SELECT COUNT(*) FROM chunk_embeddings').fetchone()[0]
              version_types = {
                  row[0]: row[1]
                  for row in db.execute(
                      'SELECT document_versions.id, documents.source_type '
                      'FROM document_versions JOIN documents ON documents.id = document_versions.document_id'
                  )
              }

              assert quick_check == 'ok'
              assert foreign_key_violations == 0
              assert pack and pack[0] == 'minimed.rf-public-pilot' and pack[2] >= 2
              assert pack[1] == '0.3.1'
              assert len(documents) == report['documents']
              assert sections == report['sections']
              assert len(chunks) == report['chunks']
              assert aliases == report['aliases']
              assert profiles == report['embeddingProfiles'] == 1
              assert embeddings == report['embeddings'] == len(chunks)

              source_index = []
              recommendation_ids = set()
              registry_documents = 0
              for document_id, title, source_type, metadata_raw in documents:
                  metadata = json.loads(metadata_raw)
                  assert metadata.get('syntheticFixture') is False
                  assert metadata.get('publicPilot') is True
                  if source_type == 'clinical_recommendation_summary':
                      assert metadata['contentMode'] == 'source_linked_paraphrase'
                      assert metadata['notSubstituteForOriginal'] is True
                      assert metadata['officialSourceUrl'].startswith('https://cr.minzdrav.gov.ru/')
                      assert metadata['publicMirrorUrl'].startswith('https://')
                      recommendation_ids.add(str(metadata['officialId']))
                  elif source_type == 'official_registry_summary':
                      registry_documents += 1
                      assert metadata['authorityTier'] == 'official-registry'
                      assert metadata['contentMode'] == 'source_linked_summary'
                      assert metadata['officialSourceUrl'].startswith('https://pots.minzdrav.gov.ru/')
                      assert metadata['registryRecordId'] and metadata['registrationNumber']
                  else:
                      raise AssertionError(f'Unexpected source type: {source_type}')
                  source_index.append({
                      'documentId': document_id,
                      'title': title,
                      'sourceType': source_type,
                      'metadata': metadata,
                  })
              assert recommendation_ids == expected_recommendations

              sourced_versions = set()
              for chunk_id, version_id, original_text, metadata_raw in chunks:
                  metadata = json.loads(metadata_raw)
                  spans = metadata.get('sourceSpans')
                  source_type = version_types[version_id]
                  if not spans:
                      assert source_type == 'official_registry_summary'
                      assert original_text.startswith('Карточка фиксирует регистрационную идентичность')
                      continue
                  sourced_versions.add(version_id)
                  for span in spans:
                      assert span.get('sourceSection')
                      if source_type == 'clinical_recommendation_summary':
                          assert str(span['officialUrl']).startswith('https://cr.minzdrav.gov.ru/')
                          assert str(span['publicUrl']).startswith('https://')
                          assert span['contentMode'] == 'paraphrase'
                      else:
                          assert str(span['officialUrl']).startswith('https://pots.minzdrav.gov.ru/')
                          assert span['recordId'] and span['contentMode'] == 'summary'
              assert sourced_versions == set(version_types)

              table_names = {
                  row[0] for row in db.execute("SELECT name FROM sqlite_master WHERE type = 'table'")
              }
              knowledge = None
              if 'knowledge_entities' in table_names:
                  medication_ids = {
                      row[0]
                      for row in db.execute(
                          "SELECT id FROM knowledge_entities WHERE entity_type = 'medication'"
                      )
                  }
                  knowledge = {
                      'entities': db.execute('SELECT COUNT(*) FROM knowledge_entities').fetchone()[0],
                      'medicationProfiles': db.execute('SELECT COUNT(*) FROM medication_profiles').fetchone()[0],
                      'facts': db.execute('SELECT COUNT(*) FROM knowledge_facts').fetchone()[0],
                      'relations': db.execute('SELECT COUNT(*) FROM knowledge_relations').fetchone()[0],
                      'evidence': db.execute('SELECT COUNT(*) FROM knowledge_evidence').fetchone()[0],
                      'documentLinks': db.execute('SELECT COUNT(*) FROM knowledge_document_links').fetchone()[0],
                      'reviewTasks': db.execute('SELECT COUNT(*) FROM knowledge_review_tasks').fetchone()[0],
                      'reviewedFacts': db.execute(
                          "SELECT COUNT(*) FROM knowledge_facts WHERE review_status = 'reviewed'"
                      ).fetchone()[0],
                      'structuredSearchRows': db.execute('SELECT COUNT(*) FROM knowledge_fts').fetchone()[0],
                  }
                  if registry_documents:
                      assert registry_documents == 8
                      assert medication_ids == expected_medications
                      assert knowledge == {
                          'entities': 9,
                          'medicationProfiles': 8,
                          'facts': 8,
                          'relations': 1,
                          'evidence': 9,
                          'documentLinks': 9,
                          'reviewTasks': 3,
                          'reviewedFacts': 0,
                          'structuredSearchRows': 0,
                      }
          finally:
              db.close()

          Path('release-output/SOURCE-INDEX.json').write_text(
              json.dumps(source_index, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          manifest = {
              'version': os.environ['RELEASE_VERSION'],
              'sourceSha': os.environ['SOURCE_SHA'],
              'applicationId': 'dev.localmed.search',
              'apk': {
                  'name': apk.name,
                  'bytes': apk.stat().st_size,
                  'sha256': hashlib.sha256(apk.read_bytes()).hexdigest(),
                  'debugSigned': True,
              },
              'embeddedDatabase': {
                  'apkPath': os.environ['EMBEDDED_PATH'],
                  'bytes': db_path.stat().st_size,
                  'sha256': hashlib.sha256(db_path.read_bytes()).hexdigest(),
                  'quickCheck': quick_check,
                  'foreignKeyViolations': foreign_key_violations,
                  'packId': pack[0],
                  'packVersion': pack[1],
                  'schemaVersion': pack[2],
                  'documents': len(documents),
                  'sections': sections,
                  'chunks': len(chunks),
                  'aliases': aliases,
                  'embeddingProfiles': profiles,
                  'embeddings': embeddings,
                  'clinicalRecommendationCards': len(recommendation_ids),
                  'officialRegistryCards': registry_documents,
                  'knowledge': knowledge,
                  'synthetic': False,
              },
              'retrieval': {
                  'lexical': 'SQLite FTS5/BM25',
                  'semantic': 'portable local embedding scaffold',
                  'mode': 'local hybrid retrieval',
              },
              'clinicalGuidance': False,
              'requiresOriginalSourceReview': True,
              'regulatoryPackValidatedSeparately': True,
          }
          Path('release-output/BUILD-MANIFEST.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

          git archive --format=zip --output="release-output/MiniMed-${RELEASE_VERSION}-source.zip" HEAD
          cp "$original_db" release-output/rf-public-pilot.db
          cp data/build/rf-public-pilot-report.json release-output/rf-public-pilot-report.json
          cp data/build/rf-public-pilot-benchmark.json release-output/rf-public-pilot-benchmark.json
          cp data/build/rf-regulatory-pilot-report.json release-output/rf-regulatory-pilot-report.json
          cp data/build/rf-regulatory-pilot-benchmark.json release-output/rf-regulatory-pilot-benchmark.json
          cp data/build/russian-scenario-contract-report.json release-output/russian-scenario-contract-report.json
          sha256sum "$apk" "$original_db" "release-output/MiniMed-${RELEASE_VERSION}-source.zip" > release-output/SHA256SUMS.txt

          cat > release-output/RELEASE_NOTES.md <<'EOF'
          # MiniMed 0.3.1 — Russian-first offline retrieval

          The APK contains seven source-linked pediatric recommendation cards and eight official-registry medication identity cards. Search, SQLite FTS5, local vector retrieval, exact source opening, and the reviewed/proposed knowledge boundary work offline.

          Version 0.3.1 adds the provenance-labelled clinical-query benchmark, Russian-first intent and safety-contract gates, exact section/version validation, and reproducible regulatory-pack verification. The separate regulatory pack is validated in the repository but is not embedded in this APK until multi-pack installation and rollback are implemented.

          This is a debug-signed engineering prerelease. It does not replace current original clinical recommendations, official drug instructions, or applicable regulatory acts.
          EOF

      - name: Upload complete verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MiniMed-0.3.1-rf-public-pilot
          if-no-files-found: warn
          retention-days: 30
          path: release-output/

      - name: Publish APK-only GitHub prerelease
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, 'release: MiniMed 0.3.1'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=("release-output/${APK_NAME}")
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --target "$(git rev-parse HEAD)" --title "MiniMed ${RELEASE_VERSION} — offline Russian pilot" --notes-file release-output/RELEASE_NOTES.md --prerelease
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --target "$(git rev-parse HEAD)" --title "MiniMed ${RELEASE_VERSION} — offline Russian pilot" --notes-file release-output/RELEASE_NOTES.md --prerelease
          fi
