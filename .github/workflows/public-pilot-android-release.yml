name: Public Russian pilot Android release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-pilot-0.3.0-alpha.5-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: 0.3.0-alpha.5
  RELEASE_TAG: v0.3.0-alpha.5
  APK_NAME: MiniMed-0.3.0-alpha.5-rf-public-pilot-debug.apk
  BUILD_TOOLS_VERSION: 36.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;${BUILD_TOOLS_VERSION}"

      - name: Install locked dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked

      - name: Verify the base application
        shell: bash
        run: |
          set -euo pipefail
          pnpm verify

      - name: Build and benchmark the public pilot pack
        shell: bash
        run: |
          set -euo pipefail
          pnpm content:lint:pilot
          pnpm content:build:pilot
          pnpm benchmark:pilot

      - name: Install the public pilot pack into the application
        shell: bash
        run: |
          set -euo pipefail
          cp data/build/rf-public-pilot.db apps/app/public/content/core-demo.db
          cp data/build/rf-public-pilot-report.json apps/app/public/content/core-demo-report.json

      - name: Build and synchronize Capacitor
        shell: bash
        run: |
          set -euo pipefail
          pnpm build:app
          pnpm native:sync:android

      - name: Assemble debug-signed APK
        working-directory: apps/app/android
        shell: bash
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Verify final APK and embedded public corpus
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-output
          apk_source="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          apk="release-output/${APK_NAME}"
          original_db="data/build/rf-public-pilot.db"
          extracted_db="$RUNNER_TEMP/rf-public-pilot-from-apk.db"

          test -s "$apk_source"
          cp "$apk_source" "$apk"
          unzip -l "$apk" | tee release-output/APK-CONTENTS.txt

          embedded_path="$(unzip -Z1 "$apk" | awk '/(^|\/)core-demo\.db$/ { print; exit }')"
          test -n "$embedded_path"
          printf '%s\n' "$embedded_path" | tee release-output/EMBEDDED-DB-PATH.txt
          unzip -p "$apk" "$embedded_path" > "$extracted_db"
          test -s "$extracted_db"
          cmp "$original_db" "$extracted_db"

          aapt="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/aapt"
          apksigner="${ANDROID_HOME}/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          "$aapt" dump badging "$apk" | tee release-output/APK-BADGING.txt
          "$aapt" dump permissions "$apk" | tee release-output/APK-PERMISSIONS.txt
          "$apksigner" verify --verbose --print-certs "$apk" | tee release-output/APK-SIGNATURE.txt

          EMBEDDED_PATH="$embedded_path" SOURCE_SHA="$(git rev-parse HEAD)" python3 - <<'PY'
          import hashlib
          import json
          import os
          import sqlite3
          from pathlib import Path

          expected_ids = {
              '281_3',
              '360_3',
              '381_3',
              '563_2',
              '58_2',
              '714_2',
              '755_1',
          }
          apk = Path('release-output/MiniMed-0.3.0-alpha.5-rf-public-pilot-debug.apk')
          db_path = Path(os.environ['RUNNER_TEMP']) / 'rf-public-pilot-from-apk.db'
          report = json.loads(Path('data/build/rf-public-pilot-report.json').read_text(encoding='utf-8'))

          db = sqlite3.connect(f'file:{db_path}?mode=ro', uri=True)
          quick_check = db.execute('PRAGMA quick_check').fetchone()[0]
          foreign_key_violations = len(db.execute('PRAGMA foreign_key_check').fetchall())
          pack = db.execute(
              'SELECT id, version, schema_version, title, checksum FROM content_packs'
          ).fetchone()
          documents = db.execute(
              'SELECT id, title, source_type, metadata_json FROM documents ORDER BY id'
          ).fetchall()
          sections = db.execute('SELECT COUNT(*) FROM sections').fetchone()[0]
          chunks = db.execute('SELECT id, metadata_json FROM chunks').fetchall()
          aliases = db.execute('SELECT COUNT(*) FROM aliases').fetchone()[0]
          embedding_profiles = db.execute('SELECT COUNT(*) FROM embedding_profiles').fetchone()[0]
          embeddings = db.execute('SELECT COUNT(*) FROM chunk_embeddings').fetchone()[0]
          db.close()

          assert quick_check == 'ok'
          assert foreign_key_violations == 0
          assert pack is not None
          assert pack[0] == 'minimed.rf-public-pilot'
          assert pack[1] == '0.3.0-alpha.5'
          assert pack[2] == 2
          assert len(documents) == report['documents'] == 7
          assert sections == report['sections'] == 42
          assert len(chunks) == report['chunks'] == 42
          assert aliases == report['aliases'] == 14
          assert embedding_profiles == report['embeddingProfiles'] == 1
          assert embeddings == report['embeddings'] == 42

          source_index = []
          actual_ids = set()
          for document_id, title, source_type, metadata_raw in documents:
              metadata = json.loads(metadata_raw)
              assert source_type == 'clinical_recommendation_summary'
              assert metadata['syntheticFixture'] is False
              assert metadata['publicPilot'] is True
              assert metadata['contentMode'] == 'source_linked_paraphrase'
              assert metadata['notSubstituteForOriginal'] is True
              assert metadata['officialSourceUrl'].startswith('https://cr.minzdrav.gov.ru/')
              assert metadata['publicMirrorUrl'].startswith('https://')
              official_id = str(metadata['officialId'])
              actual_ids.add(official_id)
              source_index.append(
                  {
                      'documentId': document_id,
                      'title': title,
                      'officialId': official_id,
                      'officialSourceUrl': metadata['officialSourceUrl'],
                      'publicMirrorUrl': metadata['publicMirrorUrl'],
                      'sourceYear': metadata['sourceYear'],
                      'contentMode': metadata['contentMode'],
                  }
              )
          assert actual_ids == expected_ids

          for chunk_id, metadata_raw in chunks:
              metadata = json.loads(metadata_raw)
              spans = metadata.get('sourceSpans')
              assert isinstance(spans, list) and spans, f'{chunk_id}: missing source spans'
              for span in spans:
                  assert str(span['officialUrl']).startswith('https://cr.minzdrav.gov.ru/')
                  assert str(span['publicUrl']).startswith('https://')
                  assert span['contentMode'] == 'paraphrase'
                  assert span['sourceSection']

          source_index.sort(key=lambda item: item['officialId'])
          Path('release-output/SOURCE-INDEX.json').write_text(
              json.dumps(source_index, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          manifest = {
              'version': '0.3.0-alpha.5',
              'sourceSha': os.environ['SOURCE_SHA'],
              'applicationId': 'dev.localmed.search',
              'apk': {
                  'name': apk.name,
                  'bytes': apk.stat().st_size,
                  'sha256': hashlib.sha256(apk.read_bytes()).hexdigest(),
                  'debugSigned': True,
              },
              'embeddedDatabase': {
                  'apkPath': os.environ['EMBEDDED_PATH'],
                  'bytes': db_path.stat().st_size,
                  'sha256': hashlib.sha256(db_path.read_bytes()).hexdigest(),
                  'quickCheck': quick_check,
                  'foreignKeyViolations': foreign_key_violations,
                  'packId': pack[0],
                  'packVersion': pack[1],
                  'schemaVersion': pack[2],
                  'documents': len(documents),
                  'sections': sections,
                  'chunks': len(chunks),
                  'aliases': aliases,
                  'embeddingProfiles': embedding_profiles,
                  'embeddings': embeddings,
                  'synthetic': False,
                  'contentMode': 'source_linked_paraphrase',
              },
              'officialRecommendationIds': sorted(actual_ids),
              'retrieval': {
                  'lexical': 'SQLite FTS5/BM25',
                  'semantic': 'portable int8 feature-hash scaffold',
                  'mode': 'local hybrid retrieval',
              },
              'clinicalGuidance': False,
              'requiresOriginalSourceReview': True,
          }
          Path('release-output/BUILD-MANIFEST.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

          git archive --format=zip --output="release-output/MiniMed-${RELEASE_VERSION}-source.zip" HEAD
          cp "$original_db" release-output/rf-public-pilot.db
          cp data/build/rf-public-pilot-report.json release-output/rf-public-pilot-report.json
          cp data/build/rf-public-pilot-benchmark.json release-output/rf-public-pilot-benchmark.json
          sha256sum \
            "$apk" \
            "$original_db" \
            "release-output/MiniMed-${RELEASE_VERSION}-source.zip" \
            > release-output/SHA256SUMS.txt

          cat > release-output/RELEASE_NOTES.md <<'EOF'
          # MiniMed 0.3.0-alpha.5 — public Russian clinical-recommendation pilot

          This prerelease contains the complete offline MiniMed Android application and a small real source-derived pediatric corpus.

          ## Included recommendations

          - внебольничная пневмония, `714_2`, 2025;
          - бронхит, `381_3`, 2024;
          - острый бронхиолит, `360_3`, 2024;
          - инфекция мочевых путей, `281_3`, 2024;
          - корь, `563_2`, 2024;
          - ротавирусный гастроэнтерит, `755_1`, 2023;
          - менингококковая инфекция, `58_2`, 2023.

          The APK contains 42 source-linked searchable sections/chunks and a 35-query pilot retrieval benchmark.

          ## Content boundary

          The APK does not redistribute complete recommendation documents. Its cards are concise source-linked paraphrases for retrieval and navigation. Every paragraph retains the official recommendation ID, official Minzdrav URL, readable public source URL and source-section label.

          The original recommendation is authoritative. This pilot omits dosage tables and many exceptions, is not a diagnostic or prescribing system, and must not replace review of the current primary source.
          EOF

      - name: Upload verified build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MiniMed-0.3.0-alpha.5-rf-public-pilot
          if-no-files-found: warn
          retention-days: 30
          path: release-output/

      - name: Publish GitHub prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(
            "release-output/${APK_NAME}"
            "release-output/MiniMed-${RELEASE_VERSION}-source.zip"
            release-output/rf-public-pilot.db
            release-output/rf-public-pilot-report.json
            release-output/rf-public-pilot-benchmark.json
            release-output/BUILD-MANIFEST.json
            release-output/SOURCE-INDEX.json
            release-output/APK-CONTENTS.txt
            release-output/APK-BADGING.txt
            release-output/APK-PERMISSIONS.txt
            release-output/APK-SIGNATURE.txt
            release-output/EMBEDDED-DB-PATH.txt
            release-output/SHA256SUMS.txt
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --target "$(git rev-parse HEAD)" --title "MiniMed ${RELEASE_VERSION} — public Russian pilot" --notes-file release-output/RELEASE_NOTES.md --prerelease
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --target "$(git rev-parse HEAD)" --title "MiniMed ${RELEASE_VERSION} — public Russian pilot" --notes-file release-output/RELEASE_NOTES.md --prerelease
          fi
