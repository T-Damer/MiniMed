name: Diagnose module lifecycle E2E formatting

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-module-lifecycle-format.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm exec biome check apps/app/e2e/mount-built-app.ts apps/app/e2e/module-lifecycle.spec.ts > module-lifecycle-format.txt 2>&1
          printf '\nexit=%s\n' "$?" >> module-lifecycle-format.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: module-lifecycle-format
          path: module-lifecycle-format.txt
          retention-days: 1
