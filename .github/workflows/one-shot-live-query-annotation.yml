name: One-shot live query annotation

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-live-query-annotation.yml

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          uv run --project tools/ingest medbase benchmark-import-real-pocqi \
            --count 120 \
            --seed minimed-real-pocqi-v1 \
            --output /tmp/real-pocqi.jsonl \
            --report /tmp/real-pocqi-import-report.json
      - run: |
          uv run --project tools/ingest python -m localmed_ingest.clinical_query_annotations \
            --input /tmp/real-pocqi.jsonl \
            --output /tmp/real-pocqi.annotations.jsonl \
            --report /tmp/real-pocqi-annotation-report.json
      - run: |
          uv run --project tools/ingest python - <<'PY'
          import json
          from pathlib import Path

          source = json.loads(Path('/tmp/real-pocqi-import-report.json').read_text())
          annotation = json.loads(Path('/tmp/real-pocqi-annotation-report.json').read_text())
          rows = Path('/tmp/real-pocqi.annotations.jsonl').read_text().splitlines()

          assert source['source_count'] == 620, source
          assert source['selected_count'] == 120, source
          assert len(source['specialty_counts_source']) == 30, source
          assert annotation['annotated_count'] == 120, annotation
          assert len(rows) == 120
          assert annotation['method'] == 'rule-based-ru-first-v1', annotation
          assert annotation['source_language_counts'] == {'en': 120}, annotation
          assert annotation['detected_language_counts'] == {'en': 120}, annotation
          assert annotation['jurisdiction_counts'] == {'US': 120}, annotation
          assert sum(annotation['primary_decision_counts'].values()) == 120, annotation
          assert sum(annotation['complexity_counts'].values()) == 120, annotation

          summary = {
              'dataset_id': source['dataset_id'],
              'source_count': source['source_count'],
              'source_specialties': len(source['specialty_counts_source']),
              'selected_count': source['selected_count'],
              'seed': source['seed'],
              'method': annotation['method'],
              'source_language_counts': annotation['source_language_counts'],
              'detected_language_counts': annotation['detected_language_counts'],
              'jurisdiction_counts': annotation['jurisdiction_counts'],
              'primary_decision_counts': annotation['primary_decision_counts'],
              'complexity_counts': annotation['complexity_counts'],
              'patient_specific_derived': annotation['patient_specific_derived'],
              'patient_specific_disagreements': annotation['patient_specific_disagreements'],
              'review_required': annotation['review_required'],
              'source_sha256': source['source_sha256'],
              'sample_sha256': source['output_sha256'],
              'annotation_sha256': annotation['output_sha256'],
          }
          Path('.github/live-query-annotation-summary.json').write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n'
          )
          PY
      - run: rm .github/workflows/one-shot-live-query-annotation.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/live-query-annotation-summary.json .github/workflows/one-shot-live-query-annotation.yml
          git commit -m "test(benchmarks): record live query annotation summary"
          git push origin HEAD:agent/clinical-query-benchmark
