name: Diagnose LocalMed bootstrap archive

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-localmed.yml
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: diagnose-localmed-bootstrap
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.event_name != 'issues' || github.event.issue.title == '[bootstrap] Diagnose LocalMed archive'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: agent/import-localmed-0.2.2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Diagnose reconstructed archive
        shell: bash
        run: |
          set -uo pipefail
          archive="$RUNNER_TEMP/localmed.tar.xz"
          tar_output="$RUNNER_TEMP/localmed.tar"
          error_output="$RUNNER_TEMP/xz-error.txt"
          cat .bootstrap/parts/part-* > "$archive"

          xz --robot --list "$archive" > "$RUNNER_TEMP/xz-list.txt" 2>&1
          list_status=$?
          xz --decompress --stdout "$archive" > "$tar_output" 2> "$error_output"
          decompress_status=$?

          {
            echo "actual_sha256=$(sha256sum "$archive" | awk '{print $1}')"
            echo "archive_bytes=$(wc -c < "$archive")"
            echo "xz_list_status=$list_status"
            echo "xz_decompress_status=$decompress_status"
            echo "decompressed_bytes=$(wc -c < "$tar_output")"
            echo "--- xz list ---"
            cat "$RUNNER_TEMP/xz-list.txt"
            echo "--- xz error ---"
            cat "$error_output"
            echo "--- archive tail ---"
            tail -c 96 "$archive" | base64 -w0
            echo
          } > .bootstrap-xz-diagnostic

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .bootstrap-xz-diagnostic
          git commit -m "chore: record xz bootstrap diagnostics" || true
          git push origin "HEAD:${TARGET_BRANCH}"

          exit "$decompress_status"
