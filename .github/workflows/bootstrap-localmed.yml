name: Bootstrap LocalMed source

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-localmed.yml
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: bootstrap-localmed-source
  cancel-in-progress: false

jobs:
  import:
    if: github.event_name != 'issues' || github.event.issue.title == '[bootstrap] LocalMed source import'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: agent/import-localmed-0.2.2
      ARCHIVE_SHA256: 42052e6293032931cc6475b3f61cc3c10d7e79aa3a74179c2d85af21b1ffad4b
    steps:
      - name: Check out the target PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Mark bootstrap workflow start
        shell: bash
        run: |
          set -euo pipefail
          printf 'run_id=%s\nevent=%s\nstarted_at=%s\n' \
            "$GITHUB_RUN_ID" "$GITHUB_EVENT_NAME" "$(date -u +%FT%TZ)" \
            > .bootstrap-actions-started
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .bootstrap-actions-started
          git commit -m "chore: mark LocalMed bootstrap start"
          git push origin "HEAD:${TARGET_BRANCH}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v6

      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/localmed.tar.xz"
          test "$(find .bootstrap/parts -maxdepth 1 -type f -name 'part-*' | wc -l)" -eq 13
          cat .bootstrap/parts/part-* > "$archive"
          echo "$ARCHIVE_SHA256  $archive" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/source"
          tar -xJf "$archive" -C "$RUNNER_TEMP/source"
          test -f "$RUNNER_TEMP/source/package.json"
          test -f "$RUNNER_TEMP/source/.github/workflows/ci.yml"

      - name: Generate deterministic dependency locks
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/source"
          corepack enable
          pnpm install --lockfile-only --no-frozen-lockfile
          uv lock --project tools/ingest

      - name: Replace bootstrap tree with LocalMed source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/source/." .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: import LocalMed 0.2.2 baseline"
          git push origin "HEAD:${TARGET_BRANCH}"
