name: Diagnose MiniMed 0.3.2 APK verification

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-android-032.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - name: Build the same release candidate
        run: |
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm content:build:pilot
          cp data/build/rf-public-pilot.db apps/app/public/content/core-demo.db
          cp data/build/rf-public-pilot-report.json apps/app/public/content/core-demo-report.json
          pnpm build:app
          pnpm native:sync:android
          (cd apps/app/android && ./gradlew --no-daemon --stacktrace assembleDebug)
      - name: Record verification inputs without assertions
        shell: bash
        run: |
          set -u
          mkdir -p apk-diagnostic
          apk="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          original="data/build/rf-public-pilot.db"
          embedded_path="$(unzip -Z1 "$apk" | awk '/(^|\/)core-demo\.db$/ { print; exit }')"
          printf 'embedded_path=%s\n' "$embedded_path" > apk-diagnostic/summary.txt
          unzip -p "$apk" "$embedded_path" > apk-diagnostic/embedded.db
          sha256sum "$apk" "$original" apk-diagnostic/embedded.db >> apk-diagnostic/summary.txt
          cmp -l "$original" apk-diagnostic/embedded.db | head -20 >> apk-diagnostic/cmp.txt || true
          python3 - <<'PY'
          import hashlib
          import json
          import sqlite3
          from pathlib import Path

          paths = {
              'original': Path('data/build/rf-public-pilot.db'),
              'embedded': Path('apk-diagnostic/embedded.db'),
          }
          report = json.loads(Path('data/build/rf-public-pilot-report.json').read_text(encoding='utf-8'))
          result = {'report': report, 'files': {}}
          for name, path in paths.items():
              item = {
                  'bytes': path.stat().st_size,
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
              }
              db = sqlite3.connect(f'file:{path}?mode=ro', uri=True)
              try:
                  item['quickCheck'] = db.execute('PRAGMA quick_check').fetchone()[0]
                  item['foreignKeyViolations'] = len(db.execute('PRAGMA foreign_key_check').fetchall())
                  item['pack'] = db.execute('SELECT id, version, schema_version FROM content_packs').fetchone()
                  item['documents'] = db.execute('SELECT COUNT(*) FROM documents').fetchone()[0]
                  item['sections'] = db.execute('SELECT COUNT(*) FROM sections').fetchone()[0]
                  item['chunks'] = db.execute('SELECT COUNT(*) FROM chunks').fetchone()[0]
                  item['aliases'] = db.execute('SELECT COUNT(*) FROM aliases').fetchone()[0]
                  item['embeddingProfiles'] = db.execute('SELECT COUNT(*) FROM embedding_profiles').fetchone()[0]
                  item['embeddings'] = db.execute('SELECT COUNT(*) FROM chunk_embeddings').fetchone()[0]
                  item['sourceTypes'] = db.execute(
                      'SELECT source_type, COUNT(*) FROM documents GROUP BY source_type ORDER BY source_type'
                  ).fetchall()
                  item['recommendationIds'] = sorted(
                      str(json.loads(row[0]).get('officialId'))
                      for row in db.execute(
                          "SELECT metadata_json FROM documents WHERE source_type='clinical_recommendation_summary'"
                      )
                  )
                  item['medicationIds'] = [
                      row[0]
                      for row in db.execute(
                          "SELECT id FROM documents WHERE source_type='official_registry_summary' ORDER BY id"
                      )
                  ]
              finally:
                  db.close()
              result['files'][name] = item
          Path('apk-diagnostic/diagnostic.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
          ${ANDROID_HOME}/build-tools/36.0.0/aapt dump badging "$apk" > apk-diagnostic/badging.txt
          ${ANDROID_HOME}/build-tools/36.0.0/apksigner verify --verbose --print-certs "$apk" > apk-diagnostic/signature.txt
      - uses: actions/upload-artifact@v4
        with:
          name: minimed-032-apk-diagnostic
          path: apk-diagnostic
          if-no-files-found: error
          retention-days: 1
