name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  alpha6-format:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/mobile-ux-alpha6-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/mobile-ux-alpha6-final
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Apply pinned Biome formatting
        run: bun run check --write
      - name: Publish non-workflow formatting fixes
        shell: bash
        run: |
          set -euo pipefail
          git diff --quiet -- .github/workflows || {
            echo 'Formatting unexpectedly changed workflow files.' >&2
            git diff -- .github/workflows
            exit 1
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'style(app): apply repository formatting'
          git push origin HEAD:agent/mobile-ux-alpha6-final

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test:unit
      - run: bun run native:source:check
      - run: bun run build
      - run: bun run benchmark:all
      - run: bun run secrets:check

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: uv run --project tools/ingest medbase lint --input content/fixtures
      - run: uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
      - run: uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
      - run: uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
      - run: uv run --project tools/ingest pytest tools/ingest/tests
      - run: >-
          uv run --project tools/ingest medbase build
          --input content/fixtures
          --output data/build/core-demo.db
          --json-output packages/test-fixtures/src/generated/core-demo.json
          --report data/build/core-demo-report.json
      - run: git diff --exit-code -- packages/test-fixtures/src/generated/core-demo.json
