name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  alpha6-format:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/mobile-ux-0.3.0-alpha.6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/mobile-ux-0.3.0-alpha.6
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Correct reverse-order age parsing
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('packages/search-lexical/src/analysis.ts')
          text = path.read_text(encoding='utf-8')
          old = r"    /(\d{1,3})\s*(写薪(?:褟|械泄)?|写械薪褜|写薪械泄|薪械写械谢(?:褟|懈|褜|褞)?|屑械褋褟褑(?:邪|械胁)?|谢械褌|谐芯写(?:邪|芯胁)?)\s*,?\s*(?:屑邪谢褜褔懈泻|写械胁芯褔泻邪|褉械斜械薪芯泻|褉械斜褢薪芯泻|锌邪褑懈械薪褌|锌邪褑懈械薪褌泻邪|屑褍卸褔懈薪邪|卸械薪褖懈薪邪|屑谢邪写械薪械褑)/giu,"
          new = r"    /(\d{1,3})\s*(屑械褋褟褑(?:邪|械胁)?|谢械褌|谐芯写(?:邪|芯胁)?)\s*,?\s*(?:屑邪谢褜褔懈泻|写械胁芯褔泻邪|褉械斜械薪芯泻|褉械斜褢薪芯泻|锌邪褑懈械薪褌|锌邪褑懈械薪褌泻邪|屑褍卸褔懈薪邪|卸械薪褖懈薪邪|屑谢邪写械薪械褑)/giu,"
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif new not in text:
              raise SystemExit('reverse-order age parser pattern was not found')
          PY
      - name: Apply pinned Biome formatting
        run: pnpm check --write
      - name: Publish non-workflow alpha 6 fixes
        shell: bash
        run: |
          set -euo pipefail
          git diff --quiet -- .github/workflows || {
            echo 'Formatting unexpectedly changed workflow files.' >&2
            git diff -- .github/workflows
            exit 1
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'fix(parser): distinguish illness duration from patient age'
          git push origin HEAD:agent/mobile-ux-0.3.0-alpha.6

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check source formatting and lint
        shell: bash
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee biome-check.log
      - name: Report alpha 6 check failure
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/mobile-ux-0.3.0-alpha.6'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -r 's/\x1B\[[0-9;]*[mK]//g' biome-check.log | tail -n 220 > biome-tail.log
          {
            echo '<!-- minimed-alpha6-ci-diagnostic -->'
            echo 'Current alpha.6 Biome failure:'
            echo
            echo '```text'
            cat biome-tail.log
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --body-file comment.md
      - run: pnpm typecheck
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test:unit 2>&1 | tee unit-test.log
      - name: Report alpha 6 unit-test failure
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/mobile-ux-0.3.0-alpha.6' && hashFiles('unit-test.log') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -r 's/\x1B\[[0-9;]*[mK]//g' unit-test.log | tail -n 220 > unit-tail.log
          {
            echo '<!-- minimed-alpha6-unit-diagnostic -->'
            echo 'Current alpha.6 unit-test failure:'
            echo
            echo '```text'
            cat unit-tail.log
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --body-file comment.md
      - run: pnpm native:source:check
      - run: pnpm build
      - run: pnpm benchmark:all
      - run: pnpm secrets:check

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: uv run --project tools/ingest medbase lint --input content/fixtures
      - run: uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
      - run: uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
      - run: uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
      - run: uv run --project tools/ingest pytest tools/ingest/tests
      - run: >-
          uv run --project tools/ingest medbase build
          --input content/fixtures
          --output data/build/core-demo.db
          --json-output packages/test-fixtures/src/generated/core-demo.json
          --report data/build/core-demo-report.json
      - run: git diff --exit-code -- packages/test-fixtures/src/generated/core-demo.json
