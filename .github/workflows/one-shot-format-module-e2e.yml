name: One-shot format module E2E

on:
  push:
    branches:
      - agent/content-module-foundation
    paths:
      - .github/workflows/one-shot-format-module-e2e.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-foundation
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome check --write apps/app/e2e/search.spec.ts
      - run: rm .github/workflows/one-shot-format-module-e2e.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(modules): format module E2E"
          git push origin HEAD:agent/content-module-foundation
