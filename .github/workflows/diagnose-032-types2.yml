name: Diagnose 0.3.2 sanitizer types

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-032-types2.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm --filter @localmed/search-lexical typecheck > type-errors.txt 2>&1
          printf '\nsearch=%s\n' "$?" >> type-errors.txt
          pnpm --filter @localmed/core typecheck >> type-errors.txt 2>&1
          printf '\ncore=%s\n' "$?" >> type-errors.txt
          pnpm --filter @localmed/app typecheck >> type-errors.txt 2>&1
          printf '\napp=%s\n' "$?" >> type-errors.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: minimed-032-sanitizer-types
          path: type-errors.txt
          retention-days: 1
