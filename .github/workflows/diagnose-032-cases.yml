name: Diagnose 0.3.2 clinical cases

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-032-cases.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm benchmark:cases > case-errors.txt 2>&1
          printf '\nexit=%s\n' "$?" >> case-errors.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: minimed-032-case-errors
          path: case-errors.txt
          retention-days: 1
