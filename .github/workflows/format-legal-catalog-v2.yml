name: Format typed legal catalog collector

on:
  pull_request:
    branches: [agent/bulk-clinical-catalog]
    paths:
      - tools/ingest/src/localmed_ingest/legal_catalog.py
      - tools/ingest/src/localmed_ingest/legal_catalog_v2.py
      - content/legal-module-taxonomy.yaml
      - docs/REGULATED_CATALOGS.md

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'agent/drug-law-catalogs'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/drug-law-catalogs
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Format typed collector
        run: |
          uv run --project tools/ingest ruff format \
            tools/ingest/src/localmed_ingest/legal_catalog.py \
            tools/ingest/src/localmed_ingest/legal_catalog_v2.py
      - name: Publish formatting
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/ingest/src/localmed_ingest/legal_catalog.py \
            tools/ingest/src/localmed_ingest/legal_catalog_v2.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: format typed legal catalog collector'
          git push origin HEAD:agent/drug-law-catalogs
