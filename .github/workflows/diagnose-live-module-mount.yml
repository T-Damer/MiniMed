name: Diagnose live module mount

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-live-module-mount.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply patch and capture validation
        run: |
          set +e
          python - <<'PY' > live-mount-diagnostic.txt 2>&1
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected patch anchor not found in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          Path('apps/app/src/composition/medical-core-lifecycle.ts').write_text(
              """import type { CoreStatus, MedicalCore } from '@localmed/contracts';

export interface InitializedMedicalCore {
  readonly core: MedicalCore;
  readonly status: CoreStatus;
}

async function closeQuietly(core: MedicalCore): Promise<void> {
  try {
    await core.close();
  } catch (cause) {
    console.warn('Unable to close the previous MedicalCore instance.', cause);
  }
}

export async function initializeMedicalCore(
  factory: () => Promise<MedicalCore>,
): Promise<InitializedMedicalCore> {
  const core = await factory();
  const initialized = await core.initialize();
  if (!initialized.ok) {
    await closeQuietly(core);
    throw new Error(initialized.error.message);
  }
  return { core, status: initialized.value };
}

export async function replaceMedicalCore(
  current: InitializedMedicalCore,
  factory: () => Promise<MedicalCore>,
): Promise<InitializedMedicalCore> {
  const next = await initializeMedicalCore(factory);
  await closeQuietly(current.core);
  return next;
}
""",
              encoding='utf-8',
          )

          Path('apps/app/src/composition/medical-core-lifecycle.test.ts').write_text(
              """import type { CoreStatus, MedicalCore } from '@localmed/contracts';
import { describe, expect, it, vi } from 'vitest';

import { initializeMedicalCore, replaceMedicalCore } from './medical-core-lifecycle';

const STATUS = {
  state: 'ready',
  schemaVersion: 2,
  documentCount: 1,
  contentPackIds: ['test.pack'],
} as CoreStatus;

type InitializationResult = Awaited<ReturnType<MedicalCore['initialize']>>;

function fakeCore(
  result: InitializationResult,
  events: string[],
  options: { readonly closeError?: Error; readonly label: string },
): MedicalCore {
  return {
    initialize: async () => {
      events.push(`initialize:${options.label}`);
      return result;
    },
    close: async () => {
      events.push(`close:${options.label}`);
      if (options.closeError) throw options.closeError;
    },
  } as unknown as MedicalCore;
}

describe('medical core lifecycle', () => {
  it('initializes a new core and returns its status', async () => {
    const events: string[] = [];
    const core = fakeCore({ ok: true, value: STATUS }, events, { label: 'initial' });
    const ready = await initializeMedicalCore(async () => core);
    expect(ready).toEqual({ core, status: STATUS });
    expect(events).toEqual(['initialize:initial']);
  });

  it('closes a failed candidate and keeps the current core untouched', async () => {
    const events: string[] = [];
    const currentCore = fakeCore({ ok: true, value: STATUS }, events, { label: 'current' });
    const candidate = fakeCore(
      { ok: false, error: { message: 'candidate failed' } } as InitializationResult,
      events,
      { label: 'candidate' },
    );
    await expect(
      replaceMedicalCore({ core: currentCore, status: STATUS }, async () => candidate),
    ).rejects.toThrow('candidate failed');
    expect(events).toEqual(['initialize:candidate', 'close:candidate']);
  });

  it('switches only after the candidate initializes and then closes the previous core', async () => {
    const events: string[] = [];
    const currentCore = fakeCore({ ok: true, value: STATUS }, events, { label: 'current' });
    const nextStatus = { ...STATUS, documentCount: 4 };
    const candidate = fakeCore({ ok: true, value: nextStatus }, events, { label: 'candidate' });
    const ready = await replaceMedicalCore(
      { core: currentCore, status: STATUS },
      async () => candidate,
    );
    expect(ready).toEqual({ core: candidate, status: nextStatus });
    expect(events).toEqual(['initialize:candidate', 'close:current']);
  });

  it('keeps the initialized replacement when closing the previous core fails', async () => {
    const events: string[] = [];
    const currentCore = fakeCore({ ok: true, value: STATUS }, events, {
      label: 'current',
      closeError: new Error('close failed'),
    });
    const candidate = fakeCore({ ok: true, value: STATUS }, events, { label: 'candidate' });
    const warning = vi.spyOn(console, 'warn').mockImplementation(() => undefined);
    const ready = await replaceMedicalCore(
      { core: currentCore, status: STATUS },
      async () => candidate,
    );
    expect(ready.core).toBe(candidate);
    expect(warning).toHaveBeenCalledOnce();
    warning.mockRestore();
  });
});
""",
              encoding='utf-8',
          )

          app = 'apps/app/src/app/App.tsx'
          replace_exact(app, "import { createBrowserCore } from '../composition/create-browser-core';\n", "import { createBrowserCore } from '../composition/create-browser-core';\nimport {\n  initializeMedicalCore,\n  type InitializedMedicalCore,\n  replaceMedicalCore,\n} from '../composition/medical-core-lifecycle';\n")
          replace_exact(app, "interface ReadyState {\n  readonly core: MedicalCore;\n  readonly status: CoreStatus;\n}\n\n", "")
          replace_exact(app, "  const [ready, setReady] = createSignal<ReadyState>();\n", "  const [ready, setReady] = createSignal<InitializedMedicalCore>();\n")
          replace_exact(app, "  const handleScroll = (): void => {\n    setShowScrollTop(window.scrollY > 560);\n  };\n\n  onMount(async () => {\n", "  const handleScroll = (): void => {\n    setShowScrollTop(window.scrollY > 560);\n  };\n\n  const connectInstalledModules = async (): Promise<void> => {\n    const current = ready();\n    if (!current) throw new Error('Локальный поиск ещё не готов.');\n    const next = await replaceMedicalCore(current, createBrowserCore);\n    coreToClose = next.core;\n    setReady(next);\n  };\n\n  onMount(async () => {\n")
          replace_exact(app, "      const core = await createBrowserCore();\n      coreToClose = core;\n      const initialized = await core.initialize();\n      if (!initialized.ok) {\n        setError(initialized.error.message);\n        return;\n      }\n      setReady({ core, status: initialized.value });\n", "      const initialized = await initializeMedicalCore(createBrowserCore);\n      coreToClose = initialized.core;\n      setReady(initialized);\n")
          replace_exact(app, "                  active={view() === 'modules'}\n                  onAvailableUpdates={(count) => {\n", "                  active={view() === 'modules'}\n                  onContentChanged={connectInstalledModules}\n                  onAvailableUpdates={(count) => {\n")

          modules = 'apps/app/src/features/modules/ModuleCatalogView.tsx'
          replace_exact(modules, "  readonly active: boolean;\n  readonly onAvailableUpdates?: (count: number) => void;\n", "  readonly active: boolean;\n  readonly onContentChanged?: () => Promise<void>;\n  readonly onAvailableUpdates?: (count: number) => void;\n")
          replace_exact(modules, "  const [tasks, setTasks] = createSignal<readonly ContentModuleDownloadTask[]>([]);\n  const [reloadReady, setReloadReady] = createSignal(false);\n", "  const [tasks, setTasks] = createSignal<readonly ContentModuleDownloadTask[]>([]);\n  const [contentChangePending, setContentChangePending] = createSignal(false);\n  const [connecting, setConnecting] = createSignal(false);\n")
          replace_exact(modules, "  const installedModule = (moduleId: string): InstalledContentModule | undefined =>\n", "  const connectContentChanges = async (): Promise<void> => {\n    if (connecting()) return;\n    if (!props.onContentChanged) {\n      setContentChangePending(true);\n      return;\n    }\n    setConnecting(true);\n    setWarning(null);\n    try {\n      await props.onContentChanged();\n      setContentChangePending(false);\n    } catch (cause) {\n      setContentChangePending(true);\n      setWarning(\n        cause instanceof Error\n          ? cause.message\n          : 'Новые документы сохранены, но пока не подключены к поиску.',\n      );\n    } finally {\n      setConnecting(false);\n    }\n  };\n\n  const installedModule = (moduleId: string): InstalledContentModule | undefined =>\n")
          replace_exact(modules, "      if (completed.state === 'completed') setReloadReady(true);\n      if (completed.state === 'failed') setWarning(completed.errorMessage);\n", "      if (completed.state === 'completed') await connectContentChanges();\n      if (completed.state === 'failed') setWarning(completed.errorMessage);\n")
          replace_exact(modules, "      setInstalled(runtime().listInstalled());\n      setReloadReady(true);\n", "      setInstalled(runtime().listInstalled());\n      await connectContentChanges();\n")
          replace_exact(modules, """      <Show when={reloadReady()}>
        <div class="module-reload-banner paper-card">
          <div>
            <strong>Состав базы изменился</strong>
            <span>Перезапустите локальный поиск, чтобы подключить установленные документы.</span>
          </div>
          <button type="button" onClick={() => window.location.reload()}>
            Подключить к поиску
          </button>
        </div>
      </Show>
""", """      <Show when={contentChangePending() || connecting()}>
        <div class="module-reload-banner paper-card" aria-live="polite">
          <div>
            <strong>{connecting() ? 'Подключаем базу к поиску…' : 'Нужно повторить подключение'}</strong>
            <span>
              {connecting()
                ? 'Текущий поиск продолжает работать до готовности нового состава базы.'
                : 'Документы сохранены на устройстве, но поиск пока использует прежний состав.'}
            </span>
          </div>
          <button type="button" disabled={connecting()} onClick={() => void connectContentChanges()}>
            {connecting() ? 'Подключаем…' : 'Повторить'}
          </button>
        </div>
      </Show>
""")

          replace_exact('docs/TODO.md', "- [ ] Add browser and Android-WebView storage for downloaded module databases.\n- [ ] Mount enabled downloaded modules through the existing multi-store search router.\n", "- [x] Add browser and Android-WebView storage for downloaded module databases.\n- [x] Mount enabled downloaded modules through the existing multi-store search router without a full page reload.\n")
          replace_exact('docs/CURRENT_STATE.md', "- Browser/Android-WebView module storage removes active pointers and version bytes atomically; failed\n  physical rollback or removal restores the previous persistent registry snapshot instead of leaving\n  metadata and SQLite artifacts inconsistent.\n", "- Browser/Android-WebView module storage removes active pointers and version bytes atomically; failed\n  physical rollback or removal restores the previous persistent registry snapshot instead of leaving\n  metadata and SQLite artifacts inconsistent.\n- After install, removal, or rollback, MiniMed initializes a replacement multi-store `MedicalCore` in\n  process and switches only after it is ready; the previous search core remains active on failure.\n")
          replace_exact('docs/CURRENT_STATE.md', "- Registry metadata is persistent, but immutable published module artifacts, a platform filesystem\n  backend, and a background native downloader remain unimplemented; the module page remains read-only.\n- The application composition still mounts the monolithic `0.3.3` pilot rather than the multi-store\n  router and foreground installer.\n", "- Browser/Android-WebView artifact persistence and live multi-store recomposition are implemented, but\n  native platform filesystem storage, a background downloader, source-assets, and physical-device\n  lifecycle validation remain incomplete.\n- Preview publishing workflows exist, but immutable release promotion and broader full-text module\n  coverage still need end-to-end validation on installed devices.\n")
          print('PATCH_OK')
          PY
          patch_exit=$?
          printf '\nPATCH_EXIT=%s\n' "$patch_exit" >> live-mount-diagnostic.txt
          if [ "$patch_exit" -eq 0 ]; then
            pnpm check --write >> live-mount-diagnostic.txt 2>&1
            printf '\nCHECK_EXIT=%s\n' "$?" >> live-mount-diagnostic.txt
            pnpm typecheck >> live-mount-diagnostic.txt 2>&1
            printf '\nTYPECHECK_EXIT=%s\n' "$?" >> live-mount-diagnostic.txt
            pnpm test:unit >> live-mount-diagnostic.txt 2>&1
            printf '\nUNIT_EXIT=%s\n' "$?" >> live-mount-diagnostic.txt
            pnpm build:app >> live-mount-diagnostic.txt 2>&1
            printf '\nBUILD_EXIT=%s\n' "$?" >> live-mount-diagnostic.txt
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: live-module-mount-diagnostic
          path: live-mount-diagnostic.txt
          retention-days: 1
