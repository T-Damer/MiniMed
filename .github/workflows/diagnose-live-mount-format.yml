name: Diagnose live mount formatting

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-live-mount-format.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm exec biome check apps/app/src/composition/medical-core-lifecycle.ts apps/app/src/composition/medical-core-lifecycle.test.ts apps/app/src/app/App.tsx apps/app/src/features/modules/ModuleCatalogView.tsx docs/CURRENT_STATE.md docs/TODO.md > biome-live-mount.txt 2>&1
          printf '\nexit=%s\n' "$?" >> biome-live-mount.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: live-mount-biome
          path: biome-live-mount.txt
          retention-days: 1
