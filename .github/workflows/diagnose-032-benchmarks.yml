name: Diagnose 0.3.2 benchmarks

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-032-benchmarks.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          set +e
          pnpm benchmark:all > benchmark-errors.txt 2>&1
          printf '\nexit=%s\n' "$?" >> benchmark-errors.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: minimed-032-benchmark-errors
          path: benchmark-errors.txt
          retention-days: 1
