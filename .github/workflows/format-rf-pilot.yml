name: Format RF public pilot

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  format:
    if: github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Format RF pilot'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rf-public-pilot-0.3.0-alpha.5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply repository formatting
        run: pnpm check --write
      - name: Commit formatting
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No formatting changes required.'
          else
            git commit -m 'style: format public pilot source'
            git push origin HEAD:agent/rf-public-pilot-0.3.0-alpha.5
          fi
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment 'Public-pilot formatting completed.'
