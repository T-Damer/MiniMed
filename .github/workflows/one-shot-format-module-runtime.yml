name: One-shot format module runtime

on:
  push:
    branches:
      - agent/content-module-runtime
    paths:
      - .github/workflows/one-shot-format-module-runtime.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-runtime
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec biome check --write
          packages/storage/src/ports.ts
          packages/storage/src/index.ts
          packages/storage/src/multi-medical-store.ts
          packages/storage/src/installed-module-registry.ts
          packages/storage/tests/multi-medical-store.test.ts
          packages/storage/tests/installed-module-registry.test.ts
      - run: rm .github/workflows/one-shot-format-module-runtime.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(modules): format module runtime"
          git push origin HEAD:agent/content-module-runtime
