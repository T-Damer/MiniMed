name: Apply grounded task serialization

on:
  pull_request:
    branches: [agent/drug-law-catalogs]
    paths:
      - tools/apply-grounded-task-serialization.py
      - tools/grounded-task-serialization.trigger

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/grounded-local-assistant'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/grounded-local-assistant
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: python3 tools/apply-grounded-task-serialization.py
      - name: Apply safe grounded serialization fixes
        run: |
          pnpm exec biome check --write \
            apps/app/src/features/models/serial-async-queue.ts \
            apps/app/src/features/models/serial-async-queue.test.ts \
            apps/app/src/features/models/browser-runtime.ts \
            apps/app/src/features/models/GroundedMedicalCore.ts
      - name: Check grounded serialization formatting and lint
        run: |
          pnpm exec biome check \
            apps/app/src/features/models/serial-async-queue.ts \
            apps/app/src/features/models/serial-async-queue.test.ts \
            apps/app/src/features/models/browser-runtime.ts \
            apps/app/src/features/models/GroundedMedicalCore.ts
      - name: Check grounded serialization types
        run: pnpm typecheck
      - name: Test serial task queue
        run: pnpm exec vitest run apps/app/src/features/models/serial-async-queue.test.ts
      - name: Run all unit tests
        id: unit-tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm test:unit > app-unit-tests.txt 2>&1
          status=$?
          cat app-unit-tests.txt
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-unit-test-diagnostic
          path: app-unit-tests.txt
          if-no-files-found: error
      - name: Require all unit tests
        if: steps.unit-tests.outcome != 'success'
        run: exit 1
      - name: Build application
        run: pnpm build
      - name: Publish source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/app/src/features/models/serial-async-queue.ts \
            apps/app/src/features/models/serial-async-queue.test.ts \
            apps/app/src/features/models/browser-runtime.ts \
            apps/app/src/features/models/GroundedMedicalCore.ts
          git add -u -- tools/apply-grounded-task-serialization.py
          git add -u -- tools/grounded-task-serialization.trigger || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: serialize local model structured tasks'
          git push origin HEAD:agent/grounded-local-assistant
