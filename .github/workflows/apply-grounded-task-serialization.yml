name: Apply grounded task serialization

on:
  pull_request:
    branches: [agent/drug-law-catalogs]
    paths:
      - tools/apply-grounded-task-serialization.py
      - tools/grounded-task-serialization.trigger

permissions:
  contents: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/grounded-local-assistant'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/grounded-local-assistant
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: python3 tools/apply-grounded-task-serialization.py
      - name: Apply safe grounded serialization fixes
        run: |
          pnpm exec biome check --write \
            apps/app/src/features/models/serial-async-queue.ts \
            apps/app/src/features/models/serial-async-queue.test.ts \
            apps/app/src/features/models/browser-runtime.ts \
            apps/app/src/features/models/GroundedMedicalCore.ts
      - name: Validate grounded serialization
        run: |
          pnpm exec biome check \
            apps/app/src/features/models/serial-async-queue.ts \
            apps/app/src/features/models/serial-async-queue.test.ts \
            apps/app/src/features/models/browser-runtime.ts \
            apps/app/src/features/models/GroundedMedicalCore.ts
          pnpm typecheck
          pnpm exec vitest run apps/app/src/features/models/serial-async-queue.test.ts
          pnpm test:unit
          pnpm build
      - name: Stage validated patch files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p validated-patch/apps/app/src/features/models
          cp apps/app/src/features/models/serial-async-queue.ts \
            validated-patch/apps/app/src/features/models/serial-async-queue.ts
          cp apps/app/src/features/models/serial-async-queue.test.ts \
            validated-patch/apps/app/src/features/models/serial-async-queue.test.ts
          cp apps/app/src/features/models/browser-runtime.ts \
            validated-patch/apps/app/src/features/models/browser-runtime.ts
          cp apps/app/src/features/models/GroundedMedicalCore.ts \
            validated-patch/apps/app/src/features/models/GroundedMedicalCore.ts
      - uses: actions/upload-artifact@v4
        with:
          name: grounded-task-serialization-patch
          path: validated-patch
          if-no-files-found: error
