name: One-shot capture source benchmark TypeScript

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-capture-source-benchmark-ts.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck > .github/source-benchmark-ts.txt 2>&1 || true
      - run: rm .github/workflows/one-shot-capture-source-benchmark-ts.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/source-benchmark-ts.txt .github/workflows/one-shot-capture-source-benchmark-ts.yml
          git commit -m "ci: record source benchmark TypeScript diagnostics"
          git push origin HEAD:agent/clinical-query-benchmark
