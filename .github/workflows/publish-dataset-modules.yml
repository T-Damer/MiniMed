name: Publish dataset modules

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/publish-dataset-modules.yml
      - apps/app/src/features/modules/catalog.preview.json
      - content/regulatory-rf-pilot/**
      - content/regulatory-rf-pilot-sources.yaml
      - content/full-respiratory-rf-sources.yaml
      - content/full-respiratory-rf-registry.yaml
      - tools/ingest/**
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-dataset-modules.yml
      - apps/app/src/features/modules/catalog.preview.json
      - content/regulatory-rf-pilot/**
      - content/regulatory-rf-pilot-sources.yaml
      - content/full-respiratory-rf-sources.yaml
      - content/full-respiratory-rf-registry.yaml
      - tools/ingest/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-dataset-modules-${{ github.ref }}
  cancel-in-progress: true

env:
  DATASET_TAG: datasets-preview-1
  MODULE_VERSION: 0.3.4-preview.1

jobs:
  build-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Install toolchains
        run: |
          bun install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
      - name: Build verified regulatory SQLite module
        run: bun run content:rebuild:regulatory
      - name: Download and prepare full respiratory recommendations
        shell: bash
        run: |
          set -euo pipefail
          uv run --project tools/ingest medbase sync \
            --manifest content/full-respiratory-rf-sources.yaml \
            --input-root content \
            --output-root data/synced/full-respiratory-rf \
            --cache-root .cache/localmed/full-respiratory-rf \
            --report data/build/full-respiratory-source-sync-report.json
          uv run --project tools/ingest medbase prepare \
            --registry content/full-respiratory-rf-registry.yaml \
            --source-root data/synced/full-respiratory-rf \
            --output data/intermediate/full-respiratory-rf \
            --force
          uv run --project tools/ingest medbase lint \
            --input data/intermediate/full-respiratory-rf
          uv run --project tools/ingest medbase build \
            --input data/intermediate/full-respiratory-rf \
            --output data/build/rf-respiratory-full.db \
            --report data/build/rf-respiratory-full-report.json
      - name: Stage module databases
        run: |
          mkdir -p release-datasets
          cp data/build/rf-regulatory-pilot.db \
            release-datasets/minimed-regulatory-pediatrics-0.3.4-preview.1.db
          cp data/build/rf-respiratory-full.db \
            release-datasets/minimed-respiratory-pediatrics-full-0.3.4-preview.1.db
      - name: Generate immutable manifests and channel catalog
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import sqlite3
          from datetime import datetime, timezone
          from pathlib import Path
          from typing import Any

          version = os.environ['MODULE_VERSION']
          dataset_tag = os.environ['DATASET_TAG']
          output = Path('release-datasets')
          published_at = (
              datetime.now(timezone.utc)
              .replace(microsecond=0)
              .isoformat()
              .replace('+00:00', 'Z')
          )
          module_specs = [
              {
                  'moduleId': 'minimed.regulatory.pediatrics.ru',
                  'database': output / f'minimed-regulatory-pediatrics-{version}.db',
                  'expectedPackId': 'minimed.rf-regulatory-pilot',
                  'artifactId': f'minimed.regulatory.pediatrics.ru-index-{version}',
                  'manifest': output / f'minimed-regulatory-pediatrics-{version}.manifest.json',
              },
              {
                  'moduleId': 'minimed.clinical.pediatrics.respiratory-allergy',
                  'database': output / f'minimed-respiratory-pediatrics-full-{version}.db',
                  'expectedPackId': 'minimed.clinical.pediatrics.respiratory-allergy',
                  'artifactId': f'minimed.clinical.pediatrics.respiratory-allergy-index-{version}',
                  'manifest': output / f'minimed-respiratory-pediatrics-full-{version}.manifest.json',
              },
          ]

          def normalize_checksum(value: str) -> str:
              return value if value.startswith('sha256:') else f'sha256:{value}'

          def normalize_status(value: str) -> str:
              lowered = value.lower()
              if lowered in {'superseded', 'replaced'}:
                  return 'superseded'
              if lowered in {'historical', 'expired', 'inactive'}:
                  return 'historical'
              return 'active'

          def build_module(spec: dict[str, Any]) -> tuple[dict[str, Any], dict[str, Any]]:
              database_path: Path = spec['database']
              database_bytes = database_path.read_bytes()
              digest_hex = hashlib.sha256(database_bytes).hexdigest()
              digest = f'sha256:{digest_hex}'
              database = sqlite3.connect(f'file:{database_path}?mode=ro', uri=True)
              try:
                  assert database.execute('PRAGMA quick_check').fetchone()[0] == 'ok'
                  assert not database.execute('PRAGMA foreign_key_check').fetchall()
                  pack = database.execute(
                      'SELECT id, schema_version FROM content_packs LIMIT 1'
                  ).fetchone()
                  rows = database.execute(
                      '''SELECT d.id, dv.id, dv.source_checksum, d.status
                         FROM documents d
                         JOIN document_versions dv ON dv.id = d.current_version_id
                         ORDER BY d.id, dv.id'''
                  ).fetchall()
                  chunks = database.execute('SELECT COUNT(*) FROM chunks').fetchone()[0]
                  fts_rows = database.execute('SELECT COUNT(*) FROM chunks_fts').fetchone()[0]
                  assert pack and pack[0] == spec['expectedPackId']
                  assert pack[1] == 2
                  assert rows
                  assert chunks == fts_rows and chunks > 0
              finally:
                  database.close()

              documents = [
                  {
                      'documentId': document_id,
                      'documentVersionId': document_version_id,
                      'sourceChecksum': normalize_checksum(source_checksum),
                      'status': normalize_status(status),
                      'indexArtifactId': spec['artifactId'],
                      'sourceAssetArtifactId': None,
                  }
                  for document_id, document_version_id, source_checksum, status in rows
              ]
              source_set_payload = [
                  {
                      'documentId': item['documentId'],
                      'documentVersionId': item['documentVersionId'],
                      'sourceChecksum': item['sourceChecksum'],
                      'status': item['status'],
                  }
                  for item in documents
              ]
              canonical = json.dumps(
                  source_set_payload,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(',', ':'),
              ).encode('utf-8')
              source_set_digest = f"sha256:{hashlib.sha256(canonical).hexdigest()}"
              artifact = {
                  'id': spec['artifactId'],
                  'kind': 'index',
                  'required': True,
                  'url': (
                      'https://github.com/T-Damer/MiniMed/releases/download/'
                      f'{dataset_tag}/{database_path.name}'
                  ),
                  'sha256': digest,
                  'sizeBytes': len(database_bytes),
                  'compression': 'none',
                  'sourceSetDigest': source_set_digest,
              }
              manifest = {
                  'moduleId': spec['moduleId'],
                  'version': version,
                  'schemaVersion': 2,
                  'appCompatibility': {'min': '0.3.3', 'max': None},
                  'coreCatalogVersion': '1',
                  'sourceSetDigest': source_set_digest,
                  'artifacts': [artifact],
                  'documents': documents,
                  'publishedAt': published_at,
              }
              spec['manifest'].write_text(
                  json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )
              return (
                  {
                      'moduleId': spec['moduleId'],
                      'version': version,
                      'documents': len(documents),
                      'chunks': chunks,
                      'bytes': len(database_bytes),
                      'sha256': digest,
                      'sourceSetDigest': source_set_digest,
                  },
                  {
                      'version': version,
                      'releaseState': 'published',
                      'sourceSetDigest': source_set_digest,
                      'sizes': {
                          'downloadBytes': len(database_bytes),
                          'installedBytes': len(database_bytes),
                          'sourceAssetsDownloadBytes': None,
                          'precision': 'exact',
                      },
                      'artifacts': [artifact],
                      'documents': documents,
                      'previewDocumentCount': len(documents),
                  },
              )

          summaries: list[dict[str, Any]] = []
          updates: dict[str, dict[str, Any]] = {}
          checksum_lines: list[str] = []
          for spec in module_specs:
              summary, update = build_module(spec)
              summaries.append(summary)
              updates[spec['moduleId']] = update
              checksum_lines.append(
                  f"{summary['sha256'].removeprefix('sha256:')}  {spec['database'].name}"
              )

          catalog = json.loads(
              Path('apps/app/src/features/modules/catalog.preview.json').read_text(encoding='utf-8')
          )
          catalog['catalogVersion'] = f'datasets-{version}'
          catalog['publishedAt'] = published_at
          for target in catalog['modules']:
              update = updates.get(target['id'])
              if not update:
                  continue
              target.update(update)
              target['compatibility']['minAppVersion'] = '0.3.3'
          (output / 'catalog.preview.json').write_text(
              json.dumps(catalog, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          (output / 'SHA256SUMS.txt').write_text(
              '\n'.join(checksum_lines) + '\n', encoding='utf-8'
          )
          print(json.dumps(summaries, ensure_ascii=False, indent=2))
          PY
      - name: Validate generated channel catalog
        run: |
          bunx tsx -e "import { readFileSync } from 'node:fs'; import { ContentModuleCatalogSchema } from './packages/contracts/src/content-modules.ts'; ContentModuleCatalogSchema.parse(JSON.parse(readFileSync('release-datasets/catalog.preview.json','utf8'))); console.log('catalog valid')"
      - uses: actions/upload-artifact@v4
        with:
          name: minimed-datasets-preview-1
          path: release-datasets
          if-no-files-found: error
          retention-days: 30
      - name: Publish immutable GitHub Release assets
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$DATASET_TAG" >/dev/null 2>&1; then
            gh release upload "$DATASET_TAG" release-datasets/* --clobber
          else
            gh release create "$DATASET_TAG" release-datasets/* \
              --title 'MiniMed dataset preview channel' \
              --notes 'Immutable preview SQLite modules and their validated channel catalog.' \
              --prerelease \
              --target "$GITHUB_SHA"
          fi
