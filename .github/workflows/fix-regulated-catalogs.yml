name: Fix regulated catalog formatting

on:
  pull_request:
    branches: [agent/bulk-clinical-catalog]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/drug-law-catalogs'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/drug-law-catalogs
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Format and validate
        run: |
          pnpm check --write
          uv run --project tools/ingest ruff format tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check --fix tools/ingest/src tools/ingest/tests
          pnpm check
          pnpm typecheck
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests/test_regulated_catalogs.py
      - name: Publish formatting
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: format regulated catalog inventories'
          git push origin HEAD:agent/drug-law-catalogs
