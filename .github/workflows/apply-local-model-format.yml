name: Apply local model formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-local-model-format
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/local-model-auto-selection'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check --write
      - name: Commit formatted files
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-local-model-format.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style(models): format local model harness'
          git push origin HEAD:agent/local-model-auto-selection
