name: Publish verified MiniMed 0.3.3 artifact

# One-shot trigger after the publisher workflow was installed on main.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/publish-verified-release-0.3.3.yml

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-verified-release-0.3.3
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'ops/publish-release-0.3.3'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v0.3.3
      ARTIFACT_RUN_ID: '29948953134'
      ARTIFACT_NAME: MiniMed-0.3.3-rf-public-pilot
      EXPECTED_ARTIFACT_DIGEST: cc595f9e170b93694d442f6f3bd25733ab0180109117ec4a318c56ce25b7eb71
      RELEASE_TARGET: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Download verified APK evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verified-release
          gh run download "$ARTIFACT_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$ARTIFACT_NAME" --dir verified-release
          find verified-release -maxdepth 3 -type f -print | sort
      - name: Verify downloaded APK and evidence
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find verified-release -type f -name 'MiniMed-0.3.3-rf-public-pilot-debug.apk' -print -quit)"
          evidence="$(find verified-release -type f -name 'VERIFICATION.json' -print -quit)"
          checksum="$(find verified-release -type f -name 'APK-SHA256.txt' -print -quit)"
          test -n "$apk" -a -s "$apk"
          test -n "$evidence" -a -s "$evidence"
          test -n "$checksum" -a -s "$checksum"
          checksum_dir="$(dirname "$checksum")"
          (cd "$checksum_dir" && sha256sum --check "$(basename "$checksum")")
          APK="$apk" EVIDENCE="$evidence" TARGET="$RELEASE_TARGET" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          apk = Path(os.environ['APK'])
          evidence = json.loads(Path(os.environ['EVIDENCE']).read_text(encoding='utf-8'))
          actual = hashlib.sha256(apk.read_bytes()).hexdigest()
          assert evidence['releaseVersion'] == '0.3.3'
          assert evidence['apk']['sha256'] == actual
          assert evidence['apk']['bytes'] == apk.stat().st_size
          assert evidence['embeddedDatabase']['pack']['id'] == 'minimed.rf-public-pilot'
          assert evidence['embeddedDatabase']['pack']['version'] == '0.3.3'
          assert evidence['embeddedDatabase']['pack']['schemaVersion'] >= 2
          assert evidence['embeddedDatabase']['documents'] == 15
          print(f'Verified APK sha256={actual} target={os.environ["TARGET"]}')
          PY
          printf '%s\n' "$apk" > verified-release/APK-PATH.txt
      - name: Create APK-only prerelease
        shell: bash
        run: |
          set -euo pipefail
          apk="$(cat verified-release/APK-PATH.txt)"
          notes=$(cat <<'EOF'
          MiniMed 0.3.3 is a debug-signed engineering prerelease of the offline-first medical reference.

          Included in this APK:
          - the verified 15-document Russian clinical/medication starter pack;
          - persistent installed-module registry metadata with rollback-state preservation;
          - an optional six-model local AI catalog with automatic device-fit selection, settings, status toast, startup viability benchmark, and deterministic fallback;
          - CPU/WebAssembly GGUF loading in browsers and the current Android WebView path.

          Important boundaries:
          - model weights are downloaded separately and are not bundled in the APK;
          - the local model is not used for diagnosis, treatment, retrieval ranking, or generated clinical answers;
          - native Android GPU/NPU acceleration, production signing, full-text downloadable modules, and physical-device model qualification remain follow-up work.
          EOF
          )
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$apk" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "$apk" \
              --repo "$GITHUB_REPOSITORY" \
              --title "MiniMed 0.3.3" \
              --notes "$notes" \
              --prerelease \
              --target "$RELEASE_TARGET"
          fi
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json url,tagName,name,isPrerelease,targetCommitish
