name: One-shot capture Russian query Pyright

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-capture-query-pyright.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests \
            > .github/russian-query-pyright.txt 2>&1 || true
      - run: rm .github/workflows/one-shot-capture-query-pyright.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/russian-query-pyright.txt .github/workflows/one-shot-capture-query-pyright.yml
          git commit -m "ci: record Russian query Pyright diagnostics"
          git push origin HEAD:agent/clinical-query-benchmark
