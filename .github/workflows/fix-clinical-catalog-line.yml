name: Fix clinical catalog line

on:
  pull_request:
    branches: [agent/doctor-datasets-model-diagnostics]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/bulk-clinical-catalog'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/bulk-clinical-catalog
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Split the remaining long error message
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/clinical_catalog.py')
          text = path.read_text(encoding='utf-8')
          before = '''                f"Coverage override for {official_id} references unknown modules: {', '.join(unknown)}"\n'''
          after = '''                f"Coverage override for {official_id} references unknown modules: "\n                f"{', '.join(unknown)}"\n'''
          if before not in text and after not in text:
              raise SystemExit('Expected coverage-override error line was not found.')
          path.write_text(text.replace(before, after, 1), encoding='utf-8')
          PY
          uv run --project tools/ingest ruff format tools/ingest/src/localmed_ingest/clinical_catalog.py
          uv run --project tools/ingest ruff check tools/ingest/src/localmed_ingest/clinical_catalog.py
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests/test_clinical_catalog.py
      - name: Publish fix
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/ingest/src/localmed_ingest/clinical_catalog.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix(ingest): wrap clinical catalog error message'
          git push origin HEAD:agent/bulk-clinical-catalog
