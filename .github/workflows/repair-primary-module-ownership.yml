name: Repair primary module ownership

on:
  pull_request:
    branches: [agent/drug-law-catalogs]
    paths:
      - docs/CATALOG_METADATA_MODULES.md

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'agent/catalog-module-builder'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/catalog-module-builder
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Enforce one canonical owning module
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/catalog_module_builder.py')
          text = path.read_text(encoding='utf-8')

          validator_start = text.index(
              '        known = set(record_ids)\n',
              text.index('    def validate_records'),
          )
          validator_end = text.index('        return self\n', validator_start) + len(
              '        return self\n'
          )
          validator = '''        known = set(record_ids)
          module_ids = [module.module_id for module in self.modules]
          if len(module_ids) != len(set(module_ids)):
              raise ValueError("Coverage ledger contains duplicate moduleId values.")
          module_records = {
              module.module_id: set(module.record_ids) for module in self.modules
          }
          for module in self.modules:
              if len(module.record_ids) != len(set(module.record_ids)):
                  raise ValueError(
                      f"Module {module.module_id} contains duplicate record references."
                  )
              missing = [
                  record_id for record_id in module.record_ids if record_id not in known
              ]
              if missing:
                  raise ValueError(
                      f"Module {module.module_id} references unknown records: "
                      f"{', '.join(missing)}"
                  )
          for record, record_id in zip(self.records, record_ids, strict=True):
              primary_value = record.get("primaryModuleId")
              primary = primary_value.strip() if isinstance(primary_value, str) else ""
              if not primary:
                  raise ValueError(
                      f"Coverage-ledger record {record_id} requires primaryModuleId."
                  )
              if primary not in module_records:
                  raise ValueError(
                      f"Record {record_id} references unknown primary module {primary}."
                  )
              if record_id not in module_records[primary]:
                  raise ValueError(
                      f"Primary module {primary} does not include record {record_id}."
                  )
          return self
          '''.replace('          ', '        ')
          text = text[:validator_start] + validator + text[validator_end:]

          build_start = text.index(
              '    builds: list[CatalogModuleBuild] = []\n',
              text.index('def build_catalog_metadata_modules'),
          )
          build_end = text.index(
              '    (target / "module-build-report.json").write_text(',
              build_start,
          )
          build = '''    builds: list[CatalogModuleBuild] = []
          warnings: list[str] = []
          packaged_ids: list[str] = []
          for module in ledger.modules:
              primary_record_ids = [
                  record_id
                  for record_id in module.record_ids
                  if _clean(records[record_id].get("primaryModuleId")) == module.module_id
              ]
              if not primary_record_ids:
                  warnings.append(
                      f"module skipped without primary records: {module.module_id}"
                  )
                  continue
              module_dir = target / _safe_stem(module.module_id)
              module_dir.mkdir(parents=True)
              (module_dir / "manifest.yaml").write_text(
                  yaml.safe_dump(
                      _module_manifest(module, version, timestamp),
                      allow_unicode=True,
                      sort_keys=False,
                  ),
                  encoding="utf-8",
              )
              aliases: list[dict[str, object]] = []
              document_ids: list[str] = []
              coverage_counts: dict[str, int] = {}
              for record_id in primary_record_ids:
                  record = records[record_id]
                  document_id, front, body, record_aliases = _render_record(family, record)
                  document_ids.append(document_id)
                  packaged_ids.append(document_id)
                  aliases.extend(record_aliases)
                  coverage = _clean(record.get("coverageState")) or "metadata-only"
                  coverage_counts[coverage] = coverage_counts.get(coverage, 0) + 1
                  document_path = module_dir / f"{_safe_stem(document_id)}.md"
                  document_path.write_text(
                      f"---\\n{front}\\n---\\n\\n{body}",
                      encoding="utf-8",
                  )
              unique_aliases: dict[str, dict[str, object]] = {}
              for alias in aliases:
                  alias_id = cast(str, alias["id"])
                  if alias_id in unique_aliases:
                      warnings.append(f"duplicate alias ignored: {alias_id}")
                      continue
                  unique_aliases[alias_id] = alias
              (module_dir / "aliases.yaml").write_text(
                  yaml.safe_dump(
                      {"aliases": list(unique_aliases.values())},
                      allow_unicode=True,
                      sort_keys=False,
                  ),
                  encoding="utf-8",
              )
              builds.append(
                  CatalogModuleBuild(
                      module_id=module.module_id,
                      title=module.title,
                      directory=str(module_dir.relative_to(target)),
                      record_count=len(document_ids),
                      document_ids=document_ids,
                      coverage_counts=coverage_counts,
                  )
              )
          if len(packaged_ids) != len(set(packaged_ids)):
              raise ValueError("Catalog module generation produced duplicate document IDs.")
          if set(packaged_ids) != set(records):
              missing = sorted(set(records) - set(packaged_ids))
              unexpected = sorted(set(packaged_ids) - set(records))
              raise ValueError(
                  "Catalog module generation did not preserve canonical ownership: "
                  f"missing={missing}, unexpected={unexpected}."
              )
          report = CatalogModuleBuildReport(
              family=family,
              version=version,
              built_at=timestamp,
              source_ledger_checksum=_sha256_file(ledger_path),
              modules=builds,
              total_documents=len(packaged_ids),
              warnings=warnings,
          )
          '''.replace('          ', '    ')
          text = text[:build_start] + build + text[build_end:]
          path.write_text(text, encoding='utf-8')

          test_path = Path('tools/ingest/tests/test_catalog_module_builder.py')
          test = test_path.read_text(encoding='utf-8')
          if 'def test_secondary_categories_do_not_duplicate_documents' not in test:
              test += '''\n\ndef test_secondary_categories_do_not_duplicate_documents(tmp_path: Path) -> None:\n    ledger = tmp_path / "secondary.json"\n    record_id = "kr.rf.secondary"\n    primary = "minimed.clinical.respiratory.ru"\n    secondary = "minimed.clinical.pediatrics.ru"\n    write_ledger(\n        ledger,\n        [\n            {\n                "recordId": record_id,\n                "officialId": "secondary",\n                "title": "Тестовая рекомендация",\n                "versionLabel": "2026",\n                "status": "active",\n                "coverageState": "metadata-only",\n                "rights": "unknown",\n                "moduleIds": [primary, secondary],\n                "primaryModuleId": primary,\n                "specialties": ["pediatrics", "pulmonology"],\n            }\n        ],\n        [\n            {\n                "moduleId": primary,\n                "title": "Пульмонология",\n                "recordIds": [record_id],\n                "coverageCounts": {"metadata-only": 1},\n            },\n            {\n                "moduleId": secondary,\n                "title": "Общая педиатрия",\n                "recordIds": [record_id],\n                "coverageCounts": {"metadata-only": 1},\n            },\n        ],\n    )\n    output = tmp_path / "secondary-modules"\n\n    report = build_catalog_metadata_modules(\n        ledger,\n        output,\n        family="clinical",\n        version="2026.07.1",\n        built_at="2026-07-23T00:00:00Z",\n    )\n\n    assert report.total_documents == 1\n    assert [module.module_id for module in report.modules] == [primary]\n    assert report.modules[0].document_ids == [record_id]\n    assert not (output / secondary).exists()\n    assert any(secondary in warning for warning in report.warnings)\n'''
          test_path.write_text(test, encoding='utf-8')

          workflow_path = Path('.github/workflows/catalog-metadata-modules.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          old = '''          if report['totalDocuments'] < 6:
              raise SystemExit('Fixture metadata modules lost catalog records.')
          databases = list(Path('data/build/fixture-clinical-databases').glob('*.db'))
'''
          new = '''          document_ids = [
              document_id
              for module in report['modules']
              for document_id in module['documentIds']
          ]
          if report['totalDocuments'] != 6 or len(document_ids) != 6:
              raise SystemExit('Fixture metadata modules lost catalog records.')
          if len(document_ids) != len(set(document_ids)):
              raise SystemExit('Fixture metadata modules duplicated catalog records.')
          databases = list(Path('data/build/fixture-clinical-databases').glob('*.db'))
'''
          if old not in workflow:
              raise SystemExit('Fixture report assertion block not found.')
          workflow_path.write_text(workflow.replace(old, new, 1), encoding='utf-8')
          PY
          uv run --project tools/ingest ruff format \
            tools/ingest/src/localmed_ingest/catalog_module_builder.py \
            tools/ingest/tests/test_catalog_module_builder.py
      - name: Validate canonical module ownership
        shell: bash
        run: |
          set -euo pipefail
          uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests/test_catalog_module_builder.py
          rm -rf data/build/fixture-clinical-ledger.json \
            data/build/fixture-clinical-modules \
            data/build/fixture-clinical-databases
          uv run --project tools/ingest medbase-clinical-catalog build \
            --source tools/ingest/tests/fixtures/clinical-catalog-sample.json \
            --taxonomy content/clinical-module-taxonomy.yaml \
            --overrides content/clinical-coverage-overrides.yaml \
            --generated-at 2026-07-23T00:00:00Z \
            --output data/build/fixture-clinical-ledger.json
          uv run --project tools/ingest medbase-catalog-modules build \
            --ledger data/build/fixture-clinical-ledger.json \
            --output-root data/build/fixture-clinical-modules \
            --family clinical \
            --version 2026.07.fixture.1 \
            --built-at 2026-07-23T00:00:00Z
          mkdir -p data/build/fixture-clinical-databases
          while IFS= read -r manifest; do
            workspace="$(dirname "$manifest")"
            stem="$(basename "$workspace")"
            uv run --project tools/ingest medbase lint --input "$workspace"
            uv run --project tools/ingest medbase build \
              --input "$workspace" \
              --output "data/build/fixture-clinical-databases/${stem}.db" \
              --report "data/build/fixture-clinical-databases/${stem}.report.json"
          done < <(find data/build/fixture-clinical-modules -mindepth 2 -maxdepth 2 \
            -name manifest.yaml -print | sort)
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path('data/build/fixture-clinical-modules/module-build-report.json').read_text()
          )
          document_ids = [
              document_id
              for module in report['modules']
              for document_id in module['documentIds']
          ]
          assert report['totalDocuments'] == 6
          assert len(document_ids) == len(set(document_ids)) == 6
          databases = list(Path('data/build/fixture-clinical-databases').glob('*.db'))
          assert len(databases) == len(report['modules'])
          PY
      - name: Publish ownership repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/ingest/src/localmed_ingest/catalog_module_builder.py \
            tools/ingest/tests/test_catalog_module_builder.py \
            .github/workflows/catalog-metadata-modules.yml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: package each catalog record in one primary module'
          git push origin HEAD:agent/catalog-module-builder
