name: iOS simulator smoke build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run native:source:check
      - run: bun run build:app
      - run: bun run native:sync:ios
      - name: Build unsigned simulator app
        working-directory: apps/app/ios/App
        run: >-
          xcodebuild
          -project App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
