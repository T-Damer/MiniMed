name: iOS simulator smoke build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm native:source:check
      - run: pnpm build:app
      - run: pnpm native:sync:ios
      - name: Build unsigned simulator app
        working-directory: apps/app/ios/App
        run: >-
          xcodebuild
          -project App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
