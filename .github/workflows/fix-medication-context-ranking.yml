name: Fix medication context ranking
run-name: Verify current therapy stays out of diagnosis ranking

on:
  push:
    branches:
      - agent/content-module-installer
    paths:
      - .github/workflows/fix-medication-context-ranking.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-medication-context-ranking.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.ref_name == 'agent/content-module-installer' || github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/search-lexical/src/analysis.ts')
          text = path.read_text(encoding='utf-8')
          old = """  const negativeTerms = termsInsideNegativeFacts(facts);
  const originalTerms = termsWithStems([normalizedQuery]);
  const positiveTerms = originalTerms.filter((term) => !negativeTerms.has(term));
  const negativeRanges = facts
"""
          new = """  const negativeTerms = termsInsideNegativeFacts(facts);
  const medicationTerms = new Set(
    facts
      .filter((fact) => fact.kind === 'medication')
      .flatMap((fact) => termsWithStems([fact.value, fact.normalizedValue])),
  );
  const originalTerms = termsWithStems([normalizedQuery]);
  const positiveTerms = originalTerms.filter(
    (term) => !negativeTerms.has(term) && !medicationTerms.has(term),
  );
  const negativeRanges = facts
"""
          if old not in text:
              raise SystemExit('missing medication-term branch target')
          text = text.replace(old, new, 1)

          old = """    expansion.matchedAliases
      .filter((alias) => {
        const index = normalizedQuery.indexOf(normalizeSurfaceText(alias.alias));
"""
          new = """    expansion.matchedAliases
      .filter((alias) => {
        if (alias.category === 'medication') return false;
        const index = normalizedQuery.indexOf(normalizeSurfaceText(alias.alias));
"""
          if old not in text:
              raise SystemExit('missing medication-alias branch target')
          text = text.replace(old, new, 1)

          old = """  const intentSpec = INTENT_BRANCH[intent.primary];
  if (intent.primary !== 'unknown') {
    const branch = makeBranch(
      'intent',
      'intent',
      intentSpec.label,
      query,
      [normalizedQuery, intentSpec.terms],
      intentSpec.weight,
    );
"""
          new = """  const intentSpec = INTENT_BRANCH[intent.primary];
  if (intent.primary !== 'unknown') {
    const intentQuery =
      intent.primary === 'medication' ? normalizedQuery : positiveTerms.join(' ');
    const branch = makeBranch(
      'intent',
      'intent',
      intentSpec.label,
      query,
      [intentQuery, intentSpec.terms],
      intentSpec.weight,
    );
"""
          if old not in text:
              raise SystemExit('missing sanitized intent branch target')
          text = text.replace(old, new, 1)

          old = """      if (/^(?:без|нет|отрицает|не\s+)/u.test(clauseNormalized)) continue;
      const branch = makeBranch(
"""
          new = """      if (
        /^(?:без|нет|отрицает|не\s+)/u.test(clauseNormalized) ||
        /(?:принимает|получает|назначен[а-я]*|терапия)/u.test(clauseNormalized)
      ) {
        continue;
      }
      const branch = makeBranch(
"""
          if old not in text:
              raise SystemExit('missing medication clause target')
          text = text.replace(old, new, 1)

          text = text.replace(
              "[normalizedQuery, 'дифференциальная диагностика отличия критерии']",
              "[positiveTerms.join(' '), 'дифференциальная диагностика отличия критерии']",
              1,
          )
          text = text.replace(
              "[normalizedQuery, 'диагностика обследование лабораторная инструментальная']",
              "[positiveTerms.join(' '), 'диагностика обследование лабораторная инструментальная']",
              1,
          )
          path.write_text(text, encoding='utf-8')

          path = Path('packages/search-lexical/tests/query.test.ts')
          text = path.read_text(encoding='utf-8')
          test = r"""

  it('keeps current medication out of diagnostic branches', () => {
    const plan = analyzeClinicalQuery(
      'Мальчик 5 лет, температура 39,2, часто дышит, кашля нет, принимает аугментин',
      aliases,
    );
    const diagnosticBranches = plan.branches.filter(
      (branch) => branch.id !== 'medications' && branch.kind !== 'medication',
    );
    const medication = plan.branches.find((branch) => branch.id === 'medications');
    expect(diagnosticBranches.flatMap((branch) => branch.terms)).not.toContain('аугментин');
    expect(diagnosticBranches.flatMap((branch) => branch.terms)).not.toContain('амоксициллин');
    expect(medication?.terms).toEqual(
      expect.arrayContaining(['аугментин', 'амоксициллин']),
    );
    expect(plan.branches.find((branch) => branch.id === 'clinical')?.terms).toContain('тахипноэ');
  });
"""
          if not text.rstrip().endswith('});'):
              raise SystemExit('unexpected query test ending')
          text = text.rstrip()[:-3] + test + '\n});\n'
          path.write_text(text, encoding='utf-8')
          PY
      - run: pnpm exec biome check --write packages/search-lexical/src/analysis.ts packages/search-lexical/tests/query.test.ts
      - run: pnpm --filter @localmed/search-lexical test
      - run: pnpm benchmark:cases
      - run: |
          rm -f \
            .github/workflows/diagnose-032-benchmarks.yml \
            .github/workflows/fix-medication-context-ranking.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(search): separate current therapy from diagnosis"
          git push origin HEAD:agent/content-module-installer
