name: One-shot fix and format module installer

on:
  push:
    branches:
      - agent/content-module-installer
    paths:
      - .github/workflows/one-shot-fix-format-module-installer.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/core/tests/content-module-installer.test.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "import type {\n  ContentModuleArtifactSchema,",
              "import {\n  ContentModuleArtifactSchema,\n  type",
              1,
          )
          text = text.replace(
              "    registry.activate(validatedInstallation(module.id));",
              "    registry.activate({ ...validatedInstallation(module.id), required: true });",
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
      - run: >-
          pnpm exec biome check --write
          packages/core/src/content-module-installer.ts
          packages/core/src/index.ts
          packages/core/tests/content-module-installer.test.ts
      - run: rm .github/workflows/one-shot-fix-format-module-installer.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(modules): format foreground installer"
          git push origin HEAD:agent/content-module-installer
