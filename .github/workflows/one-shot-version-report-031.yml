name: One-shot version report 0.3.1

on:
  push:
    branches:
      - release/0.3.1
    paths:
      - .github/workflows/one-shot-version-report-031.yml

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: release/0.3.1
      - run: |
          git grep -nE '0\.3\.0-alpha\.[0-9]+|versionCode [0-9]+|RELEASE_VERSION|RELEASE_TAG|APK_NAME' > .github/version-audit-0.3.1.txt || true
          rm .github/workflows/one-shot-version-report-031.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/version-audit-0.3.1.txt .github/workflows/one-shot-version-report-031.yml
          git commit -m "ci: record 0.3.1 version audit"
          git push origin HEAD:release/0.3.1
