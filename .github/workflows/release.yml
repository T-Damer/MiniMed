name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer tag
        required: true

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: pnpm content:build
      - run: pnpm native:source:check
      - run: pnpm build
      - run: pnpm benchmark:all
      - run: tar -czf localmed-web-${{ inputs.tag }}.tar.gz -C apps/app dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            localmed-web-${{ inputs.tag }}.tar.gz
            data/build/core-demo.db
            data/build/core-demo-report.json
            data/build/search-benchmark.json
