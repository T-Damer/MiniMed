name: Fix HTML ingestion feature

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event.pull_request.head.ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - name: Harden full HTML recommendation synchronization
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          sync_path = Path('tools/ingest/src/localmed_ingest/source_sync.py')
          text = sync_path.read_text(encoding='utf-8')
          original = '"Accept": "application/pdf,text/plain,text/markdown,application/octet-stream;q=0.8",'
          long_html = '"Accept": "text/html,application/xhtml+xml,application/pdf,text/plain,text/markdown,application/octet-stream;q=0.8",'
          formatted_html = '''"Accept": (
                          "text/html,application/xhtml+xml,application/pdf,"
                          "text/plain,text/markdown,application/octet-stream;q=0.8"
                      ),'''
          if original in text:
              text = text.replace(original, formatted_html)
          elif long_html in text:
              text = text.replace(long_html, formatted_html)
          elif formatted_html not in text:
              raise SystemExit('Expected source-sync Accept header was not found.')
          sync_path.write_text(text, encoding='utf-8')

          cli_path = Path('tools/ingest/src/localmed_ingest/cli.py')
          cli = cli_path.read_text(encoding='utf-8')
          old_timeout = 'timeout_seconds: Annotated[float, typer.Option("--timeout-seconds", min=1)] = 60.0,'
          new_timeout = 'timeout_seconds: Annotated[float, typer.Option("--timeout-seconds", min=1)] = 180.0,'
          if old_timeout in cli:
              cli = cli.replace(old_timeout, new_timeout, 1)
          elif new_timeout not in cli:
              raise SystemExit('Expected sync timeout declaration was not found.')
          cli_path.write_text(cli, encoding='utf-8')

          test_path = Path('tools/ingest/tests/test_html_import.py')
          test = test_path.read_text(encoding='utf-8')
          long_text = '"Рекомендовано проводить клиническую оценку пациента, учитывать возраст, тяжесть состояния, "'
          split_text = '"Рекомендовано проводить клиническую оценку пациента, учитывать возраст, "\n            "тяжесть состояния, "'
          if long_text in test:
              test = test.replace(long_text, split_text)
          test_path.write_text(test, encoding='utf-8')
          PY
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Format Python ingestion
        run: uv run --project tools/ingest ruff format tools/ingest/src tools/ingest/tests
      - name: Capture Python validation diagnostics
        shell: bash
        run: |
          set +e
          {
            echo '=== RUFF CHECK ==='
            uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
            echo "RUFF_EXIT=$?"
            echo
            echo '=== PYRIGHT ==='
            uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
            echo "PYRIGHT_EXIT=$?"
            echo
            echo '=== PYTEST ==='
            uv run --project tools/ingest pytest tools/ingest/tests
            echo "PYTEST_EXIT=$?"
          } > docs/.html-ingest-diagnostics.txt 2>&1
          set -e
      - name: Capture live dataset diagnostics
        shell: bash
        run: |
          set +e
          rm -rf data/synced/full-respiratory-rf data/intermediate/full-respiratory-rf
          {
            echo '=== SOURCE SYNC ==='
            uv run --project tools/ingest medbase sync \
              --manifest content/full-respiratory-rf-sources.yaml \
              --input-root content \
              --output-root data/synced/full-respiratory-rf \
              --cache-root .cache/localmed/full-respiratory-rf \
              --report data/build/full-respiratory-source-sync-report.json
            sync_exit=$?
            echo "SYNC_EXIT=$sync_exit"
            if [ "$sync_exit" -eq 0 ]; then
              echo
              echo '=== PREPARE ==='
              uv run --project tools/ingest medbase prepare \
                --registry content/full-respiratory-rf-registry.yaml \
                --source-root data/synced/full-respiratory-rf \
                --output data/intermediate/full-respiratory-rf \
                --force
              prepare_exit=$?
              echo "PREPARE_EXIT=$prepare_exit"
            else
              prepare_exit=99
            fi
            if [ "$prepare_exit" -eq 0 ]; then
              echo
              echo '=== LINT ==='
              uv run --project tools/ingest medbase lint \
                --input data/intermediate/full-respiratory-rf
              lint_exit=$?
              echo "LINT_EXIT=$lint_exit"
            else
              lint_exit=99
            fi
            if [ "$lint_exit" -eq 0 ]; then
              echo
              echo '=== BUILD ==='
              uv run --project tools/ingest medbase build \
                --input data/intermediate/full-respiratory-rf \
                --output data/build/rf-respiratory-full.db \
                --report data/build/rf-respiratory-full-report.json
              echo "BUILD_EXIT=$?"
            fi
          } > docs/.full-dataset-diagnostics.txt 2>&1
          set -e
      - name: Publish formatting, downloader fix and diagnostics
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/ingest/src tools/ingest/tests \
            docs/.html-ingest-diagnostics.txt docs/.full-dataset-diagnostics.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: capture full recommendation ingestion diagnostics'
          git push origin HEAD:agent/doctor-datasets-model-diagnostics
