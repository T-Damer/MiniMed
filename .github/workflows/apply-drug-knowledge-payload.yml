name: Apply offline drug knowledge payload

on:
  push:
    branches: [agent/drug-knowledge-graph]
    paths:
      - .agent/payload.part*
      - .github/workflows/apply-drug-knowledge-payload.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-offline-drug-knowledge-payload
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'agent/drug-knowledge-graph')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-knowledge-graph
          fetch-depth: 0
      - name: Verify and apply payload
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/payload.part* | base64 --decode > /tmp/minimed-agent-payload.tar.gz
          echo '188718a00bdf83487ff9bf7969ba36a8ca0d6e7fb93d5ff9ba451cbef5d9f6a8  /tmp/minimed-agent-payload.tar.gz' | sha256sum --check
          tar -tzf /tmp/minimed-agent-payload.tar.gz
          tar -xzf /tmp/minimed-agent-payload.tar.gz
          rm -rf .agent
          rm -f .github/workflows/apply-drug-knowledge-payload.yml
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Install locked dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
      - name: Validate product changes
        shell: bash
        run: |
          set -euo pipefail
          pnpm check
          pnpm typecheck
          pnpm test:unit
          pnpm schema:check
          uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests
      - name: Commit tested product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'feat(content): add offline drug knowledge pipeline'
          git push origin HEAD:agent/drug-knowledge-graph
