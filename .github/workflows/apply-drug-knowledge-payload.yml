name: Apply offline drug knowledge payload

on:
  push:
    branches: [agent/drug-knowledge-graph]
    paths:
      - .agent/payload.part*
      - .github/workflows/apply-drug-knowledge-payload.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-offline-drug-knowledge-payload
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/drug-knowledge-graph'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-knowledge-graph
          fetch-depth: 0
      - name: Verify and apply payload
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/payload.part* | base64 --decode > /tmp/minimed-agent-payload.tar.gz
          echo '188718a00bdf83487ff9bf7969ba36a8ca0d6e7fb93d5ff9ba451cbef5d9f6a8  /tmp/minimed-agent-payload.tar.gz' | sha256sum --check
          tar -xzf /tmp/minimed-agent-payload.tar.gz
          rm -rf .agent
          rm -f .github/workflows/apply-drug-knowledge-payload.yml
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Install locked dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
      - name: Run validation and retain diagnostics
        shell: bash
        run: |
          set -euo pipefail
          report=/tmp/minimed-validation
          mkdir -p "$report"
          failed=0
          run_check() {
            label="$1"
            shift
            set +e
            "$@" >"$report/$label.log" 2>&1
            status=$?
            set -e
            printf '%s\n' "$status" >"$report/$label.status"
            echo "=== $label (exit $status) ==="
            tail -n 120 "$report/$label.log"
            if [ "$status" -ne 0 ]; then failed=1; fi
          }
          run_check pnpm-check pnpm check
          run_check typecheck pnpm typecheck
          run_check unit-tests pnpm test:unit
          run_check schema-check pnpm schema:check
          run_check ruff-format uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
          run_check ruff-check uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
          run_check pyright uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          run_check pytest uv run --project tools/ingest pytest tools/ingest/tests
          printf '%s\n' "$failed" >"$report/failed"
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drug-knowledge-validation
          path: /tmp/minimed-validation
          if-no-files-found: error
          retention-days: 3
      - name: Enforce validation result
        run: test "$(cat /tmp/minimed-validation/failed)" = '0'
      - name: Commit tested product changes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'feat(content): add offline drug knowledge pipeline'
          git push origin HEAD:agent/drug-knowledge-graph
