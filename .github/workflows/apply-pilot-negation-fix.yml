name: Apply pilot negation fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/rf-public-pilot-0.3.0-alpha.5'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rf-public-pilot-0.3.0-alpha.5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply temporal negation boundary and regression test
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          analysis = Path('packages/search-lexical/src/analysis.ts')
          text = analysis.read_text(encoding='utf-8')
          anchor = (
              "  if (explicitBoundary >= 0) boundary = Math.min(boundary, explicitBoundary);\n"
              "\n"
              "  return (\n"
          )
          replacement = (
              "  if (explicitBoundary >= 0) boundary = Math.min(boundary, explicitBoundary);\n"
              "\n"
              "  // A temporal reassessment phrase ends the negated finding. In `нет ответа на антибиотик через\n"
              "  // 72 часа при пневмонии`, only the absent treatment response is negative; the diagnosis after\n"
              "  // the time boundary must remain searchable.\n"
              "  const temporalBoundary = normalizedCaptured.search(\n"
              "    /\\s+(?:через|спустя)\\s+\\d+(?:[.,]\\d+)?\\s*(?:минут[а-я]*|час[а-я]*|дн(?:я|ей|и)|сут(?:ок|ки)?|недел[а-я]*|месяц[а-я]*)(?=\\s|$)/u,\n"
              "  );\n"
              "  if (temporalBoundary >= 0) boundary = Math.min(boundary, temporalBoundary);\n"
              "\n"
              "  return (\n"
          )
          if anchor not in text:
              raise SystemExit('analysis replacement anchor not found')
          analysis.write_text(text.replace(anchor, replacement, 1), encoding='utf-8')

          tests = Path('packages/search-lexical/tests/query.test.ts')
          test_text = tests.read_text(encoding='utf-8')
          needle = "  it('splits long descriptions into observable search branches', () => {\n"
          insertion = (
              "  it('keeps diagnosis context searchable after a negated treatment-response phrase', () => {\n"
              "    const plan = analyzeClinicalQuery(\n"
              "      'Нет ответа на стартовый антибиотик через 72 часа при пневмонии',\n"
              "      aliases,\n"
              "    );\n"
              "    const negative = plan.analysis.facts.find((fact) => fact.kind === 'negative-finding');\n"
              "    const clinical = plan.branches.find((branch) => branch.kind === 'clinical');\n"
              "    expect(negative?.normalizedValue).toBe('ответа на стартовый антибиотик');\n"
              "    expect(clinical?.terms.some((term) => term.startsWith('пневмони'))).toBe(true);\n"
              "  });\n"
              "\n"
          )
          if needle not in test_text:
              raise SystemExit('test insertion anchor not found')
          tests.write_text(test_text.replace(needle, insertion + needle, 1), encoding='utf-8')
          PY
      - name: Format and validate
        run: |
          pnpm check --write
          pnpm typecheck
          pnpm test:unit
      - name: Commit tested fix and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-pilot-negation-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(search): preserve diagnosis after treatment-response negation'
          git push origin HEAD:agent/rf-public-pilot-0.3.0-alpha.5
