name: Apply pilot negation fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/rf-public-pilot-0.3.0-alpha.5'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rf-public-pilot-0.3.0-alpha.5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply temporal negation boundary and regression test
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          analysis = Path('packages/search-lexical/src/analysis.ts')
          text = analysis.read_text(encoding='utf-8')
          old = """  const explicitBoundary = normalizedCaptured.search(
            /\\s+(?:卸邪谢褍械褌褋褟|锌褉懈薪懈屑邪械褌|锌芯谢褍褔邪械褌|薪邪蟹薪邪褔械薪[邪-褟]*|芯斜褋谢械写芯胁邪薪[邪-褟]*|芯邪泻|芯邪屑|褋邪褌褍褉邪褑[邪-褟]*)(?=\\s|$)/u,
          );
          if (explicitBoundary >= 0) boundary = Math.min(boundary, explicitBoundary);

          return (
          """
          new = """  const explicitBoundary = normalizedCaptured.search(
            /\\s+(?:卸邪谢褍械褌褋褟|锌褉懈薪懈屑邪械褌|锌芯谢褍褔邪械褌|薪邪蟹薪邪褔械薪[邪-褟]*|芯斜褋谢械写芯胁邪薪[邪-褟]*|芯邪泻|芯邪屑|褋邪褌褍褉邪褑[邪-褟]*)(?=\\s|$)/u,
          );
          if (explicitBoundary >= 0) boundary = Math.min(boundary, explicitBoundary);

          // A temporal reassessment phrase ends the negated finding. In `薪械褌 芯褌胁械褌邪 薪邪 邪薪褌懈斜懈芯褌懈泻 褔械褉械蟹
          // 72 褔邪褋邪 锌褉懈 锌薪械胁屑芯薪懈懈`, only the absent treatment response is negative; the diagnosis after
          // the time boundary must remain searchable.
          const temporalBoundary = normalizedCaptured.search(
            /\\s+(?:褔械褉械蟹|褋锌褍褋褌褟)\\s+\\d+(?:[.,]\\d+)?\\s*(?:屑懈薪褍褌[邪-褟]*|褔邪褋[邪-褟]*|写薪(?:褟|械泄|懈)|褋褍褌(?:芯泻|泻懈)?|薪械写械谢[邪-褟]*|屑械褋褟褑[邪-褟]*)(?=\\s|$)/u,
          );
          if (temporalBoundary >= 0) boundary = Math.min(boundary, temporalBoundary);

          return (
          """
          if old not in text:
              raise SystemExit('analysis replacement target not found')
          analysis.write_text(text.replace(old, new), encoding='utf-8')

          tests = Path('packages/search-lexical/tests/query.test.ts')
          test_text = tests.read_text(encoding='utf-8')
          needle = """  it('splits long descriptions into observable search branches', () => {
          """
          insertion = """  it('keeps diagnosis context searchable after a negated treatment-response phrase', () => {
            const plan = analyzeClinicalQuery(
              '袧械褌 芯褌胁械褌邪 薪邪 褋褌邪褉褌芯胁褘泄 邪薪褌懈斜懈芯褌懈泻 褔械褉械蟹 72 褔邪褋邪 锌褉懈 锌薪械胁屑芯薪懈懈',
              aliases,
            );
            const negative = plan.analysis.facts.find((fact) => fact.kind === 'negative-finding');
            const clinical = plan.branches.find((branch) => branch.kind === 'clinical');
            expect(negative?.normalizedValue).toBe('芯褌胁械褌邪 薪邪 褋褌邪褉褌芯胁褘泄 邪薪褌懈斜懈芯褌懈泻');
            expect(clinical?.terms.some((term) => term.startsWith('锌薪械胁屑芯薪懈'))).toBe(true);
          });

          """
          if needle not in test_text:
              raise SystemExit('test insertion target not found')
          tests.write_text(test_text.replace(needle, insertion + needle), encoding='utf-8')
          PY
      - name: Format and validate
        run: |
          pnpm check --write
          pnpm typecheck
          pnpm test:unit
      - name: Commit tested fix and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-pilot-negation-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(search): preserve diagnosis after treatment-response negation'
          git push origin HEAD:agent/rf-public-pilot-0.3.0-alpha.5
