name: Validate real Russian drug pilot

on:
  pull_request:
    branches: [main]
    paths:
      - "content/pilot-rf/**"
      - "tools/ingest/**"
      - ".github/workflows/drug-real-data-pilot.yml"
  push:
    branches: [main]
    paths:
      - "content/pilot-rf/**"
      - "tools/ingest/**"
      - ".github/workflows/drug-real-data-pilot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked

      - name: Build the source-linked pilot pack
        run: |
          pnpm content:lint:pilot
          pnpm content:build:pilot

      - name: Verify modular knowledge and SQLite integrity
        shell: bash
        run: |
          set -euo pipefail
          uv run --project tools/ingest pytest \
            tools/ingest/tests/test_drug_sources.py \
            tools/ingest/tests/test_knowledge.py \
            tools/ingest/tests/test_knowledge_modules.py
          python3 - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          report = json.loads(Path('data/build/rf-public-pilot-report.json').read_text(encoding='utf-8'))
          connection = sqlite3.connect('data/build/rf-public-pilot.db')
          try:
              assert connection.execute('PRAGMA quick_check').fetchone()[0] == 'ok'
              assert connection.execute('PRAGMA foreign_key_check').fetchall() == []
              assert report['documents'] == 15
              assert report['chunks'] == 58
              assert connection.execute('SELECT COUNT(*) FROM knowledge_entities').fetchone()[0] == 9
              assert connection.execute('SELECT COUNT(*) FROM medication_profiles').fetchone()[0] == 8
              assert connection.execute('SELECT COUNT(*) FROM knowledge_facts').fetchone()[0] == 8
              assert connection.execute('SELECT COUNT(*) FROM knowledge_relations').fetchone()[0] == 1
              assert connection.execute('SELECT COUNT(*) FROM knowledge_evidence').fetchone()[0] == 9
              assert connection.execute('SELECT COUNT(*) FROM knowledge_document_links').fetchone()[0] == 9
              assert connection.execute('SELECT COUNT(*) FROM knowledge_review_tasks').fetchone()[0] == 3
              assert connection.execute("SELECT COUNT(*) FROM knowledge_facts WHERE review_status = 'reviewed'").fetchone()[0] == 0
              assert connection.execute('SELECT COUNT(*) FROM knowledge_fts').fetchone()[0] == 0
          finally:
              connection.close()
          PY

      - name: Upload pack evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-russian-drug-pilot
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/build/rf-public-pilot.db
            data/build/rf-public-pilot-report.json
