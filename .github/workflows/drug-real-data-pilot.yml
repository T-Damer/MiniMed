name: Validate real Russian drug pilot

on:
  push:
    branches: [agent/drug-real-data-pilot]
  pull_request:
    branches: [agent/drug-knowledge-graph, main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked

      - name: Lint and build the extended public pack
        id: build
        shell: bash
        run: |
          set +e
          mkdir -p data/build
          {
            pnpm content:lint:pilot
            pnpm content:build:pilot
          } 2>&1 | tee data/build/drug-pilot-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Verify real drug documents and structured knowledge
        if: steps.build.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          database = Path('data/build/rf-public-pilot.db')
          report = json.loads(Path('data/build/rf-public-pilot-report.json').read_text(encoding='utf-8'))
          connection = sqlite3.connect(f'file:{database}?mode=ro', uri=True)
          try:
              assert connection.execute('PRAGMA quick_check').fetchone()[0] == 'ok'
              assert connection.execute('PRAGMA foreign_key_check').fetchall() == []

              documents = connection.execute('SELECT COUNT(*) FROM documents').fetchone()[0]
              chunks = connection.execute('SELECT COUNT(*) FROM chunks').fetchone()[0]
              entities = connection.execute('SELECT COUNT(*) FROM knowledge_entities').fetchone()[0]
              profiles = connection.execute('SELECT COUNT(*) FROM medication_profiles').fetchone()[0]
              facts = connection.execute('SELECT COUNT(*) FROM knowledge_facts').fetchone()[0]
              relations = connection.execute('SELECT COUNT(*) FROM knowledge_relations').fetchone()[0]
              evidence = connection.execute('SELECT COUNT(*) FROM knowledge_evidence').fetchone()[0]
              links = connection.execute('SELECT COUNT(*) FROM knowledge_document_links').fetchone()[0]
              tasks = connection.execute('SELECT COUNT(*) FROM knowledge_review_tasks').fetchone()[0]
              proposed = connection.execute(
                  "SELECT COUNT(*) FROM knowledge_facts WHERE review_status = 'proposed'"
              ).fetchone()[0]
              reviewed = connection.execute(
                  "SELECT COUNT(*) FROM knowledge_facts WHERE review_status = 'reviewed'"
              ).fetchone()[0]
              structured_search_rows = connection.execute('SELECT COUNT(*) FROM knowledge_fts').fetchone()[0]

              assert documents == report['documents'] == 15
              assert chunks == report['chunks'] == 58
              assert entities == 9
              assert profiles == 8
              assert facts == 8
              assert relations == 1
              assert evidence == 9
              assert links == 9
              assert tasks == 3
              assert proposed == 8
              assert reviewed == 0
              assert structured_search_rows == 0

              ids = {
                  row[0]
                  for row in connection.execute(
                      'SELECT id FROM knowledge_entities WHERE entity_type = ?', ('medication',)
                  )
              }
              assert ids == {
                  'medication.paracetamol.suspension.120mg-5ml',
                  'medication.ibuprofen.suspension.100mg-5ml',
                  'medication.amoxicillin.tablet.500mg',
                  'medication.amoxicillin-clavulanate.suspension.400mg-57mg-5ml',
                  'medication.azithromycin.suspension.200mg-5ml',
                  'medication.ceftriaxone.injection.1g',
                  'medication.oral-rehydration-salts.powder.18-9g',
                  'medication.oseltamivir.capsule.30mg',
              }

              document_ids = {
                  row[0]
                  for row in connection.execute(
                      "SELECT id FROM documents WHERE source_type = 'official_registry_summary'"
                  )
              }
              assert len(document_ids) == 8
              assert 'drug.rf.azithromycin.suspension-200mg-5ml' in document_ids
              assert 'drug.rf.oral-rehydration-salts.powder-18-9g' in document_ids
          finally:
              connection.close()
          PY

      - name: Run drug and modular-knowledge unit tests
        if: steps.build.outputs.exit_code == '0'
        run: |
          uv run --project tools/ingest pytest \
            tools/ingest/tests/test_drug_sources.py \
            tools/ingest/tests/test_knowledge.py \
            tools/ingest/tests/test_knowledge_modules.py

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drug-real-data-pilot
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/build/rf-public-pilot.db
            data/build/rf-public-pilot-report.json
            data/build/drug-pilot-build.log

      - name: Enforce successful pack build
        env:
          BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: test "$BUILD_EXIT_CODE" = "0"
