name: Stage clean real-drug dataset

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stage-clean-real-drug-data-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  stage:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/drug-real-data-final' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/drug-real-data-final
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Copy only the reviewed data-layer delta
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/drug-real-data-preclean-backup main
          git checkout origin/agent/drug-real-data-preclean-backup -- \
            content/pilot-rf/amoxicillin-clavulanate.md \
            content/pilot-rf/azithromycin.md \
            content/pilot-rf/ceftriaxone.md \
            content/pilot-rf/drug-amoxicillin-tablets-500.md \
            content/pilot-rf/drug-ibuprofen-pediatric-suspension.md \
            content/pilot-rf/drug-paracetamol-pediatric-suspension.md \
            content/pilot-rf/knowledge.core.json \
            content/pilot-rf/knowledge.drug.amoxicillin-clavulanate.json \
            content/pilot-rf/knowledge.drugs.additional.json \
            content/pilot-rf/knowledge.drugs.yaml \
            content/pilot-rf/knowledge.yaml \
            content/pilot-rf/oral-rehydration-salts.md \
            content/pilot-rf/oseltamivir.md \
            docs/DRUG_REAL_DATA_PILOT.md \
            tools/ingest/src/localmed_ingest/builder.py \
            tools/ingest/src/localmed_ingest/knowledge_modules.py \
            tools/ingest/tests/test_knowledge_modules.py
          rm -f .github/drug-real-data-staging-marker.txt

      - name: Install and format
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm check --write
          uv run --project tools/ingest ruff format tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check --fix tools/ingest/src tools/ingest/tests

      - name: Verify repository and real-data pack
        shell: bash
        run: |
          set -euo pipefail
          cp apps/app/public/content/core-demo.db /tmp/core-demo.db
          cp apps/app/public/content/core-demo-report.json /tmp/core-demo-report.json
          pnpm verify
          cp /tmp/core-demo.db apps/app/public/content/core-demo.db
          cp /tmp/core-demo-report.json apps/app/public/content/core-demo-report.json
          pnpm content:lint:pilot
          pnpm content:build:pilot
          uv run --project tools/ingest pytest \
            tools/ingest/tests/test_drug_sources.py \
            tools/ingest/tests/test_knowledge.py \
            tools/ingest/tests/test_knowledge_modules.py
          python3 - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          report = json.loads(Path('data/build/rf-public-pilot-report.json').read_text(encoding='utf-8'))
          db = sqlite3.connect('data/build/rf-public-pilot.db')
          try:
              assert db.execute('PRAGMA quick_check').fetchone()[0] == 'ok'
              assert db.execute('PRAGMA foreign_key_check').fetchall() == []
              assert report['documents'] == 15
              assert report['chunks'] == 58
              assert db.execute('SELECT COUNT(*) FROM knowledge_entities').fetchone()[0] == 9
              assert db.execute('SELECT COUNT(*) FROM medication_profiles').fetchone()[0] == 8
              assert db.execute('SELECT COUNT(*) FROM knowledge_facts').fetchone()[0] == 8
              assert db.execute('SELECT COUNT(*) FROM knowledge_relations').fetchone()[0] == 1
              assert db.execute('SELECT COUNT(*) FROM knowledge_evidence').fetchone()[0] == 9
              assert db.execute('SELECT COUNT(*) FROM knowledge_fts').fetchone()[0] == 0
          finally:
              db.close()
          PY

      - name: Publish the clean data-only branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            content/pilot-rf/amoxicillin-clavulanate.md \
            content/pilot-rf/azithromycin.md \
            content/pilot-rf/ceftriaxone.md \
            content/pilot-rf/drug-amoxicillin-tablets-500.md \
            content/pilot-rf/drug-ibuprofen-pediatric-suspension.md \
            content/pilot-rf/drug-paracetamol-pediatric-suspension.md \
            content/pilot-rf/knowledge.core.json \
            content/pilot-rf/knowledge.drug.amoxicillin-clavulanate.json \
            content/pilot-rf/knowledge.drugs.additional.json \
            content/pilot-rf/knowledge.drugs.yaml \
            content/pilot-rf/knowledge.yaml \
            content/pilot-rf/oral-rehydration-salts.md \
            content/pilot-rf/oseltamivir.md \
            docs/DRUG_REAL_DATA_PILOT.md \
            tools/ingest/src/localmed_ingest/builder.py \
            tools/ingest/src/localmed_ingest/knowledge_modules.py \
            tools/ingest/tests/test_knowledge_modules.py
          git add -u .github/drug-real-data-staging-marker.txt || true
          git diff --cached --quiet && exit 0
          git commit -m 'feat(drugs): add source-backed Russian medication pilot'
          git push --force-with-lease origin HEAD:agent/drug-real-data-final
