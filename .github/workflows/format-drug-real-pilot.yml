name: Format real Russian drug pilot

on:
  pull_request:
    branches: [agent/drug-knowledge-graph, main]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  format:
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/drug-real-data-pilot') || (github.event_name == 'issues' && github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Format real Russian drug pilot')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-real-data-pilot
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - run: |
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
      - name: Apply pinned formatters and safe lint fixes
        run: |
          pnpm check --write
          uv run --project tools/ingest ruff format tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check --fix tools/ingest/src tools/ingest/tests
      - name: Publish non-workflow formatting changes
        shell: bash
        run: |
          set -euo pipefail
          git diff --quiet -- .github/workflows || {
            echo 'Formatting unexpectedly modified workflow files.' >&2
            git diff -- .github/workflows
            exit 1
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'style(drugs): apply repository formatters'
          git push origin HEAD:agent/drug-real-data-pilot
      - name: Close owner trigger
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --comment 'Real-drug pilot formatting completed.'
