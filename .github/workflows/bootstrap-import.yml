name: Bootstrap LocalMed import

on:
  push:
    branches:
      - agent/import-localmed-0.2.2
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-localmed-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      ARCHIVE_SHA256: 42052e6293032931cc6475b3f61cc3c10d7e79aa3a74179c2d85af21b1ffad4b
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: astral-sh/setup-uv@v6

      - name: Fetch, reassemble, and verify source archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/localmed.tar.xz"
          : > "$archive"
          blobs=(
            229ecc446983a4fab33225e676e1d7d491472453
            7aeabf6b14aaa8cd2b8819d013bfb0a268e2cd0d
            d5769f05b616d49e40ce6b3ef4b923079fa5706d
            d48d1e0879b37ee39e552df14b333ec4daae9698
            f6408a5d59dd87a34b38fe1074aa2412ab4fcac9
            9e9b2e8fb160fea2b6787ea210f8dc81512b2d8f
            71345605c9e596bc57d42a864284efcea5a31861
            2cb3fd3d68e818c2e060bd8a5df314134a78a64e
            74c2bc144933a734c59c412bd961f381d335fb73
            2b3b7a758fbff32f1dca8c21b763282d64a5c6a7
            7ada2c516c8a509a75946e453fd5c77c5a4d198d
            cbd2016fa3f21f9dfe3698b698a7b97973e16a25
            e59fd2ff50a56338d049a8ff3403e3fb8a770647
          )
          for blob in "${blobs[@]}"; do
            curl --fail-with-body --silent --show-error \
              --retry 4 --retry-all-errors \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${blob}" \
              | jq -r '.content' \
              | tr -d '\n' \
              | base64 --decode >> "$archive"
          done
          echo "$ARCHIVE_SHA256  $archive" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/source"
          tar -xJf "$archive" -C "$RUNNER_TEMP/source"
          test -f "$RUNNER_TEMP/source/package.json"
          test -f "$RUNNER_TEMP/source/.github/workflows/ci.yml"

      - name: Generate deterministic dependency locks
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/source"
          corepack enable
          pnpm install --lockfile-only --no-frozen-lockfile
          uv lock --project tools/ingest

      - name: Replace bootstrap tree with LocalMed source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/source/." .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: import LocalMed 0.2.2 baseline"
          git push origin "HEAD:${GITHUB_REF_NAME}"
