name: One-shot fix installer types

on:
  push:
    branches:
      - agent/content-module-installer
    paths:
      - .github/workflows/one-shot-fix-installer-types.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/core/src/content-module-installer.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "  const digest = await crypto.subtle.digest('SHA-256', bytes);",
              "  const buffer = Uint8Array.from(bytes).buffer;\n  const digest = await crypto.subtle.digest('SHA-256', buffer);",
          )
          text = text.replace(
              "    const staged: StagedContentModuleArtifact[] = [];",
              "    const sourceSetDigest = module.sourceSetDigest;\n    if (!sourceSetDigest) throw new Error(`Module ${module.id} has no source-set digest.`);\n    const staged: StagedContentModuleArtifact[] = [];",
          )
          text = text.replace('          sourceSetDigest: module.sourceSetDigest,', '          sourceSetDigest,')
          path.write_text(text, encoding='utf-8')
          PY
      - run: rm -f .github/workflows/diagnose-module-installer-types.yml .github/workflows/one-shot-fix-installer-types.yml
      - run: pnpm exec biome check --write packages/core/src/content-module-installer.ts
      - run: pnpm --filter @localmed/core typecheck
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(modules): harden installer type boundaries"
          git push origin HEAD:agent/content-module-installer
