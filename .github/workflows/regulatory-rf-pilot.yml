name: Validate Russian regulatory pilot

on:
  pull_request:
    paths:
      - "content/regulatory-rf-pilot/**"
      - "content/regulatory-rf-pilot-sources.yaml"
      - "tools/benchmarks/regulatory-rf-queries.json"
      - "tools/benchmarks/src/run-regulatory.ts"
      - "tools/benchmarks/package.json"
      - "tools/ingest/src/localmed_ingest/markdown_parser.py"
      - "tools/ingest/tests/test_regulatory_sections.py"
      - "package.json"
      - ".github/workflows/regulatory-rf-pilot.yml"
  push:
    branches: [main]
    paths:
      - "content/regulatory-rf-pilot/**"
      - "content/regulatory-rf-pilot-sources.yaml"
      - "tools/benchmarks/regulatory-rf-queries.json"
      - "tools/benchmarks/src/run-regulatory.ts"
      - "tools/benchmarks/package.json"
      - "tools/ingest/src/localmed_ingest/markdown_parser.py"
      - "tools/ingest/tests/test_regulatory_sections.py"
      - "package.json"
      - ".github/workflows/regulatory-rf-pilot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked

      - name: Validate section taxonomy
        run: uv run --project tools/ingest pytest tools/ingest/tests/test_regulatory_sections.py -q

      - name: Build direct regulatory pack
        run: |
          pnpm content:lint:regulatory
          pnpm content:build:regulatory
          sha256sum data/build/rf-regulatory-pilot.db | cut -d' ' -f1 > /tmp/direct-regulatory.sha256

      - name: Rebuild through declared source manifest
        run: |
          pnpm content:sync:regulatory
          uv run --project tools/ingest medbase lint --input data/synced/rf-regulatory-pilot
          pnpm content:build:regulatory:synced
          sha256sum data/build/rf-regulatory-pilot.db | cut -d' ' -f1 > /tmp/synced-regulatory.sha256
          diff -u /tmp/direct-regulatory.sha256 /tmp/synced-regulatory.sha256

      - name: Run source-grounded regulatory benchmark
        run: pnpm benchmark:regulatory

      - name: Upload regulatory evidence
        uses: actions/upload-artifact@v4
        with:
          name: rf-regulatory-pilot-evidence
          if-no-files-found: error
          retention-days: 14
          path: |
            data/build/rf-regulatory-pilot.db
            data/build/rf-regulatory-pilot-report.json
            data/build/rf-regulatory-pilot-benchmark.json
            data/build/regulatory-source-sync-report.json
