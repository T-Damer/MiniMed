name: Apply app UX patch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Apply MiniMed app UX patch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-ux-history-graph-parser
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply source patch
        run: python3 scripts/apply_app_ux_patches.py
      - name: Format and validate
        run: |
          pnpm check --write
          pnpm typecheck
          pnpm test:unit
          pnpm build:app
          pnpm build:landing
          pnpm native:source:check
      - name: Commit tested patch
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            scripts/apply_app_ux_patches.py \
            .github/workflows/apply-app-ux-patches.yml \
            .github/workflows/apply-clinical-fact-rules.yml \
            .github/workflows/apply-search-workspace-ux.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(app): simplify mobile search and improve clinical parsing'
          git push origin HEAD:agent/app-ux-history-graph-parser
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment 'App UX and parser patch applied and validated.'
