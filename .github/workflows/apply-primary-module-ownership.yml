name: Apply validated primary module ownership patch

on:
  pull_request_target:
    branches: [main]
    paths:
      - .github/trigger-primary-module-ownership

permissions:
  actions: read
  contents: write

concurrency:
  group: apply-primary-module-ownership
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'ops/apply-primary-module-ownership'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      TARGET_BRANCH: agent/catalog-module-builder
      ARTIFACT_RUN_ID: '30012069534'
      ARTIFACT_NAME: primary-module-ownership-patch
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Download validated patch artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/primary-module-patch
          mkdir -p /tmp/primary-module-patch
          gh run download "$ARTIFACT_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$ARTIFACT_NAME" \
            --dir /tmp/primary-module-patch
          test -s /tmp/primary-module-patch/tools/ingest/src/localmed_ingest/catalog_module_builder.py
          test -s /tmp/primary-module-patch/tools/ingest/tests/test_catalog_module_builder.py
      - name: Apply exact validated files
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/primary-module-patch/tools/ingest/src/localmed_ingest/catalog_module_builder.py \
            tools/ingest/src/localmed_ingest/catalog_module_builder.py
          cp /tmp/primary-module-patch/tools/ingest/tests/test_catalog_module_builder.py \
            tools/ingest/tests/test_catalog_module_builder.py
          rm -f tools/ingest/repair_primary_module_ownership.py
      - name: Validate canonical ownership
        shell: bash
        run: |
          set -euo pipefail
          uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests/test_catalog_module_builder.py
          rm -rf data/build/fixture-clinical-ledger.json \
            data/build/fixture-clinical-modules \
            data/build/fixture-clinical-databases
          uv run --project tools/ingest medbase-clinical-catalog build \
            --source tools/ingest/tests/fixtures/clinical-catalog-sample.json \
            --taxonomy content/clinical-module-taxonomy.yaml \
            --overrides content/clinical-coverage-overrides.yaml \
            --generated-at 2026-07-23T00:00:00Z \
            --output data/build/fixture-clinical-ledger.json
          uv run --project tools/ingest medbase-catalog-modules build \
            --ledger data/build/fixture-clinical-ledger.json \
            --output-root data/build/fixture-clinical-modules \
            --family clinical \
            --version 2026.07.fixture.1 \
            --built-at 2026-07-23T00:00:00Z
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path('data/build/fixture-clinical-modules/module-build-report.json').read_text()
          )
          ids = [item for module in report['modules'] for item in module['documentIds']]
          assert report['totalDocuments'] == 6
          assert len(ids) == len(set(ids)) == 6
          PY
      - name: Commit exact patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            tools/ingest/src/localmed_ingest/catalog_module_builder.py \
            tools/ingest/tests/test_catalog_module_builder.py
          git add -u -- tools/ingest/repair_primary_module_ownership.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: package each catalog record in one primary module'
          git push origin HEAD:"$TARGET_BRANCH"
