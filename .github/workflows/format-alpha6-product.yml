name: Format and verify MiniMed alpha 6 product branch

on:
  push:
    branches:
      - main
      - agent/content-module-installer
    paths:
      - .github/workflows/format-alpha6-product.yml
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: format-alpha6-product-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  format:
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'issues' && github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Format MiniMed alpha 6 product')
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mobile-ux-0.3.0-alpha.6
          fetch-depth: 0

      - name: Report run
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --body "Alpha.6 formatter run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}."

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Apply final parser and strict-type corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          graph = Path('apps/app/src/features/library/KnowledgeGraph.tsx')
          graph_text = graph.read_text(encoding='utf-8')
          graph_text = graph_text.replace(
              '  readonly selectedId?: string;\n',
              '  readonly selectedId: string | undefined;\n',
          )
          graph_text = graph_text.replace(
              '  readonly selectedId?: string | undefined;\n',
              '  readonly selectedId: string | undefined;\n',
          )
          graph.write_text(graph_text, encoding='utf-8')

          analysis = Path('packages/search-lexical/src/analysis.ts')
          analysis_text = analysis.read_text(encoding='utf-8')
          old = r"    /(\d{1,3})\s*(写薪(?:褟|械泄)?|写械薪褜|写薪械泄|薪械写械谢(?:褟|懈|褜|褞)?|屑械褋褟褑(?:邪|械胁)?|谢械褌|谐芯写(?:邪|芯胁)?)\s*,?\s*(?:屑邪谢褜褔懈泻|写械胁芯褔泻邪|褉械斜械薪芯泻|褉械斜褢薪芯泻|锌邪褑懈械薪褌|锌邪褑懈械薪褌泻邪|屑褍卸褔懈薪邪|卸械薪褖懈薪邪|屑谢邪写械薪械褑)/giu,"
          new = r"    /(\d{1,3})\s*(屑械褋褟褑(?:邪|械胁)?|谢械褌|谐芯写(?:邪|芯胁)?)\s*,?\s*(?:屑邪谢褜褔懈泻|写械胁芯褔泻邪|褉械斜械薪芯泻|褉械斜褢薪芯泻|锌邪褑懈械薪褌|锌邪褑懈械薪褌泻邪|屑褍卸褔懈薪邪|卸械薪褖懈薪邪|屑谢邪写械薪械褑)/giu,"
          if old in analysis_text:
              analysis_text = analysis_text.replace(old, new, 1)
          elif new not in analysis_text:
              raise SystemExit('reverse age pattern not found')
          analysis.write_text(analysis_text, encoding='utf-8')

          tests = Path('packages/search-lexical/tests/query.test.ts')
          test_text = tests.read_text(encoding='utf-8')
          title = 'does not confuse illness duration before sex with patient age'
          if title not in test_text:
              addition = '''
            it('does not confuse illness duration before sex with patient age', () => {
              const plan = analyzeClinicalQuery('5 写薪械泄, 屑邪谢褜褔懈泻, 泻邪褕谢褟械褌', aliases);
              expect(plan.analysis.facts.some((fact) => fact.kind === 'age')).toBe(false);
              expect(plan.analysis.facts).toEqual(
                expect.arrayContaining([
                  expect.objectContaining({ kind: 'duration' }),
                  expect.objectContaining({ kind: 'sex', normalizedValue: '屑褍卸褋泻芯泄' }),
                  expect.objectContaining({ kind: 'symptom', normalizedValue: '泻邪褕械谢褜' }),
                ]),
              );
            });
          '''
              marker = '\n});\n'
              index = test_text.rfind(marker)
              if index < 0:
                  raise SystemExit('test suite closing marker not found')
              tests.write_text(test_text[:index] + addition + test_text[index:], encoding='utf-8')
          PY

      - name: Install and format every changed source file
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm check --write

      - name: Publish formatter output before the verifier
        shell: bash
        run: |
          set -euo pipefail
          git diff --quiet -- .github/workflows || {
            echo 'Formatter unexpectedly modified workflow files.' >&2
            git diff -- .github/workflows
            exit 1
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'fix(app): format alpha 6 and harden clinical parsing'
            git push origin HEAD:agent/mobile-ux-0.3.0-alpha.6
          fi

      - name: Verify the formatted product branch
        run: pnpm verify

      - name: Close successful trigger
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --comment 'Alpha.6 product branch formatted and fully verified.'

  finish-032:
    if: github.event_name == 'push' && github.ref_name == 'agent/content-module-installer'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/content-module-installer
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Isolate current therapy from diagnostic branches
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'missing target: {label}')
              return text.replace(old, new, 1)

          path = Path('packages/search-lexical/src/analysis.ts')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              """  const negativeTerms = termsInsideNegativeFacts(facts);
          const originalTerms = termsWithStems([normalizedQuery]);
          const positiveTerms = originalTerms.filter((term) => !negativeTerms.has(term));
          const negativeRanges = facts
          """,
              """  const negativeTerms = termsInsideNegativeFacts(facts);
          const medicationTerms = new Set(
            facts
              .filter((fact) => fact.kind === 'medication')
              .flatMap((fact) => termsWithStems([fact.value, fact.normalizedValue])),
          );
          const originalTerms = termsWithStems([normalizedQuery]);
          const positiveTerms = originalTerms.filter(
            (term) => !negativeTerms.has(term) && !medicationTerms.has(term),
          );
          const negativeRanges = facts
          """,
              'medication term set',
          )
          text = replace_once(
              text,
              """    expansion.matchedAliases
                .filter((alias) => {
                  const index = normalizedQuery.indexOf(normalizeSurfaceText(alias.alias));
          """,
              """    expansion.matchedAliases
                .filter((alias) => {
                  if (alias.category === 'medication') return false;
                  const index = normalizedQuery.indexOf(normalizeSurfaceText(alias.alias));
          """,
              'medication aliases',
          )
          text = replace_once(
              text,
              """  const intentSpec = INTENT_BRANCH[intent.primary];
            if (intent.primary !== 'unknown') {
              const branch = makeBranch(
                'intent',
                'intent',
                intentSpec.label,
                query,
                [normalizedQuery, intentSpec.terms],
                intentSpec.weight,
              );
          """,
              """  const intentSpec = INTENT_BRANCH[intent.primary];
            if (intent.primary !== 'unknown') {
              const intentQuery =
                intent.primary === 'medication' ? normalizedQuery : positiveTerms.join(' ');
              const branch = makeBranch(
                'intent',
                'intent',
                intentSpec.label,
                query,
                [intentQuery, intentSpec.terms],
                intentSpec.weight,
              );
          """,
              'intent sanitization',
          )
          text = replace_once(
              text,
              """      if (/^(?:斜械蟹|薪械褌|芯褌褉懈褑邪械褌|薪械\s+)/u.test(clauseNormalized)) continue;
                const branch = makeBranch(
          """,
              """      if (
                  /^(?:斜械蟹|薪械褌|芯褌褉懈褑邪械褌|薪械\s+)/u.test(clauseNormalized) ||
                  /(?:锌褉懈薪懈屑邪械褌|锌芯谢褍褔邪械褌|薪邪蟹薪邪褔械薪[邪-褟]*|褌械褉邪锌懈褟)/u.test(clauseNormalized)
                ) {
                  continue;
                }
                const branch = makeBranch(
          """,
              'therapy clauses',
          )
          text = text.replace(
              "[normalizedQuery, '写懈褎褎械褉械薪褑懈邪谢褜薪邪褟 写懈邪谐薪芯褋褌懈泻邪 芯褌谢懈褔懈褟 泻褉懈褌械褉懈懈']",
              "[positiveTerms.join(' '), '写懈褎褎械褉械薪褑懈邪谢褜薪邪褟 写懈邪谐薪芯褋褌懈泻邪 芯褌谢懈褔懈褟 泻褉懈褌械褉懈懈']",
              1,
          )
          text = text.replace(
              "[normalizedQuery, '写懈邪谐薪芯褋褌懈泻邪 芯斜褋谢械写芯胁邪薪懈械 谢邪斜芯褉邪褌芯褉薪邪褟 懈薪褋褌褉褍屑械薪褌邪谢褜薪邪褟']",
              "[positiveTerms.join(' '), '写懈邪谐薪芯褋褌懈泻邪 芯斜褋谢械写芯胁邪薪懈械 谢邪斜芯褉邪褌芯褉薪邪褟 懈薪褋褌褉褍屑械薪褌邪谢褜薪邪褟']",
              1,
          )
          path.write_text(text, encoding='utf-8')

          path = Path('packages/search-lexical/tests/query.test.ts')
          text = path.read_text(encoding='utf-8')
          title = 'keeps current medication out of diagnostic branches'
          if title not in text:
              test = r"""

            it('keeps current medication out of diagnostic branches', () => {
              const plan = analyzeClinicalQuery(
                '袦邪谢褜褔懈泻 5 谢械褌, 褌械屑锌械褉邪褌褍褉邪 39,2, 褔邪褋褌芯 写褘褕懈褌, 泻邪褕谢褟 薪械褌, 锌褉懈薪懈屑邪械褌 邪褍谐屑械薪褌懈薪',
                aliases,
              );
              const diagnosticBranches = plan.branches.filter(
                (branch) => branch.id !== 'medications' && branch.kind !== 'medication',
              );
              const medication = plan.branches.find((branch) => branch.id === 'medications');
              expect(diagnosticBranches.flatMap((branch) => branch.terms)).not.toContain('邪褍谐屑械薪褌懈薪');
              expect(diagnosticBranches.flatMap((branch) => branch.terms)).not.toContain('邪屑芯泻褋懈褑懈谢谢懈薪');
              expect(medication?.terms).toEqual(
                expect.arrayContaining(['邪褍谐屑械薪褌懈薪', '邪屑芯泻褋懈褑懈谢谢懈薪']),
              );
              expect(plan.branches.find((branch) => branch.id === 'clinical')?.terms).toContain('褌邪褏懈锌薪芯褝');
            });
          """
              text = text.rstrip()
              if not text.endswith('});'):
                  raise SystemExit('unexpected query test ending')
              text = text[:-3] + test + '\n});\n'
              path.write_text(text, encoding='utf-8')

          path = Path('apps/app/e2e/search.spec.ts')
          text = path.read_text(encoding='utf-8').replace(
              "toContainText('袛懈邪谐薪芯褋褌懈泻邪')",
              "toContainText('袣谢懈薪懈褔械褋泻邪褟 泻邪褉褌懈薪邪')",
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
      - run: pnpm exec biome check --write packages/search-lexical/src/analysis.ts packages/search-lexical/tests/query.test.ts apps/app/e2e/search.spec.ts
      - run: pnpm --filter @localmed/search-lexical test
      - run: pnpm benchmark:cases
      - run: pnpm build:app && pnpm exec playwright test
      - name: Restore workflow and remove temporary diagnostics
        run: |
          git show origin/main:.github/workflows/format-alpha6-product.yml > .github/workflows/format-alpha6-product.yml
          rm -f \
            .github/workflows/diagnose-032-benchmarks.yml \
            .github/workflows/fix-medication-context-ranking.yml
      - name: Commit verified fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(search): separate current therapy from diagnosis'
          git push origin HEAD:agent/content-module-installer
