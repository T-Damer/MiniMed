name: Stage drug foundation integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stage-drug-foundation-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  stage:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/drug-foundation-final'
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-foundation-final
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - name: Execute registered integration script
        id: stage
        shell: bash
        run: |
          set +e
          git fetch origin main
          git show origin/main:.github/scripts/stage-drug-foundation-final.sh > /tmp/stage-drug-foundation-final.sh
          chmod +x /tmp/stage-drug-foundation-final.sh
          /tmp/stage-drug-foundation-final.sh 2>&1 | tee foundation-staging.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload foundation staging diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-staging-diagnostics
          if-no-files-found: error
          retention-days: 7
          path: foundation-staging.log
      - name: Enforce successful integration
        env:
          STAGE_EXIT_CODE: ${{ steps.stage.outputs.exit_code }}
        run: test "$STAGE_EXIT_CODE" = "0"
