name: Stage drug foundation integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stage-drug-foundation-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  stage:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/drug-foundation-final'
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-foundation-final
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true
      - name: Execute registered integration script
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/scripts/stage-drug-foundation-final.sh > /tmp/stage-drug-foundation-final.sh
          chmod +x /tmp/stage-drug-foundation-final.sh
          /tmp/stage-drug-foundation-final.sh
