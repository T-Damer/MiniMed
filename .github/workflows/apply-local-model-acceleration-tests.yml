name: Apply local model acceleration tests

on:
  push:
    branches: [agent/local-model-auto-selection]
    paths:
      - .github/workflows/apply-local-model-acceleration-tests.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - name: Apply acceleration corrections and CI lanes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'apps/app/src/features/models/browser-runtime.ts',
              '  readonly allowUpstreamFallback: boolean;\n  readonly enableWebgpu: boolean;\n',
              '  readonly allowUpstreamFallback: boolean;\n',
          )
          replace_once(
              'apps/app/src/features/models/browser-runtime.ts',
              '          n_gpu_layers: this.options.enableWebgpu && profile.webgpu ? 8 : 0,\n',
              '          // wllama 3.5 is a WebAssembly CPU runtime and does not implement WebGPU.\n'
              '          n_gpu_layers: 0,\n',
          )

          replace_once(
              'apps/app/src/features/models/controller.ts',
              '  readonly allowUpstreamFallback: boolean;\n  readonly enableWebgpu: boolean;\n  readonly defaultAutoLoad: boolean;\n',
              '  readonly allowUpstreamFallback: boolean;\n'
              '  readonly allowAutomationDownloads: boolean;\n'
              '  readonly defaultAutoLoad: boolean;\n',
          )
          replace_once(
              'apps/app/src/features/models/controller.ts',
              '        allowUpstreamFallback: this.options.allowUpstreamFallback,\n'
              '        enableWebgpu: this.options.enableWebgpu,\n',
              '        allowUpstreamFallback: this.options.allowUpstreamFallback,\n',
          )
          replace_once(
              'apps/app/src/features/models/controller.ts',
              "    if (!this.preference.autoLoad || profile.automation) {\n"
              "      this.update({\n"
              "        phase: 'deferred',\n"
              "        message: profile.automation\n"
              "          ? `Автозагрузка ${recommended.model.name} отключена в автоматизированном тесте.`\n"
              "          : `${recommended.model.name} рекомендована; автозагрузка отключена в настройках.`,\n"
              "      });\n"
              "      return;\n"
              "    }\n",
              "    const automationBlocked =\n"
              "      profile.automation && !this.options.allowAutomationDownloads;\n"
              "    if (!this.preference.autoLoad || automationBlocked) {\n"
              "      this.update({\n"
              "        phase: 'deferred',\n"
              "        message: automationBlocked\n"
              "          ? `Автозагрузка ${recommended.model.name} отключена в автоматизированном тесте.`\n"
              "          : `${recommended.model.name} рекомендована; автозагрузка отключена в настройках.`,\n"
              "      });\n"
              "      return;\n"
              "    }\n",
          )

          replace_once(
              'apps/app/src/features/models/selection.ts',
              "  if (artifact.runtime === 'wllama-web' && profile.webgpu) {\n"
              "    score += 12;\n"
              "    reasons.push('доступен WebGPU');\n"
              "  }\n",
              '',
          )

          replace_once(
              'apps/app/src/app/App.tsx',
              "  const remoteCatalogUrl =\n"
              "    import.meta.env['VITE_LOCAL_MODEL_CATALOG_URL']?.trim() || DEFAULT_MODEL_CATALOG_URL;\n",
              "  const configuredCatalogUrl = import.meta.env['VITE_LOCAL_MODEL_CATALOG_URL']?.trim();\n"
              "  const remoteCatalogUrl =\n"
              "    configuredCatalogUrl === 'bundled'\n"
              "      ? ''\n"
              "      : configuredCatalogUrl || DEFAULT_MODEL_CATALOG_URL;\n",
          )
          replace_once(
              'apps/app/src/app/App.tsx',
              "    allowUpstreamFallback: environmentFlag('VITE_LOCAL_MODEL_ALLOW_UPSTREAM', true),\n"
              "    enableWebgpu: environmentFlag('VITE_LOCAL_MODEL_WEBGPU', true),\n"
              "    defaultAutoLoad: environmentFlag('VITE_LOCAL_MODEL_AUTOLOAD', true),\n",
              "    allowUpstreamFallback: environmentFlag('VITE_LOCAL_MODEL_ALLOW_UPSTREAM', true),\n"
              "    allowAutomationDownloads: environmentFlag(\n"
              "      'VITE_LOCAL_MODEL_ALLOW_AUTOMATION_DOWNLOADS',\n"
              "      false,\n"
              "    ),\n"
              "    defaultAutoLoad: environmentFlag('VITE_LOCAL_MODEL_AUTOLOAD', true),\n",
          )

          replace_once(
              '.env.example',
              'VITE_LOCAL_MODEL_ALLOW_UPSTREAM=true\nVITE_LOCAL_MODEL_WEBGPU=true\nVITE_LOCAL_MODEL_AUTOLOAD=true\n',
              'VITE_LOCAL_MODEL_ALLOW_UPSTREAM=true\n'
              'VITE_LOCAL_MODEL_AUTOLOAD=true\n'
              '# Keep false outside the dedicated scheduled model-smoke workflow.\n'
              'VITE_LOCAL_MODEL_ALLOW_AUTOMATION_DOWNLOADS=false\n',
          )

          mount_path = Path('apps/app/e2e/mount-built-app.ts')
          mount = mount_path.read_text(encoding='utf-8')
          mount = mount.replace(
              'export async function mountBuiltApp(page: Page): Promise<void> {',
              "export interface MountBuiltAppOptions {\n"
              "  readonly localStorage?: Readonly<Record<string, string>>;\n"
              "}\n\n"
              "export async function mountBuiltApp(\n"
              "  page: Page,\n"
              "  options: MountBuiltAppOptions = {},\n"
              "): Promise<void> {",
              1,
          )
          mount = mount.replace('  await page.evaluate(() => {', '  await page.evaluate((initialValues) => {', 1)
          mount = mount.replace(
              "    Object.defineProperty(window, 'localStorage', {\n"
              "      configurable: true,\n"
              "      value: createStorage(),\n"
              "    });\n",
              "    const localStorageValue = createStorage();\n"
              "    for (const [key, value] of Object.entries(initialValues)) {\n"
              "      localStorageValue.setItem(key, value);\n"
              "    }\n"
              "    Object.defineProperty(window, 'localStorage', {\n"
              "      configurable: true,\n"
              "      value: localStorageValue,\n"
              "    });\n",
              1,
          )
          mount = mount.replace(
              "    Object.defineProperty(window, 'sessionStorage', {\n"
              "      configurable: true,\n"
              "      value: createStorage(),\n"
              "    });\n"
              "  });\n",
              "    Object.defineProperty(window, 'sessionStorage', {\n"
              "      configurable: true,\n"
              "      value: createStorage(),\n"
              "    });\n"
              "  }, options.localStorage ?? {});\n",
              1,
          )
          mount_path.write_text(mount, encoding='utf-8')

          replace_once(
              'apps/app/src/features/models/ModelToast.tsx',
              '        class="local-model-toast"\n',
              '        class="local-model-toast"\n        data-testid="local-model-toast"\n',
          )

          Path('apps/app/e2e/local-model-smoke.spec.ts').write_text(
              """import { expect, test } from '@playwright/test';

import { mountBuiltApp } from './mount-built-app';

const enabled = process.env.LOCAL_MODEL_SMOKE === '1';
const modelId = process.env.LOCAL_MODEL_ID;
const modelName = process.env.LOCAL_MODEL_NAME;

test.skip(!enabled, 'Large local-model smoke tests run only in the scheduled/manual workflow.');
test.setTimeout(15 * 60 * 1000);

test('downloads, loads and benchmarks the selected compact CPU model', async ({ page }) => {
  if (!modelId || !modelName) throw new Error('LOCAL_MODEL_ID and LOCAL_MODEL_NAME are required.');

  await mountBuiltApp(page, {
    localStorage: {
      'minimed.local-model-preference.v1': JSON.stringify({
        automatic: false,
        selectedModelId: modelId,
        acceptedLicenseIds: [],
        autoLoad: true,
      }),
    },
  });

  const toast = page.getByTestId('local-model-toast');
  await expect(toast).toContainText('Локальный ИИ готов', { timeout: 12 * 60 * 1000 });
  await expect(toast).toContainText(modelName);
});
""",
              encoding='utf-8',
          )

          Path('.github/workflows/local-model-cpu-smoke.yml').write_text(
              """name: Local model CPU smoke

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: local-model-cpu-smoke
  cancel-in-progress: false

jobs:
  compact-models:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: vikhr-qwen2.5-0.5b-q4
            name: Vikhr Qwen 2.5 0.5B
            file: vikhr-qwen2.5-0.5b-instruct-q4_k_m.gguf
            url: https://huggingface.co/Vikhrmodels/Vikhr-Qwen-2.5-0.5B-instruct-GGUF/resolve/a2bc2797ec4dd39dd99f20a92f7a05a71c8122bf/Vikhr-Qwen-2.5-0.5B-instruct-Q4_K_M.gguf
            sha256: 8f45f00da2bcd70205461639e978db7c8245e205c8604cfe2ab7f5430506bf32
          - id: qwen3-0.6b-q8
            name: Qwen3 0.6B
            file: qwen3-0.6b-q8_0.gguf
            url: https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf
            sha256: 9465e63a22add5354d9bb4b99e90117043c7124007664907259bd16d043bb031
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .cache/local-model-smoke
          key: local-model-smoke-${{ matrix.sha256 }}
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Download and verify model artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache/local-model-smoke apps/app/public/models
          target=.cache/local-model-smoke/${{ matrix.file }}
          if [ ! -f "$target" ]; then
            curl --fail --location --retry 4 --retry-all-errors '${{ matrix.url }}' --output "$target"
          fi
          echo '${{ matrix.sha256 }}  '"$target" | sha256sum --check
          cp "$target" apps/app/public/models/${{ matrix.file }}
      - name: Build model-smoke application
        env:
          VITE_LOCAL_MODEL_CATALOG_URL: bundled
          VITE_LOCAL_MODEL_ASSET_BASE_URL: https://localmed-assets.example.com/models
          VITE_LOCAL_MODEL_ALLOW_UPSTREAM: 'false'
          VITE_LOCAL_MODEL_AUTOLOAD: 'true'
          VITE_LOCAL_MODEL_ALLOW_AUTOMATION_DOWNLOADS: 'true'
        run: pnpm build:app
      - name: Install Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Run real model load and structured-output probe
        env:
          LOCAL_MODEL_SMOKE: '1'
          LOCAL_MODEL_ID: ${{ matrix.id }}
          LOCAL_MODEL_NAME: ${{ matrix.name }}
        run: pnpm exec playwright test apps/app/e2e/local-model-smoke.spec.ts --project=chromium --workers=1
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-model-smoke-${{ matrix.id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
""",
              encoding='utf-8',
          )

          docs_path = Path('docs/LOCAL_MODELS.md')
          docs = docs_path.read_text(encoding='utf-8')
          docs = docs.replace(
              'GGUF through WebAssembly workers, with a conservative context limit and optional WebGPU layers.',
              'GGUF through WebAssembly workers with a conservative context limit. wllama 3.5 is CPU-only; it does not provide WebGPU acceleration.',
          )
          docs += """

## Acceleration reality

The current `wllama-web` adapter is a CPU/WebAssembly path in both browsers and the Capacitor Android
WebView. Device WebGPU capability is retained in the device profile for future runtimes, but it does
not increase the score of a wllama artifact and `n_gpu_layers` is fixed to zero.

GPU and NPU execution require a native LiteRT-LM adapter and a compatible `.litertlm` artifact. Backend
availability must be measured per model and device; an accelerator being present does not imply that it
is faster than CPU for a particular prompt or decoder workload. Gemma 3 1B is the first declared model
for that native comparison.

## CI and physical-device benchmarks

The normal pull-request suite validates catalog trust, selection, fallback, strict output contracts and
application packaging without downloading model weights. A weekly/manual `Local model CPU smoke`
workflow downloads the two compact Apache-licensed GGUF candidates, verifies SHA-256, loads each in real
Chromium/wllama, and requires the fixed Russian probe to produce a valid structured result.

Hosted GitHub runners do not establish Android GPU/NPU support or useful mobile performance numbers.
After the native LiteRT-LM adapter lands, hardware benchmarks must run on labelled self-hosted Android
runners (or an equivalent physical-device lab) and compare CPU, GPU and NPU with the same model, prompt,
thermal state and prefill/decode sizes. The report must include backend actually selected, load time,
TTFT, prefill/decode throughput, peak memory, battery/thermal state, validity and fallback reason.
"""
          docs_path.write_text(docs, encoding='utf-8')

          adr_path = Path('docs/adr/0011-automatic-local-model-selection.md')
          adr = adr_path.read_text(encoding='utf-8')
          adr = adr.replace(
              'Browser GGUF uses a dynamically loaded wllama adapter; LiteRT-LM and Cactus remain separate native adapters.',
              'Browser GGUF uses a dynamically loaded CPU-only wllama adapter; GPU/NPU acceleration belongs to separate native LiteRT-LM adapters.',
          )
          adr += """

## Acceleration and verification amendment

The first implementation incorrectly treated WebGPU availability as an acceleration signal for
`wllama-web`. The upstream wllama runtime is WebAssembly/CPU-only, so the selection bonus and GPU-layer
request are removed. Native GPU/NPU backends must identify themselves explicitly and are benchmarked as
separate runtime artifacts rather than inferred from browser capability.

Real compact-model CPU loading is covered by a non-blocking weekly/manual CI workflow. GPU/NPU claims
cannot be merge-gated on generic hosted runners; they require a physical-device lane after the native
adapter is implemented.
"""
          adr_path.write_text(adr, encoding='utf-8')
          PY
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Format and verify
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm check --write
          pnpm verify
      - name: Publish tested changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-local-model-acceleration-tests.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(models): separate CPU browser runtime from GPU and NPU tests'
          git push origin HEAD:agent/local-model-auto-selection
