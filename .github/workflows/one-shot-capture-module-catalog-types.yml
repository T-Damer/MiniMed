name: One-shot capture module catalog types

on:
  push:
    branches:
      - agent/content-module-catalog
    paths:
      - .github/workflows/one-shot-capture-module-catalog-types.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-catalog
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck > .github/module-catalog-typecheck.txt 2>&1 || true
      - run: rm .github/workflows/one-shot-capture-module-catalog-types.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/module-catalog-typecheck.txt .github/workflows/one-shot-capture-module-catalog-types.yml
          git commit -m "ci: record module catalog type errors"
          git push origin HEAD:agent/content-module-catalog
