name: One-shot execute MiniMed 0.3.1 bump

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/one-shot-run-bump-pr-031.yml

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: release/0.3.1
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
      - run: pnpm install --frozen-lockfile
      - name: Execute embedded release script
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/one-shot-bump-031.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()
          start = lines.index("          python - <<'PY'") + 1
          end = lines.index('          PY', start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end]) + '\n'
          Path('/tmp/prepare-release-031.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/prepare-release-031.py
          pnpm content:compile
          pnpm check
          pnpm typecheck
      - name: Commit prepared release
        run: |
          rm .github/workflows/one-shot-bump-031.yml
          rm .github/workflows/one-shot-run-bump-pr-031.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: prepare MiniMed 0.3.1"
          git push origin HEAD:release/0.3.1
