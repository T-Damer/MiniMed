name: Prepare MiniMed 0.3.3

on:
  push:
    branches: [release/0.3.3]
    paths:
      - .github/workflows/prepare-release-0.3.3.yml

permissions:
  contents: write

concurrency:
  group: prepare-release-0.3.3
  cancel-in-progress: true

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: release/0.3.3
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Align release metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          OLD = '0.3.2'
          NEW = '0.3.3'

          for path in sorted(Path('.').rglob('package.json')):
              if 'node_modules' in path.parts:
                  continue
              data = json.loads(path.read_text(encoding='utf-8'))
              if data.get('version') == OLD:
                  data['version'] = NEW
                  path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          def replace(path: str, old: str, new: str, count: int | None = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              matches = text.count(old)
              if count is not None and matches != count:
                  raise SystemExit(f'{path}: expected {count} matches for {old!r}, found {matches}')
              if matches == 0:
                  raise SystemExit(f'{path}: missing {old!r}')
              file.write_text(text.replace(old, new, matches if count is None else count), encoding='utf-8')

          replace('apps/app/android/app/build.gradle', 'versionCode 10', 'versionCode 11')
          replace('apps/app/android/app/build.gradle', 'versionName "0.3.2"', 'versionName "0.3.3"')
          replace('content/pilot-rf/manifest.yaml', 'version: "0.3.2"', 'version: "0.3.3"')
          replace('content/regulatory-rf-pilot/manifest.yaml', 'version: "0.3.2"', 'version: "0.3.3"')
          replace('apps/app/src/features/status/StatusPanel.tsx', '          0.3.2', '          0.3.3')
          replace('apps/app/src/features/modules/ModuleCatalogView.tsx', 'Текущее состояние 0.3.2', 'Текущее состояние 0.3.3')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          marker = '## [Unreleased]\n\n'
          section = '''## [0.3.3] - 2026-07-22

### Added

- Optional local-model startup infrastructure with a validated six-model catalog, automatic device-fit
  selection, cached viability benchmarks, failure cooldown, one smaller-model fallback, and manual
  controls in the System page.
- Russian-first compact candidates based on Vikhr/QVikhr alongside Qwen, Gemma, and Llama comparison
  candidates, with explicit licence handling and immutable artifact metadata.
- Browser and Android-WebView GGUF loading through a CPU/WebAssembly wllama adapter, plus a passive
  bottom status toast that never blocks deterministic SQLite search.
- A scheduled/manual CI smoke lane that downloads and verifies the compact Vikhr and Qwen artifacts and
  requires valid structured Russian output from the real models.
- Persistent installed-module registry metadata with deterministic snapshots, restart rehydration,
  immutable version/source-set validation, rollback history, and transactional recovery after failed
  storage writes.

### Changed

- Workspace packages, Android application version, public-pilot pack, regulatory pack, and APK release
  workflow are aligned to 0.3.3; Android uses build number 11.
- Local-model selection no longer awards a WebGPU bonus to wllama: the implemented browser/WebView path
  is explicitly CPU-only. GPU/NPU acceleration remains a native LiteRT-LM follow-up.

### Verification boundary

- Model output is not used for diagnosis, treatment, retrieval ranking, or generated clinical answers in
  this release. Deterministic search and safety behavior remain authoritative.
- The release does not bundle model weights. Models are resolved through the validated catalog and
  upstream or configured immutable artifact endpoints after application startup.
- Native Android GPU/NPU execution, streaming artifact installation, physical-device performance tests,
  and source-grounded clinical orchestration remain follow-up work.

'''
          if section not in text:
              if marker not in text:
                  raise SystemExit('CHANGELOG.md: Unreleased marker missing')
              changelog.write_text(text.replace(marker, marker + section, 1), encoding='utf-8')

          state = Path('docs/CURRENT_STATE.md')
          text = state.read_text(encoding='utf-8')
          text = text.replace('> Repository version: `0.3.2`', '> Repository version: `0.3.3`', 1)
          text = text.replace(
              '- An in-memory installed-module registry preserves full validated rollback records and protects required\n  modules from disable/remove operations.',
              '- A persistent installed-module registry preserves validated active versions, rollback history, enabled and\n  update state, immutable source-set identity, and transactional recovery across application restarts.',
              1,
          )
          text = text.replace(
              'The semantic profile is an engineering baseline, not a neural Russian medical model.',
              'The semantic profile is an engineering baseline. The optional local model is an experimental query-\nplanning runtime and is not a source of trusted medical facts or clinical advice.',
              1,
          )
          start = text.index('## Planned 0.3.3 — complete the working local LLM path')
          end = text.index('## Current gaps', start)
          released = '''## Released 0.3.3 — local-model runtime foundation

The application now includes the model catalog, device probe, automatic and manual selection, passive
status UI, CPU/WebAssembly GGUF runtime, structured Russian warm-up probe, cached viability results,
failure cooldown, and a genuinely smaller fallback. Compact real-model CPU smoke tests are available as
a scheduled/manual workflow.

This release establishes runtime viability only. The model remains separate from clinical retrieval and
answers. Before model output can influence the physician-facing flow, it must use typed source-linked
output, preserve deterministic red-flag and negation handling, reject unsupported claims, and improve the
reviewed Russian clinical benchmark.

'''
          text = text[:start] + released + text[end:]
          text = text.replace(
              '- No persistent installed registry, immutable published module artifacts, platform filesystem backend, or\n  background native downloader yet; the module page remains read-only.',
              '- Registry metadata is persistent, but immutable published module artifacts, a platform filesystem backend,\n  and a background native downloader remain unimplemented; the module page remains read-only.',
              1,
          )
          text = text.replace('monolithic `0.3.2` pilot', 'monolithic `0.3.3` pilot', 1)
          text = text.replace(
              '- PR #91 loads and probes local models but does not yet use generated output in clinical retrieval or\n  answers, prove clinical improvement, stream-verify model SHA-256, publish mirrored assets or support\n  native LiteRT-LM/Cactus and iOS inference.',
              '- The local-model runtime does not yet use generated output in clinical retrieval or answers, prove clinical\n  improvement, stream-install artifacts with SHA-256, publish mirrored assets, or support native\n  LiteRT-LM/Cactus and iOS inference.',
              1,
          )
          text = text.replace('### P1 — 0.3.3 local LLM and reviewed workflow', '### P1 — 0.3.4 grounded local model and reviewed workflow', 1)
          old_item = '''4. **Rebase and complete PR #91**
   - Preserve its catalog, device probe, selection algorithm, wllama adapter, UI and license handling.
   - Publish or freeze verified model assets/checksums without committing weights to Git.
   - Add a typed clinical orchestrator that can ask for another local retrieval pass and emit constrained
     source-linked structured output.
   - Keep deterministic safety checks outside the model and require exact source citations.
   - Benchmark the selected default and fallback candidates on Russian clinical contracts, memory,
     storage, latency and unsupported-claim rates before exposing generated clinical text.
'''
          new_item = '''4. **Connect the local-model runtime to grounded retrieval**
   - Publish or freeze verified model assets/checksums without committing weights to Git.
   - Add a typed clinical orchestrator that can ask for another local retrieval pass and emit constrained
     source-linked structured output.
   - Keep deterministic safety checks outside the model and require exact source citations.
   - Benchmark default and fallback candidates on Russian clinical contracts, memory, storage, latency,
     and unsupported-claim rates before exposing generated clinical text.
'''
          if old_item not in text:
              raise SystemExit('docs/CURRENT_STATE.md: P1 item changed unexpectedly')
          text = text.replace(old_item, new_item, 1)
          next_start = text.index('The next release is `0.3.3`')
          next_end = text.index('\n\nDo not prioritize', next_start)
          next_text = '''The next release is `0.3.4`: connect the 0.3.3 model runtime to exact retrieved evidence through
typed structured output and deterministic safety gates, while continuing module persistence and deeper
full-text clinical source work. The no-model path must remain complete and immediately usable.'''
          text = text[:next_start] + next_text + text[next_end:]
          state.write_text(text, encoding='utf-8')
          PY

          pnpm install --lockfile-only
          pnpm check --write
          uv sync --project tools/ingest --all-groups --locked
          pnpm verify
      - name: Commit prepared release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(release): prepare MiniMed 0.3.3'
          git push origin HEAD:release/0.3.3
