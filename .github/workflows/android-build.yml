name: Android smoke build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - run: pnpm install --frozen-lockfile
      - run: pnpm native:source:check
      - run: pnpm build:app
      - run: pnpm native:sync:android
      - working-directory: apps/app/android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: localmed-debug-apk
          path: apps/app/android/app/build/outputs/apk/debug/app-debug.apk
