name: Android smoke build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - run: bun install --frozen-lockfile
      - run: bun run native:source:check
      - run: bun run build:app
      - run: bun run native:sync:android
      - working-directory: apps/app/android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: localmed-debug-apk
          path: apps/app/android/app/build/outputs/apk/debug/app-debug.apk
