# Rerun after concurrent content commits moved the branch head.
name: Apply transactional module storage fix

on:
  push:
    branches: [agent/doctor-datasets-model-diagnostics]
    paths:
      - .github/workflows/apply-module-storage-transaction.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - name: Apply focused patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_exact(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected patch anchor not found in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          registry_path = 'packages/storage/src/installed-module-registry.ts'
          replace_exact(
              registry_path,
              """  public snapshot(): InstalledModuleRegistrySnapshot {\n    return this.registry.snapshot();\n  }\n\n  private commit<T>(mutation: () => T): T {\n""",
              """  public snapshot(): InstalledModuleRegistrySnapshot {\n    return this.registry.snapshot();\n  }\n\n  public restoreSnapshot(snapshot: InstalledModuleRegistrySnapshot): void {\n    const previous = this.registry;\n    this.registry = InMemoryInstalledModuleRegistry.fromSnapshot(snapshot);\n    try {\n      this.persistence.save(this.registry.snapshot());\n    } catch (cause) {\n      this.registry = previous;\n      throw new Error('Unable to persist installed-module registry snapshot restoration.', {\n        cause,\n      });\n    }\n  }\n\n  private commit<T>(mutation: () => T): T {\n""",
          )

          tests_path = 'packages/storage/tests/installed-module-registry.test.ts'
          replace_exact(
              tests_path,
              """  it('fails closed on malformed JSON and structurally invalid stored snapshots', () => {\n""",
              """  it('restores and persists an explicit registry snapshot', () => {\n    const storage = new MemoryStringStorage();\n    const registry = persistentRegistry(storage);\n    registry.activate(installation('1'));\n    const snapshot = registry.snapshot();\n    registry.activate(installation('2'));\n\n    registry.restoreSnapshot(snapshot);\n\n    expect(registry.get('minimed.clinical.pediatrics.infectious')?.version).toBe('1');\n    expect(persistentRegistry(storage).get('minimed.clinical.pediatrics.infectious')?.version).toBe(\n      '1',\n    );\n  });\n\n  it('keeps the current registry when explicit snapshot persistence fails', () => {\n    const storage = new MemoryStringStorage();\n    const registry = persistentRegistry(storage);\n    registry.activate(installation('1'));\n    const snapshot = registry.snapshot();\n    registry.activate(installation('2'));\n    storage.failWrites = true;\n\n    expect(() => registry.restoreSnapshot(snapshot)).toThrow(\n      'Unable to persist installed-module registry snapshot restoration',\n    );\n    expect(registry.get('minimed.clinical.pediatrics.infectious')?.version).toBe('2');\n\n    storage.failWrites = false;\n    expect(persistentRegistry(storage).get('minimed.clinical.pediatrics.infectious')?.version).toBe(\n      '2',\n    );\n  });\n\n  it('fails closed on malformed JSON and structurally invalid stored snapshots', () => {\n""",
          )

          helper = Path('apps/app/src/features/modules/module-registry-transaction.ts')
          helper.write_text(
              """import {\n  type InstalledModuleRegistrySnapshot,\n  PersistentInstalledModuleRegistry,\n} from '@localmed/storage';\n\nfunction asError(cause: unknown): Error {\n  return cause instanceof Error\n    ? cause\n    : new Error('Неизвестная ошибка хранилища модулей.', { cause });\n}\n\nexport async function commitRegistryAndArtifactMutation<T>(\n  registry: PersistentInstalledModuleRegistry,\n  mutateRegistry: () => T,\n  mutateArtifacts: (result: T) => Promise<void>,\n): Promise<T> {\n  const snapshot: InstalledModuleRegistrySnapshot = registry.snapshot();\n  const result = mutateRegistry();\n  try {\n    await mutateArtifacts(result);\n    return result;\n  } catch (cause) {\n    const artifactError = asError(cause);\n    try {\n      registry.restoreSnapshot(snapshot);\n    } catch (restoreCause) {\n      const restoreError = asError(restoreCause);\n      throw new Error(\n        `Не удалось согласовать реестр и файлы модулей: ${artifactError.message}; восстановление реестра также не выполнено: ${restoreError.message}`,\n        { cause: restoreError },\n      );\n    }\n    throw artifactError;\n  }\n}\n""",
              encoding='utf-8',
          )

          helper_test = Path('apps/app/src/features/modules/module-registry-transaction.test.ts')
          helper_test.write_text(
              """import { describe, expect, it } from 'vitest';\n\nimport {\n  type InstalledModuleRegistryPersistence,\n  type InstalledModuleRegistrySnapshot,\n  type ModuleVersionInstallation,\n  PersistentInstalledModuleRegistry,\n} from '@localmed/storage';\n\nimport { commitRegistryAndArtifactMutation } from './module-registry-transaction';\n\nconst MODULE_ID = 'minimed.clinical.pediatrics.infectious';\nconst digest = (character: string): string => `sha256:${character.repeat(64)}`;\n\nfunction installation(version: string): ModuleVersionInstallation {\n  return {\n    moduleId: MODULE_ID,\n    version,\n    required: false,\n    installedAt: `2026-07-22T00:00:0${version}.000Z`,\n    installedSizeBytes: Number(version) * 1_000,\n    sourceSetDigest: digest(version),\n    validation: {\n      checkedAt: '2026-07-22T00:00:00Z',\n      valid: true,\n      checksumValid: true,\n      schemaCompatible: true,\n      sqliteIntegrity: 'ok',\n      message: 'validated',\n    },\n  };\n}\n\nclass MemoryPersistence implements InstalledModuleRegistryPersistence {\n  public value: InstalledModuleRegistrySnapshot | null = null;\n\n  public load(): unknown | null {\n    return this.value;\n  }\n\n  public save(snapshot: InstalledModuleRegistrySnapshot): void {\n    this.value = structuredClone(snapshot);\n  }\n}\n\nfunction registryWithTwoVersions() {\n  const persistence = new MemoryPersistence();\n  const registry = new PersistentInstalledModuleRegistry(persistence);\n  registry.activate(installation('1'));\n  registry.activate(installation('2'));\n  return { persistence, registry };\n}\n\ndescribe('commitRegistryAndArtifactMutation', () => {\n  it('commits a registry rollback after the artifact pointer changes', async () => {\n    const { registry } = registryWithTwoVersions();\n\n    const result = await commitRegistryAndArtifactMutation(\n      registry,\n      () => registry.rollback(MODULE_ID),\n      async (installed) => {\n        expect(installed.version).toBe('1');\n      },\n    );\n\n    expect(result.version).toBe('1');\n    expect(registry.get(MODULE_ID)?.version).toBe('1');\n  });\n\n  it('restores rollback metadata when the artifact pointer update fails', async () => {\n    const { persistence, registry } = registryWithTwoVersions();\n\n    await expect(\n      commitRegistryAndArtifactMutation(\n        registry,\n        () => registry.rollback(MODULE_ID),\n        async () => {\n          throw new Error('indexeddb pointer failure');\n        },\n      ),\n    ).rejects.toThrow('indexeddb pointer failure');\n\n    expect(registry.get(MODULE_ID)?.version).toBe('2');\n    expect(new PersistentInstalledModuleRegistry(persistence).get(MODULE_ID)?.version).toBe('2');\n  });\n\n  it('restores removed metadata when physical deletion fails', async () => {\n    const { persistence, registry } = registryWithTwoVersions();\n\n    await expect(\n      commitRegistryAndArtifactMutation(\n        registry,\n        () => registry.remove(MODULE_ID),\n        async () => {\n          throw new Error('indexeddb delete failure');\n        },\n      ),\n    ).rejects.toThrow('indexeddb delete failure');\n\n    expect(registry.get(MODULE_ID)?.version).toBe('2');\n    expect(new PersistentInstalledModuleRegistry(persistence).get(MODULE_ID)?.version).toBe('2');\n  });\n\n  it('commits registry removal only after physical deletion succeeds', async () => {\n    const { persistence, registry } = registryWithTwoVersions();\n\n    await commitRegistryAndArtifactMutation(\n      registry,\n      () => registry.remove(MODULE_ID),\n      async () => undefined,\n    );\n\n    expect(registry.get(MODULE_ID)).toBeNull();\n    expect(new PersistentInstalledModuleRegistry(persistence).get(MODULE_ID)).toBeNull();\n  });\n});\n""",
              encoding='utf-8',
          )

          runtime_path = 'apps/app/src/features/modules/browser-module-runtime.ts'
          replace_exact(
              runtime_path,
              """  type InstalledModuleRegistry,\n  type MedicalStoreMount,\n  PersistentInstalledModuleRegistry,\n""",
              """  type MedicalStoreMount,\n  PersistentInstalledModuleRegistry,\n""",
          )
          replace_exact(
              runtime_path,
              """import { SqliteMedicalStore } from '@localmed/storage-sqlite';\n\nconst DATABASE_NAME""",
              """import { SqliteMedicalStore } from '@localmed/storage-sqlite';\n\nimport { commitRegistryAndArtifactMutation } from './module-registry-transaction';\n\nconst DATABASE_NAME""",
          )
          replace_exact(
              runtime_path,
              """  public async remove(moduleId: string): Promise<void> {\n    const database = await openDatabase();\n    try {\n      const pointers = database.transaction(ACTIVE_STORE, 'readwrite');\n      pointers.objectStore(ACTIVE_STORE).delete(moduleId);\n      await transactionDone(pointers);\n      const versions = database.transaction(VERSIONS_STORE, 'readwrite');\n      const store = versions.objectStore(VERSIONS_STORE);\n      const keys = await requestResult(store.getAllKeys());\n      for (const key of keys) {\n        if (String(key).startsWith(`${moduleId}@`)) store.delete(key);\n      }\n      await transactionDone(versions);\n    } finally {\n      database.close();\n    }\n  }\n""",
              """  public async remove(moduleId: string): Promise<void> {\n    const database = await openDatabase();\n    try {\n      const transaction = database.transaction([VERSIONS_STORE, ACTIVE_STORE], 'readwrite');\n      transaction.objectStore(ACTIVE_STORE).delete(moduleId);\n      const store = transaction.objectStore(VERSIONS_STORE);\n      const keys = await requestResult(store.getAllKeys());\n      for (const key of keys) {\n        if (String(key).startsWith(`${moduleId}@`)) store.delete(key);\n      }\n      await transactionDone(transaction);\n    } finally {\n      database.close();\n    }\n  }\n""",
          )
          replace_exact(
              runtime_path,
              """  private readonly registry: InstalledModuleRegistry;\n""",
              """  private readonly registry: PersistentInstalledModuleRegistry;\n""",
          )
          replace_exact(
              runtime_path,
              """  public async remove(moduleId: string): Promise<void> {\n    this.registry.remove(moduleId);\n    await this.backend.remove(moduleId);\n  }\n\n  public async rollback(moduleId: string): Promise<InstalledContentModule> {\n    const installed = this.registry.rollback(moduleId);\n    await this.backend.setActive(moduleId, installed.version);\n    return installed;\n  }\n""",
              """  public async remove(moduleId: string): Promise<void> {\n    await commitRegistryAndArtifactMutation(\n      this.registry,\n      () => this.registry.remove(moduleId),\n      () => this.backend.remove(moduleId),\n    );\n  }\n\n  public async rollback(moduleId: string): Promise<InstalledContentModule> {\n    return commitRegistryAndArtifactMutation(\n      this.registry,\n      () => this.registry.rollback(moduleId),\n      (installed) => this.backend.setActive(moduleId, installed.version),\n    );\n  }\n""",
          )

          package_path = Path('apps/app/package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          dependencies = package['dependencies']
          dependencies['@localmed/storage'] = 'workspace:*'
          package['dependencies'] = dict(sorted(dependencies.items()))
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          docs_path = 'docs/CURRENT_STATE.md'
          replace_exact(
              docs_path,
              """- A persistent installed-module registry stores validated active versions, rollback history, enabled and\n  update state, immutable source-set identity, and transactional recovery across application restarts.\n""",
              """- A persistent installed-module registry stores validated active versions, rollback history, enabled and\n  update state, immutable source-set identity, and transactional recovery across application restarts.\n- Browser/Android-WebView module storage removes active pointers and version bytes atomically; failed\n  physical rollback or removal restores the previous persistent registry snapshot instead of leaving\n  metadata and SQLite artifacts inconsistent.\n""",
          )
          PY
      - name: Install and update lockfile
        run: pnpm install --no-frozen-lockfile
      - name: Format and validate
        run: |
          pnpm check --write
          pnpm typecheck
          pnpm test:unit
          pnpm build:app
          pnpm secrets:check
      - name: Commit product changes
        run: |
          rm -f .github/workflows/apply-module-storage-transaction.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(modules): keep registry and artifacts transactional'
          git pull --rebase origin agent/doctor-datasets-model-diagnostics
          git push origin HEAD:agent/doctor-datasets-model-diagnostics
