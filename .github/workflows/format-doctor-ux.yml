name: Format doctor UX branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format-and-diagnose:
    if: github.event.pull_request.head.ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format and lint-fix branch
        run: pnpm check --write
      - name: Capture type diagnostics
        shell: bash
        run: |
          set +e
          pnpm typecheck > docs/.doctor-ux-diagnostics.txt 2>&1
          status=$?
          set -e
          printf '\nTYPECHECK_EXIT=%s\n' "$status" >> docs/.doctor-ux-diagnostics.txt
      - name: Publish formatting and diagnostics
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: format doctor UX and capture diagnostics'
          git push origin HEAD:agent/doctor-datasets-model-diagnostics
