name: One-shot capture compact taxonomy lint

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-capture-compact-taxonomy-lint.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          uv run --project tools/ingest ruff check \
            tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py \
            tools/ingest/src/localmed_ingest/clinical_query_annotations.py \
            tools/ingest/tests/test_clinical_query_annotations.py \
            > .github/compact-taxonomy-lint.txt 2>&1 || true
      - run: rm .github/workflows/one-shot-capture-compact-taxonomy-lint.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/compact-taxonomy-lint.txt .github/workflows/one-shot-capture-compact-taxonomy-lint.yml
          git commit -m "ci: record compact taxonomy lint"
          git push origin HEAD:agent/clinical-query-benchmark
