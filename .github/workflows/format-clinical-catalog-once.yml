name: Format clinical catalog once

on:
  pull_request:
    branches: [agent/doctor-datasets-model-diagnostics]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'agent/bulk-clinical-catalog'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/bulk-clinical-catalog
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Apply lint fix and formatting
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/clinical_catalog.py')
          text = path.read_text(encoding='utf-8')
          if 'import contextlib\n' not in text:
              text = text.replace('import csv\n', 'import contextlib\nimport csv\n', 1)
          before = '''    try:\n        delimiter = csv.Sniffer().sniff(sample, delimiters=",;\\t|").delimiter\n    except csv.Error:\n        pass\n'''
          after = '''    with contextlib.suppress(csv.Error):\n        delimiter = csv.Sniffer().sniff(sample, delimiters=",;\\t|").delimiter\n'''
          if before in text:
              text = text.replace(before, after, 1)
          elif after not in text:
              raise SystemExit('CSV sniffer block was not found.')
          path.write_text(text, encoding='utf-8')
          PY
          uv run --project tools/ingest ruff format \
            tools/ingest/src/localmed_ingest/clinical_catalog.py \
            tools/ingest/src/localmed_ingest/clinical_catalog_cli.py \
            tools/ingest/tests/test_clinical_catalog.py
          uv run --project tools/ingest ruff check \
            tools/ingest/src/localmed_ingest/clinical_catalog.py \
            tools/ingest/src/localmed_ingest/clinical_catalog_cli.py \
            tools/ingest/tests/test_clinical_catalog.py
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests/test_clinical_catalog.py
      - name: Publish formatted files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/ingest/src/localmed_ingest/clinical_catalog.py \
            tools/ingest/src/localmed_ingest/clinical_catalog_cli.py \
            tools/ingest/tests/test_clinical_catalog.py
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: format clinical catalog inventory'
          git push origin HEAD:agent/bulk-clinical-catalog
