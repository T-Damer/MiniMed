          connection.executescript('''
          PRAGMA journal_mode=DELETE;
          PRAGMA synchronous=FULL;
          PRAGMA user_version=302;
          CREATE TABLE pack_metadata (
              key TEXT PRIMARY KEY,
              value TEXT NOT NULL
          );
          CREATE TABLE documents (
              id TEXT PRIMARY KEY,
              title TEXT NOT NULL,
              specialty TEXT NOT NULL,
              age_group TEXT NOT NULL,
              section TEXT NOT NULL,
              body TEXT NOT NULL,
              keywords TEXT NOT NULL,
              anchor TEXT NOT NULL,
              source_label TEXT NOT NULL
          );
          CREATE INDEX idx_documents_title ON documents(title);
          CREATE INDEX idx_documents_specialty ON documents(specialty);
          ''')
          metadata = {
              'pack_id': 'minimed.synthetic.core',
              'pack_version': '0.3.0-alpha.2',
              'schema_version': '1',
              'content_status': 'synthetic_demo_only',
              'offline': 'true',
          }
          connection.executemany('INSERT INTO pack_metadata(key, value) VALUES (?, ?)', metadata.items())
          for index, item in enumerate(documents, start=1):
              connection.execute(
                  '''INSERT INTO documents(
                      id, title, specialty, age_group, section, body, keywords, anchor, source_label
                  ) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)''',
                  (
                      item['id'], item['title'], item['specialty'], item['age_group'], item['section'],
                      item['body'], item['keywords'], f'localmed://synthetic/{index:03d}',
                      'SYNTHETIC DEMO · NOT CLINICAL GUIDANCE',
                  ),
              )
          connection.commit()
          connection.execute('VACUUM')
          quick_check = connection.execute('PRAGMA quick_check').fetchone()[0]
          count = connection.execute('SELECT COUNT(*) FROM documents').fetchone()[0]
          connection.close()
          if quick_check != 'ok' or count != len(documents):
              raise SystemExit(f'database verification failed: quick_check={quick_check}, count={count}')
          sha256 = hashlib.sha256(output.read_bytes()).hexdigest()
          report = {
              'packId': metadata['pack_id'],
              'version': metadata['pack_version'],
              'documents': count,
              'bytes': output.stat().st_size,
              'sha256': sha256,
              'quickCheck': quick_check,
          }
          Path('dist').mkdir(exist_ok=True)
          Path('dist/content-pack-report.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False))
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p "$PROJECT_DIR" :app:assembleDebug --stacktrace --no-daemon
          apk="$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk"
          test -s "$apk"
          cp "$apk" "$DIST_DIR/MiniMed-${VERSION}-debug.apk"

      - name: Verify the embedded database inside the APK
        shell: bash
        run: |
          set -euo pipefail
          apk="$DIST_DIR/MiniMed-${VERSION}-debug.apk"
          source_db="$PROJECT_DIR/app/src/main/assets/minimed-core.db"
          unzip -l "$apk" | tee "$DIST_DIR/apk-contents.txt"
          unzip -p "$apk" assets/minimed-core.db > "$DIST_DIR/extracted-minimed-core.db"
          cmp "$source_db" "$DIST_DIR/extracted-minimed-core.db"
          python - <<'PY'
          import hashlib
          import json
          import os
          import sqlite3
          from pathlib import Path

          apk = Path('dist') / f"MiniMed-{os.environ['VERSION']}-debug.apk"
          database = Path('dist/extracted-minimed-core.db')
          connection = sqlite3.connect(f'file:{database}?mode=ro', uri=True)
          quick_check = connection.execute('PRAGMA quick_check').fetchone()[0]
          count = connection.execute('SELECT COUNT(*) FROM documents').fetchone()[0]
          metadata = dict(connection.execute('SELECT key, value FROM pack_metadata'))
          connection.close()
          if quick_check != 'ok' or count != 9:
              raise SystemExit(f'packaged database verification failed: {quick_check=}, {count=}')
          manifest = {
              'version': os.environ['VERSION'],
              'tag': os.environ['TAG'],
              'commit': os.environ['GITHUB_SHA'],
              'apk': {
                  'name': apk.name,
                  'bytes': apk.stat().st_size,
                  'sha256': hashlib.sha256(apk.read_bytes()).hexdigest(),
                  'signing': 'Android debug signing key generated on GitHub Actions',
              },
              'embeddedDatabase': {
                  'pathInApk': 'assets/minimed-core.db',
                  'bytes': database.stat().st_size,
                  'sha256': hashlib.sha256(database.read_bytes()).hexdigest(),
                  'quickCheck': quick_check,
                  'documents': count,
                  'metadata': metadata,
              },
              'networkRequiredAtRuntime': False,
          }
          Path('dist/BUILD-MANIFEST.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY
          rm "$DIST_DIR/extracted-minimed-core.db"
          (
            cd "$DIST_DIR"
            sha256sum "MiniMed-${VERSION}-debug.apk" content-pack-report.json BUILD-MANIFEST.json > SHA256SUMS.txt
          )

      - name: Package generated source snapshot
        shell: bash
        run: |
          set -euo pipefail
          (
            cd "$(dirname "$PROJECT_DIR")"
            zip -qr "$DIST_DIR/MiniMed-${VERSION}-android-source.zip" "$(basename "$PROJECT_DIR")" \
              -x '*/build/*' '*/.gradle/*'
          )

      - name: Write release notes
        shell: bash
        run: |
          cat > "$DIST_DIR/RELEASE_NOTES.md" <<EOF
          # MiniMed ${VERSION}

          First installable Android engineering preview.

          ## Included

          - an offline Android application with no runtime network permission;
          - a SQLite content pack physically embedded at \`assets/minimed-core.db\` inside the APK;
          - nine synthetic search cards covering respiratory, abdominal, urinary, infectious, gastrointestinal and allergic scenarios;
          - free-form Russian text input, lightweight deterministic case extraction, aliases and ranked local search;
          - archive/paper-inspired mobile interface;
          - a build manifest, content-pack report and SHA-256 checksums;
          - generated Android source snapshot.

          ## Verification performed by GitHub Actions

          The workflow extracts the database back out of the APK, compares it byte-for-byte with the source pack, opens it read-only, runs \`PRAGMA quick_check\`, and checks the expected document count before publishing.

          ## Important limitations

          This is a technical preview. The embedded materials are synthetic demonstrations, not clinical recommendations and not medical guidance. The APK is debug-signed for direct testing and is not intended for store distribution.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniMed-${{ env.VERSION }}-android
          path: |
            dist/MiniMed-${{ env.VERSION }}-debug.apk
            dist/MiniMed-${{ env.VERSION }}-android-source.zip
            dist/BUILD-MANIFEST.json
            dist/content-pack-report.json
            dist/SHA256SUMS.txt
            dist/apk-contents.txt
            dist/RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git tag -f "$TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "MiniMed ${VERSION}" \
              --notes-file "$DIST_DIR/RELEASE_NOTES.md" \
              --prerelease
            gh release upload "$TAG" \
              "$DIST_DIR/MiniMed-${VERSION}-debug.apk" \
              "$DIST_DIR/MiniMed-${VERSION}-android-source.zip" \
              "$DIST_DIR/BUILD-MANIFEST.json" \
              "$DIST_DIR/content-pack-report.json" \
              "$DIST_DIR/SHA256SUMS.txt" \
              --clobber
          else
            gh release create "$TAG" \
              "$DIST_DIR/MiniMed-${VERSION}-debug.apk" \
              "$DIST_DIR/MiniMed-${VERSION}-android-source.zip" \
              "$DIST_DIR/BUILD-MANIFEST.json" \
              "$DIST_DIR/content-pack-report.json" \
              "$DIST_DIR/SHA256SUMS.txt" \
              --target "$GITHUB_SHA" \
              --title "MiniMed ${VERSION}" \
              --notes-file "$DIST_DIR/RELEASE_NOTES.md" \
              --prerelease
          fi
