name: Repair full-source pull request

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-full-source-pr.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-full-source-pr
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out full-source branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-source-0.3.0-alpha.1
          fetch-depth: 0

      - name: Make imported source public-runner compatible
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          lock = Path('tools/ingest/uv.lock')
          content = lock.read_text(encoding='utf-8')
          content = content.replace(
              'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/pypi/pypi-public/simple',
              'https://pypi.org/simple',
          )
          content = content.replace(
              'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/pypi/pypi-public/packages/packages/',
              'https://files.pythonhosted.org/packages/',
          )
          lock.write_text(content, encoding='utf-8')

          test_file = Path('packages/storage-sqlite/tests/sqlite-medical-store.test.ts')
          test_content = test_file.read_text(encoding='utf-8')
          test_content = test_content.replace(
              "readFile('data/build/core-demo.db')",
              "readFile('apps/app/public/content/core-demo.db')",
          )
          test_file.write_text(test_content, encoding='utf-8')

          for obsolete in (
              Path('.github/workflows/bootstrap-localmed.yml'),
              Path('.github/workflows/android-embedded-release.yml'),
          ):
              obsolete.unlink(missing_ok=True)

          assert 'internal.api.openai.org' not in lock.read_text(encoding='utf-8')
          assert "readFile('data/build/core-demo.db')" not in test_file.read_text(encoding='utf-8')
          PY

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No repair changes required.'
            exit 0
          fi
          git commit -m 'fix(ci): make full-source import reproducible'
          git push origin HEAD:agent/full-source-0.3.0-alpha.1
