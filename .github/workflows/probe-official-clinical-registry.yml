name: Probe official clinical registry export

on:
  pull_request:
    branches: [agent/catalog-module-builder]
    paths:
      - tools/catalogs/probe-clinical-registry.mjs
      - tools/catalogs/official-clinical-registry.trigger

permissions:
  contents: read

jobs:
  probe:
    if: github.event.pull_request.head.ref == 'agent/official-clinical-registry-export'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/official-clinical-registry-export
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - name: Capture the public Rubricator export and network metadata
        run: node tools/catalogs/probe-clinical-registry.mjs data/build/official-clinical-registry-probe
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: official-clinical-registry-probe
          path: data/build/official-clinical-registry-probe
          if-no-files-found: error
