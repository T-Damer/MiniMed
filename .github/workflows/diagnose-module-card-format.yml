name: Apply module card formatting

on:
  push:
    branches: [agent/doctor-datasets-model-diagnostics]
    paths:
      - .github/workflows/diagnose-module-card-format.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome format --write apps/app/src/features/modules/ModuleCatalogView.tsx
      - run: pnpm exec biome check apps/app/src/features/modules/ModuleCatalogView.tsx
      - run: pnpm --filter @localmed/app typecheck
      - run: |
          rm -f .github/workflows/diagnose-module-card-format.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style(modules): format installed dataset details'
          git pull --rebase origin agent/doctor-datasets-model-diagnostics
          git push origin HEAD:agent/doctor-datasets-model-diagnostics
