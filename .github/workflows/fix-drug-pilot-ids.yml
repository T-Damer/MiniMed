name: Correct drug pilot evidence identifiers

on:
  push:
    branches: [agent/drug-real-data-pilot]
    paths:
      - .github/workflows/fix-drug-pilot-ids.yml

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-real-data-pilot
          fetch-depth: 0
      - name: Replace IDs with parser-generated values
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('content/pilot-rf/knowledge.yaml')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'chunk.1b7c6bc6503f1e30': 'chunk.c6571f9984f6462b',
              'chunk.56928a2c545263d0': 'chunk.77115f24d182141d',
              'chunk.5b1f4270d70732e6': 'chunk.35fef50290ecf58f',
              'chunk.bd7cd21a128ea5a7': 'chunk.bc6615dcc5de5522',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected identifier: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add content/pilot-rf/knowledge.yaml
          git commit -m 'fix(knowledge): align evidence with generated chunk IDs'
          git push origin HEAD:agent/drug-real-data-pilot
