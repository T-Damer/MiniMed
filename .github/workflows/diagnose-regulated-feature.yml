name: Diagnose regulated catalog feature

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-regulated-feature.yml
      - .github/trigger-regulated-diagnostics

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'ops/run-regulated-diagnostics'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/drug-law-catalogs
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Capture exact validation output
        shell: bash
        run: |
          set +e
          mkdir -p docs
          {
            echo '=== RUFF FORMAT ==='
            uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
            echo "RUFF_FORMAT_EXIT=$?"
            echo
            echo '=== RUFF CHECK ==='
            uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
            echo "RUFF_CHECK_EXIT=$?"
            echo
            echo '=== PYRIGHT ==='
            uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
            echo "PYRIGHT_EXIT=$?"
            echo
            echo '=== PYTEST ==='
            uv run --project tools/ingest pytest tools/ingest/tests/test_regulated_catalogs.py
            echo "PYTEST_EXIT=$?"
            echo
            echo '=== CLI HELP ==='
            uv run --project tools/ingest medbase-regulated-catalog --help
            echo "CLI_HELP_EXIT=$?"
          } > docs/.regulated-catalog-diagnostics.txt 2>&1
          set -e
      - name: Publish diagnostics to feature branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/.regulated-catalog-diagnostics.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: capture regulated catalog diagnostics'
          git push origin HEAD:agent/drug-law-catalogs
