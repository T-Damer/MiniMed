name: Diagnose 0.3.2 unit tests

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-unit-tests-032.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm test:unit > unit-tests.txt 2>&1
          printf '\nexit=%s\n' "$?" >> unit-tests.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: minimed-032-unit-errors
          path: unit-tests.txt
          retention-days: 1
