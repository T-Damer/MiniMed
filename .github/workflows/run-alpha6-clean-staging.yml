name: Run clean MiniMed alpha 6 staging

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: run-clean-alpha6-staging
  cancel-in-progress: false

jobs:
  stage:
    if: github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Stage clean MiniMed alpha 6'
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mobile-ux-alpha6-clean-staging
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Execute the registered staging script
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/scripts/stage-alpha6-product.sh > /tmp/stage-alpha6-product.sh
          chmod +x /tmp/stage-alpha6-product.sh
          /tmp/stage-alpha6-product.sh

      - name: Close successful trigger
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --comment 'Clean alpha.6 product tree staged and fully verified.'
