name: Execute mobile UX migration

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/execute-mobile-ux-migration.yml
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event_name == 'push' || (github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Execute MiniMed mobile UX migration')
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mobile-ux-0.3.0-alpha.6
          fetch-depth: 0

      - name: Report migration run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_number="${{ github.event.issue.number || 50 }}"
          gh issue comment "$issue_number" --repo "$GITHUB_REPOSITORY" \
            --body "Mobile UX migration run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} (run_id=${GITHUB_RUN_ID})."

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
          enable-cache: true

      - name: Execute checked-in migration
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-mobile-ux-alpha6.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines)
          exec(compile(script, 'apply-mobile-ux-alpha6.py', 'exec'))

          css_path = Path('apps/app/src/styles/mobile-shell.css')
          css = css_path.read_text(encoding='utf-8').replace('display: none !important;', 'display: none;')
          if '.sr-only {' not in css:
              css += '''

          .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
          }

          fieldset.library-mode-tabs {
            min-inline-size: 0;
            padding: 0;
            border: 0;
          }

          ol.history-list {
            padding: 0;
            list-style: none;
          }
          '''
          css_path.write_text(css, encoding='utf-8')
          PY

      - name: Keep workflow changes for the authenticated connector
        shell: bash
        run: git checkout -- .github/workflows

      - name: Refresh dependency lockfiles
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked

      - name: Publish generated product migration to the draft branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(app): simplify mobile search and archive navigation'
          git push origin HEAD:agent/mobile-ux-0.3.0-alpha.6

      - name: Verify the published migration
        run: pnpm verify

      - name: Close trigger issue
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --comment 'Mobile UX product migration completed and verified.'
