name: One-shot fix installer contract types

on:
  push:
    branches:
      - agent/content-module-installer
    paths:
      - .github/workflows/one-shot-fix-installer-contract-types.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/core/src/content-module-installer.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('  type ContentModuleArtifactSchema,\n', '')
          text = text.replace('  type ContentModuleValidationSchema,\n', '  type InstalledContentModule,\n')
          text = text.replace("import type { z } from 'zod';\n\n", '')
          text = text.replace(
              'type ModuleArtifact = z.infer<typeof ContentModuleArtifactSchema>;\n'
              'type ModuleValidation = z.infer<typeof ContentModuleValidationSchema>;\n',
              "type ModuleArtifact = ContentModuleCatalogEntry['artifacts'][number];\n"
              "type ModuleValidation = NonNullable<InstalledContentModule['lastValidation']>;\n",
          )
          path.write_text(text, encoding='utf-8')

          path = Path('packages/core/tests/content-module-installer.test.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('  ContentModuleArtifactSchema,\n', '')
          text = text.replace("import type { z } from 'zod';\n\n", '')
          text = text.replace(
              'type Artifact = z.infer<typeof ContentModuleArtifactSchema>;\n',
              "type Artifact = ContentModuleCatalogEntry['artifacts'][number];\n",
          )
          path.write_text(text, encoding='utf-8')
          PY
      - run: >-
          pnpm exec biome check --write
          packages/core/src/content-module-installer.ts
          packages/core/tests/content-module-installer.test.ts
      - run: rm .github/workflows/one-shot-fix-installer-contract-types.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(modules): derive installer types from contracts"
          git push origin HEAD:agent/content-module-installer
