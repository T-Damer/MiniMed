name: Deploy landing to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - ".github/workflows/landing-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GITHUB_URL: ${{ github.server_url }}/${{ github.repository }}
      PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
      PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:landing
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/landing/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
