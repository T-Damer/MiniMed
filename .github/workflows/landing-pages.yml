name: Deploy landing to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - ".github/workflows/landing-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GITHUB_URL: ${{ github.server_url }}/${{ github.repository }}
      PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
      PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:landing
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/landing/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
