name: Diagnose live mount types

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-live-mount-types.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm --filter @localmed/app typecheck > live-mount-types.txt 2>&1
          printf '\nexit=%s\n' "$?" >> live-mount-types.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: live-mount-types
          path: live-mount-types.txt
          retention-days: 1
