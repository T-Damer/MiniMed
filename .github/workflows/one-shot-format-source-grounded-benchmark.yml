name: One-shot format source-grounded benchmark

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-format-source-grounded-benchmark.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec biome check --write
          package.json
          tools/benchmarks/src/run-pilot.ts
          tools/benchmarks/pilot-rf-queries.json
      - run: rm .github/workflows/one-shot-format-source-grounded-benchmark.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json tools/benchmarks/src/run-pilot.ts tools/benchmarks/pilot-rf-queries.json .github/workflows/one-shot-format-source-grounded-benchmark.yml
          git commit -m "style(benchmarks): format source-grounded benchmark"
          git push origin HEAD:agent/clinical-query-benchmark
