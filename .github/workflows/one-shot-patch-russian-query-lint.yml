name: One-shot patch Russian query lint

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-patch-russian-query-lint.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '        r"\\b(?:presents?|presented|history of|complains? of|was diagnosed|is taking|currently on)\\b",': '        (\n            r"\\b(?:presents?|presented|history of|complains? of|was diagnosed|"\n            r"is taking|currently on)\\b"\n        ),',
              '            r"\\b(?:elevated|decreased|low|high|abnormal|positive|negative) (?:level|result|value|test)\\b",': '            (\n                r"\\b(?:elevated|decreased|low|high|abnormal|positive|negative) "\n                r"(?:level|result|value|test)\\b"\n            ),',
              '            r"\\b(?:not respond(?:ing|ed)?|no response|failed|failure|refractory|persistent despite)\\b",': '            (\n                r"\\b(?:not respond(?:ing|ed)?|no response|failed|failure|refractory|"\n                r"persistent despite)\\b"\n            ),',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected source fragment: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - run: >-
          uv run --project tools/ingest ruff check --fix
          tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py
          tools/ingest/src/localmed_ingest/clinical_query_annotations.py
          tools/ingest/tests/test_clinical_query_annotations.py
      - run: >-
          uv run --project tools/ingest ruff format
          tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py
          tools/ingest/src/localmed_ingest/clinical_query_annotations.py
          tools/ingest/tests/test_clinical_query_annotations.py
      - run: >-
          uv run --project tools/ingest ruff check
          tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py
          tools/ingest/src/localmed_ingest/clinical_query_annotations.py
          tools/ingest/tests/test_clinical_query_annotations.py
      - run: rm .github/russian-query-lint.txt .github/workflows/one-shot-patch-russian-query-lint.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py tools/ingest/src/localmed_ingest/clinical_query_annotations.py tools/ingest/tests/test_clinical_query_annotations.py .github/russian-query-lint.txt .github/workflows/one-shot-patch-russian-query-lint.yml
          git commit -m "fix(benchmarks): satisfy Russian query lint"
          git push origin HEAD:agent/clinical-query-benchmark
