name: One-shot fix query test import group

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-fix-query-import-group.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/tests/test_clinical_query_annotations.py')
          text = path.read_text(encoding='utf-8')
          old = '''import pytest
from localmed_ingest.clinical_query_annotations import (
    annotate_clinical_query_benchmark,
    load_imported_clinical_queries,
)
from localmed_ingest.clinical_query_taxonomy import (
    DecisionKind,
    annotate_clinical_query,
)
from pydantic import BaseModel, ConfigDict, Field, TypeAdapter
'''
          new = '''import pytest
from pydantic import BaseModel, ConfigDict, Field, TypeAdapter

from localmed_ingest.clinical_query_annotations import (
    annotate_clinical_query_benchmark,
    load_imported_clinical_queries,
)
from localmed_ingest.clinical_query_taxonomy import (
    DecisionKind,
    annotate_clinical_query,
)
'''
          if old not in text:
              raise SystemExit('expected import block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - run: uv run --project tools/ingest ruff check tools/ingest/tests/test_clinical_query_annotations.py
      - run: rm .github/workflows/one-shot-fix-query-import-group.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ingest/tests/test_clinical_query_annotations.py .github/workflows/one-shot-fix-query-import-group.yml
          git commit -m "fix(benchmarks): group query test imports"
          git push origin HEAD:agent/clinical-query-benchmark
