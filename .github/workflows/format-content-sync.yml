name: Format automated content sync

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/format-content-sync.yml
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  format:
    if: github.event_name == 'push' || (github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Format automated content sync')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/automated-content-rebuild
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.0"
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Format, lint and test the sync layer
        run: |
          uv run --project tools/ingest ruff format tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check --fix tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests
      - name: Commit formatted sources
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/ingest/src tools/ingest/tests
          git commit -m 'style(ingest): format source synchronization layer'
          git push origin HEAD:agent/automated-content-rebuild
      - name: Close trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment 'Content-sync source formatted, type-checked and tested.'
