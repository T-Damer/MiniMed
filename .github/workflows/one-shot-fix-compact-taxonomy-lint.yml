name: One-shot fix compact taxonomy lint

on:
  push:
    branches:
      - agent/clinical-query-benchmark
    paths:
      - .github/workflows/one-shot-fix-compact-taxonomy-lint.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/clinical-query-benchmark
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('from typing import Literal, NamedTuple, TypeAlias', 'from typing import Literal, NamedTuple')
          text = text.replace('RuleSpec: TypeAlias = tuple[str, str, int]', 'type RuleSpec = tuple[str, str, int]')
          text = text.replace(
              'RuleMap: TypeAlias = dict[DecisionKind, tuple[_SignalRule, ...]]',
              'type RuleMap = dict[DecisionKind, tuple[_SignalRule, ...]]',
          )
          text = text.replace(
              'Profile: TypeAlias = tuple[str, RuleMap, tuple[_SignalRule, ...]]',
              'type Profile = tuple[str, RuleMap, tuple[_SignalRule, ...]]',
          )
          old = '                r"\\b(?:define|definition|what is|overview|mechanism|pathophysiology|epidemiology|guideline)\\b",'
          new = '''                (
                    r"\\b(?:define|definition|what is|overview|mechanism|"
                    r"pathophysiology|epidemiology|guideline)\\b"
                ),'''
          if old not in text:
              raise SystemExit('expected English reference pattern not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - run: rm .github/compact-taxonomy-lint.txt .github/workflows/one-shot-fix-compact-taxonomy-lint.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/ingest/src/localmed_ingest/clinical_query_taxonomy.py .github/compact-taxonomy-lint.txt .github/workflows/one-shot-fix-compact-taxonomy-lint.yml
          git commit -m "fix(benchmarks): satisfy compact taxonomy lint"
          git push origin HEAD:agent/clinical-query-benchmark
