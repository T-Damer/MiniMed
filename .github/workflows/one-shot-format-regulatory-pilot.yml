name: One-shot format regulatory pilot

on:
  push:
    branches:
      - agent/russian-regulatory-pilot
    paths:
      - .github/workflows/one-shot-format-regulatory-pilot.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/russian-regulatory-pilot
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >-
          pnpm exec biome check --write
          package.json
          tools/benchmarks/package.json
          tools/benchmarks/regulatory-rf-queries.json
          tools/benchmarks/src/run-regulatory.ts
      - run: rm .github/workflows/one-shot-format-regulatory-pilot.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            package.json \
            tools/benchmarks/package.json \
            tools/benchmarks/regulatory-rf-queries.json \
            tools/benchmarks/src/run-regulatory.ts \
            .github/workflows/one-shot-format-regulatory-pilot.yml
          git commit -m "style(regulatory): format pilot files"
          git push origin HEAD:agent/russian-regulatory-pilot
