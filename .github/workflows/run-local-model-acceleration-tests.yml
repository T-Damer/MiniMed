name: Run local model acceleration patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: run-local-model-acceleration-patch
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/local-model-auto-selection'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - name: Execute checked-in patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-local-model-acceleration-tests.yml').read_text(
              encoding='utf-8'
          )
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = "\n".join(
              line[10:] if line.startswith("          ") else line for line in lines
          )
          exec(compile(script, 'apply-local-model-acceleration-tests.py', 'exec'))
          PY
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - name: Format and verify
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm check --write
          pnpm verify
      - name: Publish tested changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-local-model-acceleration-tests.yml
          rm -f .github/workflows/run-local-model-acceleration-tests.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(models): separate CPU browser runtime from GPU and NPU tests'
          git push origin HEAD:agent/local-model-auto-selection
