name: Apply drug knowledge hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-drug-knowledge-hardening
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/drug-knowledge-graph'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/drug-knowledge-graph
          fetch-depth: 0

      - name: Apply rights and identity hardening
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if text.count(old) != 1:
                  raise SystemExit(f'{label}: expected one match, found {text.count(old)}')
              return text.replace(old, new, 1)

          knowledge_path = Path('tools/ingest/src/localmed_ingest/knowledge.py')
          text = knowledge_path.read_text(encoding='utf-8')
          if 'def require_ai_processing_license(' in text:
              raise SystemExit('knowledge hardening is already present')

          helper_marker = '\ndef _document_maps(\n'
          helper = r'''

def require_ai_processing_license(document: PackDocument) -> str:
    """Fail closed before source text is sent to a third-party model workflow."""
    if authority_tier_for_document(document) == "synthetic-fixture":
        return "synthetic-fixture"

    rights = document.metadata.get("rights")
    if not isinstance(rights, dict):
        raise ValueError(
            f"Document {document.id} cannot be exported to ChatGPT without explicit "
            "derivative-processing rights metadata."
        )
    allowed = rights.get(
        "allowsDerivativeProcessing", rights.get("allows_derivative_processing")
    )
    if allowed is not True:
        raise ValueError(
            f"Document {document.id} cannot be exported to ChatGPT because "
            "derivative processing is not allowed."
        )
    license_id = rights.get("licenseId", rights.get("license_id"))
    if not isinstance(license_id, str) or not license_id.strip():
        raise ValueError(
            f"Document {document.id} cannot be exported to ChatGPT without a licenseId."
        )
    return license_id.strip()


def _external_id_key(namespace: str, value: str) -> tuple[str, str]:
    return namespace.strip().casefold(), value.strip().casefold()


def _entity_identity_key(
    entity_type: str,
    canonical_name: str,
    medication: MedicationProfile | None,
) -> tuple[str, ...] | None:
    normalized_type = normalize_surface_text(entity_type)
    normalized_name = normalize_surface_text(canonical_name)
    if medication is None:
        # Medication names alone are not safe cross-document identifiers: the same display name can
        # refer to a substance, clinical drug, brand, package, or registration.
        return None if normalized_type == "medication" else ("entity", normalized_type, normalized_name)

    strong_values = (
        medication.inn,
        medication.dosage_form,
        medication.route,
        medication.strength,
        medication.registration_number,
    )
    if not any(isinstance(value, str) and value.strip() for value in strong_values):
        return None
    return (
        "medication",
        normalize_surface_text(medication.concept_level),
        normalized_name,
        normalize_surface_text(medication.inn or ""),
        normalize_surface_text(medication.atc_code or ""),
        normalize_surface_text(medication.dosage_form or ""),
        normalize_surface_text(medication.route or ""),
        normalize_surface_text(medication.strength or ""),
        normalize_surface_text(medication.registration_number or ""),
    )


def _merge_entity(existing: KnowledgeEntity, candidate: KnowledgeEntity) -> None:
    if normalize_surface_text(existing.entity_type) != normalize_surface_text(candidate.entity_type):
        raise ValueError(
            f"Entity {existing.id} received conflicting types: "
            f"{existing.entity_type} and {candidate.entity_type}."
        )

    existing_names = {
        ("ru", normalize_surface_text(existing.canonical_name)),
        *((name.language, normalize_surface_text(name.name)) for name in existing.names),
    }
    candidate_names = [
        KnowledgeName(name=candidate.canonical_name, name_type="alternate-canonical"),
        *candidate.names,
    ]
    for name in candidate_names:
        key = (name.language, normalize_surface_text(name.name))
        if key in existing_names:
            continue
        existing.names.append(name)
        existing_names.add(key)

    for namespace, value in candidate.external_ids.items():
        previous = existing.external_ids.get(namespace)
        if previous is not None and previous.casefold() != value.casefold():
            raise ValueError(
                f"Conflicting external id {namespace} for entity {existing.canonical_name}."
            )
        existing.external_ids[namespace] = value

    if existing.medication is None:
        existing.medication = candidate.medication
        return
    if candidate.medication is None:
        return

    for field_name in (
        "concept_level",
        "inn",
        "atc_code",
        "dosage_form",
        "route",
        "strength",
        "registration_number",
        "registration_status",
        "pediatric_status",
    ):
        current = getattr(existing.medication, field_name)
        incoming = getattr(candidate.medication, field_name)
        if incoming is None or (isinstance(incoming, str) and not incoming.strip()):
            continue
        if current is None or (isinstance(current, str) and not current.strip()):
            setattr(existing.medication, field_name, incoming)
            continue
        if normalize_surface_text(current) != normalize_surface_text(incoming):
            raise ValueError(
                f"Conflicting medication field {field_name} for entity "
                f"{existing.canonical_name}: {current!r} versus {incoming!r}."
            )
'''
          if text.count(helper_marker) != 1:
              raise SystemExit('document map marker was not found exactly once')
          text = text.replace(helper_marker, helper + helper_marker, 1)

          export_start = text.index('def export_chatgpt_tasks(')
          export_end = text.index('\ndef _load_jsonl(', export_start)
          export_block = text[export_start:export_end]
          export_block = replace_once(
              export_block,
              '    for document in documents:\n        for section in document.sections:\n',
              '    for document in documents:\n'
              '        processing_license_id = require_ai_processing_license(document)\n'
              '        for section in document.sections:\n',
              'AI export rights check',
          )
          export_block = replace_once(
              export_block,
              '                        "authorityTier": authority_tier_for_document(document),\n'
              '                        "status": document.status,\n',
              '                        "authorityTier": authority_tier_for_document(document),\n'
              '                        "rights": {\n'
              '                            "licenseId": processing_license_id,\n'
              '                            "allowsDerivativeProcessing": True,\n'
              '                        },\n'
              '                        "status": document.status,\n',
              'AI export rights payload',
          )
          text = text[:export_start] + export_block + text[export_end:]

          import_start = text.index('def import_chatgpt_responses(')
          entity_start = text.index(
              '    entities_by_id = {item.id: item for item in base.entities}\n', import_start
          )
          entity_end = text.index('\n        for proposal in response.facts:', entity_start)
          entity_block = r'''    entities_by_id = {item.id: item for item in base.entities}
    entity_id_by_identity: dict[tuple[str, ...], str] = {}
    external_entity_id_by_key: dict[tuple[str, str], str] = {}
    for item in base.entities:
        identity = _entity_identity_key(item.entity_type, item.canonical_name, item.medication)
        if identity is not None:
            previous = entity_id_by_identity.get(identity)
            if previous is not None and previous != item.id:
                raise ValueError(f"Duplicate safe entity identity for {item.canonical_name}.")
            entity_id_by_identity[identity] = item.id
        for namespace, value in item.external_ids.items():
            if not namespace.strip() or not value.strip():
                continue
            external_key = _external_id_key(namespace, value)
            previous = external_entity_id_by_key.get(external_key)
            if previous is not None and previous != item.id:
                raise ValueError(f"External id {namespace}:{value} maps to multiple entities.")
            external_entity_id_by_key[external_key] = item.id

    facts_by_id = {item.id: item for item in base.facts}
    relations_by_id = {item.id: item for item in base.relations}
    tasks_by_id = {item.id: item for item in base.review_tasks}

    for response in responses:
        document, section, chunk = chunk_map[response.task_id]
        source_authority = authority_tier_for_document(document)
        local_entities: dict[str, str] = {}
        for proposal in response.entities:
            normalized = normalize_surface_text(proposal.canonical_name)
            identity = _entity_identity_key(
                proposal.entity_type,
                proposal.canonical_name,
                proposal.medication,
            )
            matches: set[str] = set()
            if identity is not None:
                identity_match = entity_id_by_identity.get(identity)
                if identity_match is not None:
                    matches.add(identity_match)
            for namespace, value in proposal.external_ids.items():
                if not namespace.strip() or not value.strip():
                    continue
                external_match = external_entity_id_by_key.get(_external_id_key(namespace, value))
                if external_match is not None:
                    matches.add(external_match)
            if len(matches) > 1:
                raise ValueError(
                    f"Task {response.task_id} entity {proposal.key} has conflicting identity mappings."
                )
            if matches:
                entity_id = next(iter(matches))
            elif identity is not None:
                entity_id = _stable_id("entity", "|".join(identity))
            else:
                entity_id = _stable_id(
                    "entity",
                    f"unresolved|{proposal.entity_type}|{normalized}|"
                    f"{response.task_id}|{proposal.key}",
                )
            local_entities[proposal.key] = entity_id
            aliases = [KnowledgeName(name=value) for value in proposal.aliases]
            candidate = KnowledgeEntity(
                id=entity_id,
                entity_type=proposal.entity_type,
                canonical_name=proposal.canonical_name,
                names=aliases,
                external_ids=proposal.external_ids,
                medication=proposal.medication,
                metadata={
                    **proposal.metadata,
                    "generatedBy": "chatgpt-manual",
                    "firstTaskId": response.task_id,
                },
            )
            existing = entities_by_id.get(entity_id)
            if existing is None:
                entities_by_id[entity_id] = candidate
            else:
                _merge_entity(existing, candidate)

            if identity is not None:
                previous = entity_id_by_identity.get(identity)
                if previous is not None and previous != entity_id:
                    raise ValueError(
                        f"Task {response.task_id} identity maps to multiple entity ids."
                    )
                entity_id_by_identity[identity] = entity_id
            for namespace, value in proposal.external_ids.items():
                if not namespace.strip() or not value.strip():
                    continue
                external_key = _external_id_key(namespace, value)
                previous = external_entity_id_by_key.get(external_key)
                if previous is not None and previous != entity_id:
                    raise ValueError(
                        f"External id {namespace}:{value} maps to multiple entities."
                    )
                external_entity_id_by_key[external_key] = entity_id
'''
          text = text[:entity_start] + entity_block + text[entity_end:]
          knowledge_path.write_text(text, encoding='utf-8')

          tests_path = Path('tools/ingest/tests/test_knowledge.py')
          tests = tests_path.read_text(encoding='utf-8')
          tests = replace_once(
              tests,
              '    approve_knowledge,\n    import_chatgpt_responses,\n',
              '    approve_knowledge,\n    export_chatgpt_tasks,\n    import_chatgpt_responses,\n',
              'test import',
          )
          tests += r'''


def test_chatgpt_export_requires_derivative_processing_rights(
    tmp_path: Path, monkeypatch: pytest.MonkeyPatch
) -> None:
    source_documents = documents()
    source_documents[0].source_type = "official_label"
    source_documents[0].metadata = {}
    monkeypatch.setattr(
        "localmed_ingest.knowledge.load_workspace_documents", lambda _path: source_documents
    )
    output = tmp_path / "tasks.jsonl"
    with pytest.raises(ValueError, match="derivative-processing rights"):
        export_chatgpt_tasks(tmp_path, output)

    source_documents[0].metadata = {
        "rights": {
            "licenseId": "contract-1",
            "allowsDerivativeProcessing": True,
        }
    }
    assert export_chatgpt_tasks(tmp_path, output) == 1
    task = json.loads(output.read_text(encoding="utf-8"))
    assert task["source"]["rights"] == {
        "licenseId": "contract-1",
        "allowsDerivativeProcessing": True,
    }


def test_chatgpt_import_does_not_merge_medications_by_display_name(
    tmp_path: Path, monkeypatch: pytest.MonkeyPatch
) -> None:
    monkeypatch.setattr(
        "localmed_ingest.knowledge.load_workspace_documents", lambda _path: documents()
    )
    responses = tmp_path / "responses.jsonl"
    responses.write_text(
        json.dumps(
            {
                "schemaVersion": 1,
                "taskId": "chunk.demo",
                "entities": [
                    {
                        "key": "drug-5",
                        "entityType": "medication",
                        "canonicalName": "Препарат А",
                        "medication": {
                            "conceptLevel": "clinical-drug",
                            "inn": "вещество А",
                            "dosageForm": "таблетка",
                            "route": "oral",
                            "strength": "5 мг",
                        },
                    },
                    {
                        "key": "drug-10",
                        "entityType": "medication",
                        "canonicalName": "Препарат А",
                        "medication": {
                            "conceptLevel": "clinical-drug",
                            "inn": "вещество А",
                            "dosageForm": "таблетка",
                            "route": "oral",
                            "strength": "10 мг",
                        },
                    },
                ],
                "facts": [],
                "relations": [],
                "reviewTasks": [],
            },
            ensure_ascii=False,
        )
        + "\n",
        encoding="utf-8",
    )
    output = tmp_path / "knowledge.yaml"
    report = import_chatgpt_responses(tmp_path, responses, output)
    imported = KnowledgeWorkspace.model_validate(yaml.safe_load(output.read_text(encoding="utf-8")))
    assert report.entities == 2
    assert len({entity.id for entity in imported.entities}) == 2
    assert sorted(
        entity.medication.strength
        for entity in imported.entities
        if entity.medication is not None
    ) == ["10 мг", "5 мг"]
'''
          tests_path.write_text(tests, encoding='utf-8')

          docs_path = Path('docs/DRUG_KNOWLEDGE_PIPELINE.md')
          docs = docs_path.read_text(encoding='utf-8')
          docs = replace_once(
              docs,
              'A vendor-specific adapter should convert XML/JSON/CSV records into source-preserving Markdown plus metadata. It must not discard the original export.\n\n### 4. Export ChatGPT tasks\n',
              'A vendor-specific adapter should convert XML/JSON/CSV records into source-preserving Markdown plus metadata. It must not discard the original export.\n\n'
              'Every non-synthetic prepared document must also carry a fail-closed rights declaration in its source metadata:\n\n'
              '```yaml\nmetadata:\n  rights:\n    licenseId: contract-or-source-terms-id\n    allowsDerivativeProcessing: true\n```\n\n'
              '`medbase ai-export` refuses to emit any non-synthetic source without both fields. The resulting task repeats the licence ID and permission flag so the handoff remains auditable. Collection permission alone is not treated as permission to send text through ChatGPT.\n\n'
              '### 4. Export ChatGPT tasks\n',
              'rights documentation',
          )
          docs_path.write_text(docs, encoding='utf-8')

          example_path = Path('docs/examples/private-sources.yaml')
          example = example_path.read_text(encoding='utf-8')
          example = replace_once(
              example,
              '    metadata:\n      collection: personal-pilot\n',
              '    metadata:\n      collection: personal-pilot\n      rights:\n'
              '        licenseId: replace-with-reviewed-terms-id\n'
              '        allowsDerivativeProcessing: false\n',
              'private source rights example',
          )
          example_path.write_text(example, encoding='utf-8')
          PY

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true

      - name: Format and verify
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          uv sync --project tools/ingest --all-groups --locked
          pnpm check --write
          uv run --project tools/ingest ruff format tools/ingest/src tools/ingest/tests
          pnpm verify

      - name: Publish tested hardening
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-drug-knowledge-hardening.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(content): enforce source rights and medication identity'
          git push origin HEAD:agent/drug-knowledge-graph
