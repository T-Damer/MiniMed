name: One-shot add regulatory section types

on:
  push:
    branches:
      - agent/russian-regulatory-pilot
    paths:
      - .github/workflows/one-shot-add-regulatory-section-types.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/russian-regulatory-pilot
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/ingest/src/localmed_ingest/markdown_parser.py')
          text = path.read_text(encoding='utf-8')
          old = '''    rules = [
              ("дифференциаль", "differential-diagnosis"),
          '''.replace('              ', '        ')
          new = '''    rules = [
              ("круг", "eligibility"),
              ("соглас", "consent"),
              ("информирован", "information"),
              ("организац", "organization"),
              ("планирован", "planning"),
              ("срок", "timeline"),
              ("дифференциаль", "differential-diagnosis"),
          '''.replace('              ', '        ')
          if old not in text:
              raise SystemExit('section rule insertion point not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - run: |
          uv run --project tools/ingest ruff format \
            tools/ingest/src/localmed_ingest/markdown_parser.py \
            tools/ingest/tests/test_regulatory_sections.py
          uv run --project tools/ingest pytest tools/ingest/tests/test_regulatory_sections.py -q
      - run: rm .github/workflows/one-shot-add-regulatory-section-types.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tools/ingest/src/localmed_ingest/markdown_parser.py \
            tools/ingest/tests/test_regulatory_sections.py \
            .github/workflows/one-shot-add-regulatory-section-types.yml
          git commit -m "feat(regulatory): classify regulatory sections"
          git push origin HEAD:agent/russian-regulatory-pilot
