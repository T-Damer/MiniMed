name: Clean local model generated artifacts

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: cleanup-local-model-generated-artifacts
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/local-model-auto-selection'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - name: Restore generated outputs from main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout origin/main -- \
            apps/app/public/content/core-demo-report.json \
            apps/app/public/content/core-demo.db \
            data/build/clinical-case-benchmark.json \
            data/build/core-demo-report.json \
            data/build/core-demo.db \
            data/build/search-benchmark.json
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'chore(models): restore generated artifacts from main'
          git push origin HEAD:agent/local-model-auto-selection
