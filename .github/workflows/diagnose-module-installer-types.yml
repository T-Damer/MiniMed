name: Diagnose module installer types

on:
  pull_request:
    branches: [agent/content-module-catalog]
    paths:
      - .github/workflows/diagnose-module-installer-types.yml
      - packages/core/src/content-module-installer.ts
      - packages/core/tests/content-module-installer.test.ts
  push:
    branches:
      - agent/content-module-installer
    paths:
      - .github/workflows/diagnose-module-installer-types.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          set +e
          pnpm --filter @localmed/core typecheck > module-installer-types.txt 2>&1
          core_status=$?
          pnpm --filter @localmed/app typecheck >> module-installer-types.txt 2>&1
          app_status=$?
          printf '\ncore_status=%s\napp_status=%s\n' "$core_status" "$app_status" >> module-installer-types.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: module-installer-types
          path: module-installer-types.txt
          retention-days: 1
