name: Apply typed module failure stages

on:
  push:
    branches: [agent/doctor-datasets-model-diagnostics]
    paths:
      - .github/workflows/apply-module-failure-stage.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply focused product patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected patch anchor not found in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          contracts = 'packages/contracts/src/content-modules.ts'
          replace_exact(
