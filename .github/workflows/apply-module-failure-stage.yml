    const result = await installer.wait(task.id);

    expect(result.state).toBe('failed');
    expect(result.failureStage).toBe('cleanup');
    expect(result.errorMessage).toContain('checksum mismatch');
    expect(result.errorMessage).toContain('temporary storage unavailable');
