        cause instanceof Error ? cause.message : 'Module installation failed.';
      try {
        await this.backend.discardStaging(module.id, module.version);
      } catch (cleanupCause) {
        const cleanupMessage =
          cleanupCause instanceof Error ? cleanupCause.message : 'Unknown staging cleanup error.';
        return this.setTask(task.id, {
