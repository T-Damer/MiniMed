name: One-shot finish clinical search slice

on:
  push:
    branches:
      - agent/content-module-installer
    paths:
      - .github/workflows/one-shot-finish-clinical-search.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Patch parser, navigation and tests
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'missing patch target: {label}')
              return text.replace(old, new, 1)

          path = Path('apps/app/src/features/library/DocumentLibrary.tsx')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              "import { createMemo, createSignal, For, type JSX, onMount, Show } from 'solid-js';",
              "import { createMemo, createSignal, For, type JSX, onCleanup, onMount, Show } from 'solid-js';",
              'document library cleanup import',
          )
          text = replace_once(
              text,
              "import { ClinicalGlyph, documentClinicalSignals } from '../../components/ClinicalGlyph';\n",
              "import { ClinicalGlyph, documentClinicalSignals } from '../../components/ClinicalGlyph';\nimport { OPEN_DOCUMENT_EVENT } from '../../state/document-navigation';\n",
              'document navigation import',
          )
          old_mount = """  onMount(async () => {
    const result = await props.core.listDocuments();
    if (!result.ok) {
      setError(result.error.message);
      return;
    }
    setDocuments(result.value);
  });
"""
          new_mount = """  const handleOpenDocument = (event: Event): void => {
    const navigation = event as CustomEvent<string>;
    if (typeof navigation.detail !== 'string' || !navigation.detail) return;
    setMode('list');
    void openDocument(navigation.detail);
  };

  onMount(async () => {
    window.addEventListener(OPEN_DOCUMENT_EVENT, handleOpenDocument);
    const result = await props.core.listDocuments();
    if (!result.ok) {
      setError(result.error.message);
      return;
    }
    setDocuments(result.value);
  });

  onCleanup(() => window.removeEventListener(OPEN_DOCUMENT_EVENT, handleOpenDocument));
"""
          text = replace_once(text, old_mount, new_mount, 'document navigation listener')
          path.write_text(text, encoding='utf-8')

          path = Path('packages/search-lexical/src/analysis.ts')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              "import { lightStemRussian, normalizeSurfaceText, tokenize } from './normalize';\n",
              "import { lightStemRussian, normalizeSurfaceText, tokenize } from './normalize';\nimport symptomExpressions from './symptom-expressions.ru.json';\n",
              'symptom lexicon import',
          )
          text = replace_once(
              text,
              "  'вчера',\n  'позавчера',",
              "  'вчера',\n  'часто',\n  'быстро',\n  'дышит',\n  'дышать',\n  'позавчера',",
              'generic phrase tokens',
          )
          marker = "const SYMPTOM_PATTERNS: readonly {"
          lexicon_code = r"""interface SymptomExpressionEntry {
  readonly id: string;
  readonly canonical: string;
  readonly label: string;
  readonly system: string;
  readonly phrases: readonly string[];
}

const SYMPTOM_EXPRESSION_ENTRIES =
  symptomExpressions.entries as readonly SymptomExpressionEntry[];

function escapeExpression(value: string): string {
  return value
    .replace(/[.*+?^${}()|[\]\\]/gu, '\\$&')
    .replace(/[её]/gu, '[её]')
    .replace(/\s+/gu, '\\s+');
}

function extractSymptomExpressions(query: string, facts: QueryFact[]): void {
  const negativeRanges = facts
    .filter((fact) => fact.kind === 'negative-finding')
    .map((fact) => fact.range);
  for (const entry of SYMPTOM_EXPRESSION_ENTRIES) {
    for (const phrase of entry.phrases) {
      const pattern = new RegExp(
        `(?:^|[^а-яёa-z])(${escapeExpression(phrase)})(?=$|[^а-яёa-z])`,
        'giu',
      );
      for (const match of query.matchAll(pattern)) {
        const symptomRange = groupRange(match, 1);
        if (negativeRanges.some((negativeRange) => overlaps(negativeRange, symptomRange))) continue;
        addFact(facts, {
          kind: 'symptom',
          label: entry.label,
          value: match[1] ?? match[0],
          normalizedValue: entry.canonical,
          start: symptomRange.start,
          end: symptomRange.end,
        });
      }
    }
  }
}

"""
          text = replace_once(text, marker, lexicon_code + marker, 'symptom lexicon extractor')
          text = replace_once(
              text,
              "  extractNegations(query, aliases, facts);\n  extractSymptoms(query, facts);",
              "  extractNegations(query, aliases, facts);\n  extractSymptomExpressions(query, facts);\n  extractSymptoms(query, facts);",
              'symptom lexicon call',
          )
          text = replace_once(
              text,
              "  const hasTarget = /(?:лечени[ея]|терапи[яию]|при|для)\\s+[а-яa-z][а-яa-z-]{3,}/u.test(\n    normalizedQuery,\n  );\n",
              "  const hasTarget = /(?:лечени[ея]|терапи[яию]|при|для)\\s+[а-яa-z][а-яa-z-]{3,}/u.test(\n    normalizedQuery,\n  );\n  const neuroinfectionAmbiguity =\n    /(?:менингит|энцефалит|менингоэнцефалит|нейроинфекц)/u.test(normalizedQuery);\n\n  if (neuroinfectionAmbiguity) {\n    add(\n      suggestion(\n        'severity',\n        'Сознание и судороги',\n        'Сознание/судороги: ',\n        118,\n        'query-refinement',\n      ),\n    );\n    add(\n      suggestion(\n        'investigations',\n        'Менингеальные и очаговые признаки',\n        'Менингеальные/очаговые признаки: ',\n        116,\n        'query-refinement',\n      ),\n    );\n    add(\n      suggestion(\n        'context',\n        'Сыпь и гемодинамика',\n        'Сыпь/гемодинамика: ',\n        108,\n        'query-refinement',\n      ),\n    );\n  }\n",
              'neuroinfection suggestions',
          )
          text = replace_once(
              text,
              "  if (normalizedQuery.length > 4_000) {\n    warnings.push('Описание длинное: поиск выполнен по нескольким независимым веткам.');\n  }\n  return warnings;",
              "  if (normalizedQuery.length > 4_000) {\n    warnings.push('Описание длинное: поиск выполнен по нескольким независимым веткам.');\n  }\n  if (\n    /(?:менингит.*энцефалит|энцефалит.*менингит|менингоэнцефалит)/u.test(normalizedQuery)\n  ) {\n    warnings.push(\n      'Менингит и энцефалит могут перекрываться по симптомам: уточнения показаны, но поиск по диагнозам уже выполнен.',\n    );\n  }\n  return warnings;",
              'neuroinfection warning',
          )
          text = replace_once(
              text,
              "  return branches.slice(0, MAX_BRANCHES);\n}",
              "  if (/(?:как\\s+отличить|чем\\s+отличается|дифференциальн[а-я]*\\s+диагноз)/u.test(normalizedQuery)) {\n    const differential = makeBranch(\n      'differential',\n      'intent',\n      'Критерии дифференциальной диагностики',\n      query,\n      [normalizedQuery, 'дифференциальная диагностика отличия критерии'],\n      1.38,\n    );\n    if (differential) branches.unshift(differential);\n  }\n  if (\n    /(?:как\\s+диагностировать\\s+дальше|что\\s+(?:обследовать|проверить)|какие\\s+(?:анализы|обследования))/u.test(\n      normalizedQuery,\n    )\n  ) {\n    const nextDiagnostics = makeBranch(\n      'next-diagnostics',\n      'intent',\n      'Следующий этап диагностики',\n      query,\n      [normalizedQuery, 'диагностика обследование лабораторная инструментальная'],\n      1.4,\n    );\n    if (nextDiagnostics) branches.unshift(nextDiagnostics);\n  }\n  return branches.slice(0, MAX_BRANCHES);\n}",
              'diagnostic intent branches',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('packages/search-lexical/src/intent.ts')
          text = path.read_text(encoding='utf-8')
          diagnosis_marker = """  {
    intent: 'diagnosis',
    pattern: /(?:диагноз|дифференциальн|что\s+это|на\s+что\s+похож|причин[а-я]*\s+симптом)/u,
    weight: 4.5,
    label: 'прямой диагностический вопрос',
  },
"""
          diagnosis_insert = """  {
    intent: 'diagnosis',
    pattern:
      /(?:как\s+диагностировать\s+дальше|что\s+(?:обследовать|проверить)|какие\s+(?:анализы|обследования)|диагностическ[а-я]*\s+тактик)/u,
    weight: 5,
    label: 'следующий этап диагностики',
  },
  {
    intent: 'diagnosis',
    pattern: /(?:как\s+отличить|чем\s+отличается|дифференциальн[а-я]*\s+диагноз\s+с)/u,
    weight: 5,
    label: 'дифференциальный вопрос',
  },
""" + diagnosis_marker
          text = replace_once(text, diagnosis_marker, diagnosis_insert, 'expanded diagnostic intent')
          text = replace_once(
              text,
              "(?:сып[а-я]*|каш[а-я]*|лихорад[а-я]*|боль|рвот[а-я]*|диаре[а-я]*|одышк[а-я]*|зуд[а-я]*)",
              "(?:сып[а-я]*|каш[а-я]*|лихорад[а-я]*|боль|рвот[а-я]*|диаре[а-я]*|одышк[а-я]*|зуд[а-я]*|вздут[а-я]*|метеоризм|судорог[а-я]*|ригидн[а-я]*|сознани[а-я]*)",
              'expanded symptom signal',
          )
          text = replace_once(
              text,
              "    (primary === 'diagnosis' && normalized.length < 12);",
              "    (primary === 'diagnosis' && normalized.length < 12) ||\n    /(?:менингит.*энцефалит|энцефалит.*менингит|менингоэнцефалит)/u.test(normalized);",
              'ambiguous neuroinfection clarification',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('packages/search-lexical/tests/query.test.ts')
          text = path.read_text(encoding='utf-8')
          tests = r"""

  it('recognizes abdominal distension from the versioned Russian expression lexicon', () => {
    const plan = analyzeClinicalQuery('Вздутие живота 2 недели', aliases);
    expect(plan.analysis.facts).toEqual(
      expect.arrayContaining([
        expect.objectContaining({
          kind: 'symptom',
          normalizedValue: 'вздутие живота метеоризм',
        }),
        expect.objectContaining({ kind: 'duration', normalizedValue: '2 недели' }),
      ]),
    );
  });

  it('keeps neuroinfection results searchable while proposing discriminating clarifications', () => {
    const plan = analyzeClinicalQuery('Менингит или энцефалит у ребёнка', aliases);
    expect(plan.analysis.intent?.needsClarification).toBe(true);
    expect(plan.analysis.suggestions.map((item) => item.label)).toEqual(
      expect.arrayContaining([
        'Сознание и судороги',
        'Менингеальные и очаговые признаки',
        'Сыпь и гемодинамика',
      ]),
    );
    expect(plan.analysis.warnings.join(' ')).toContain('поиск по диагнозам уже выполнен');
    expect(plan.branches.length).toBeGreaterThan(0);
  });

  it('builds a dedicated next-diagnostics branch for a clinical question', () => {
    const plan = analyzeClinicalQuery(
      'Мальчик 5 лет, лихорадка и кашель. Как диагностировать дальше?',
      aliases,
    );
    expect(plan.analysis.intent?.primary).toBe('diagnosis');
    expect(plan.branches.map((branch) => branch.id)).toContain('next-diagnostics');
  });

  it('builds a differential branch for an explicit comparison request', () => {
    const plan = analyzeClinicalQuery('Как отличить пневмонию от бронхита?', aliases);
    expect(plan.branches.map((branch) => branch.id)).toContain('differential');
    expect(plan.analysis.intent?.matchedSignals).toContain('дифференциальный вопрос');
  });

  it('does not search the isolated word often when a tachypnea phrase is recognized', () => {
    const plan = analyzeClinicalQuery('Ребёнок часто дышит второй день', aliases);
    expect(plan.terms).not.toContain('часто');
    expect(plan.terms).toContain('тахипноэ');
  });
"""
          if not text.rstrip().endswith('});'):
              raise SystemExit('unexpected query test ending')
          text = text.rstrip()[:-3] + tests + '\n});\n'
          path.write_text(text, encoding='utf-8')

          path = Path('apps/app/e2e/search.spec.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace("'Архив и граф'", "'Архив и карта'")
          extra = r"""

 test('runs a debounced clinical search without requiring submit', async ({ page }) => {
   await mountBuiltApp(page);
   await page.getByTestId('search-input').fill(query);
   await expect(pneumoniaResult(page)).toBeVisible({ timeout: 3_000 });
 });

 test('filters the archive and opens a document with one click', async ({ page }) => {
   await mountBuiltApp(page);
   await page.getByRole('button', { name: 'Архив и карта' }).click();
   await page.getByPlaceholder('Название, специальность, тип источника…').fill('пневмония');
   await page.getByRole('button', { name: /Внебольничная пневмония/u }).click();
   await expect(page.getByRole('heading', { name: 'Внебольничная пневмония у детей' })).toBeVisible();
   await expect(page.getByLabel('Поиск внутри открытого документа')).toBeVisible();
 });

 test('opens only the exact fragment first and expands surrounding source context', async ({ page }) => {
   await mountBuiltApp(page);
   await page.getByTestId('search-input').fill(query);
   await expect(pneumoniaResult(page)).toBeVisible({ timeout: 3_000 });
   await page.getByTestId('search-result').first().click();
   await expect(page.locator('.source-paragraph')).toHaveCount(1);
   await page.getByRole('button', { name: 'Показать текст вокруг' }).click();
   expect(await page.locator('.source-paragraph').count()).toBeGreaterThan(1);
 });

 test('shows neuroinfection clarifications without hiding search results', async ({ page }) => {
   await mountBuiltApp(page);
   await page.getByTestId('search-input').fill('Менингит или энцефалит у ребёнка');
   await expect(page.getByRole('button', { name: /Сознание и судороги/u })).toBeVisible();
   await expect(page.getByTestId('search-results')).toBeVisible({ timeout: 3_000 });
 });
"""
          text += extra
          path.write_text(text, encoding='utf-8')
          PY
      - name: Format changed files
        run: >-
          pnpm exec biome check --write
          apps/app/src/app/App.tsx
          apps/app/src/components/AppGlyph.tsx
          apps/app/src/components/ClinicalGlyph.tsx
          apps/app/src/features/library/DocumentLibrary.tsx
          apps/app/src/features/library/KnowledgeGraph.tsx
          apps/app/src/features/modules/ModuleCatalogView.tsx
          apps/app/src/features/search/SearchWorkspace.tsx
          apps/app/src/main.tsx
          apps/app/src/state/document-navigation.ts
          apps/app/src/styles/clinical-ux.css
          apps/app/e2e/search.spec.ts
          packages/search-lexical/src/analysis.ts
          packages/search-lexical/src/intent.ts
          packages/search-lexical/src/symptom-expressions.ru.json
          packages/search-lexical/tests/query.test.ts
      - run: rm .github/workflows/one-shot-finish-clinical-search.yml
      - name: Commit formatted slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finish clinical search and archive UX"
          git push origin HEAD:agent/content-module-installer
