name: Validate official clinical registry

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/official-clinical-registry.yml
      - tools/catalogs/probe-clinical-registry.mjs
      - tools/catalogs/official-clinical-registry.trigger
      - tools/ingest/src/localmed_ingest/official_clinical_registry.py
      - tools/ingest/src/localmed_ingest/clinical_catalog_cli.py
      - tools/ingest/tests/test_official_clinical_registry.py
      - content/clinical-module-taxonomy.yaml
      - content/clinical-coverage-overrides.yaml

permissions:
  contents: read

concurrency:
  group: official-clinical-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/official-clinical-registry-export'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - run: pnpm exec playwright install chromium --with-deps
      - name: Verify the public registry request contract
        run: node tools/catalogs/probe-clinical-registry.mjs data/build/official-clinical-registry-probe
      - name: Validate collector code and offline fixtures
        run: |
          uv run --project tools/ingest ruff format --check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest ruff check tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pyright tools/ingest/src tools/ingest/tests
          uv run --project tools/ingest pytest tools/ingest/tests/test_official_clinical_registry.py
      - name: Collect all official recommendations
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/raw/official-clinical-registry data/build
          uv run --project tools/ingest medbase-clinical-catalog official-sync \
            --output data/raw/official-clinical-registry/catalog.json \
            --raw-output data/raw/official-clinical-registry/api-pages.json \
            --report data/build/official-clinical-registry-report.json \
            --page-size 200 \
            --max-pages 20 \
            --timeout-seconds 180
      - name: Build the complete categorized coverage ledger
        shell: bash
        run: |
          set -euo pipefail
          uv run --project tools/ingest medbase-clinical-catalog build \
            --source data/raw/official-clinical-registry/catalog.json \
            --taxonomy content/clinical-module-taxonomy.yaml \
            --overrides content/clinical-coverage-overrides.yaml \
            --output data/build/official-clinical-coverage-ledger.json
          uv run --project tools/ingest medbase-catalog-modules build \
            --ledger data/build/official-clinical-coverage-ledger.json \
            --output-root data/build/official-clinical-modules \
            --family clinical \
            --version 2026.07.official-preview.1
      - name: Compile every primary module into SQLite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/build/official-clinical-databases
          while IFS= read -r manifest; do
            workspace="$(dirname "$manifest")"
            stem="$(basename "$workspace")"
            uv run --project tools/ingest medbase lint --input "$workspace"
            uv run --project tools/ingest medbase build \
              --input "$workspace" \
              --output "data/build/official-clinical-databases/${stem}.db" \
              --report "data/build/official-clinical-databases/${stem}.report.json"
          done < <(find data/build/official-clinical-modules -mindepth 2 -maxdepth 2 \
            -name manifest.yaml -print | sort)
      - name: Enforce complete coverage and canonical ownership
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          registry = json.loads(
              Path('data/build/official-clinical-registry-report.json').read_text()
          )
          ledger = json.loads(
              Path('data/build/official-clinical-coverage-ledger.json').read_text()
          )
          modules = json.loads(
              Path('data/build/official-clinical-modules/module-build-report.json').read_text()
          )
          expected = registry['totalRecords']
          if expected < 700:
              raise SystemExit(f'Official registry unexpectedly contains only {expected} records.')
          if ledger['summary']['totalRecords'] != expected:
              raise SystemExit('Coverage ledger lost official registry records.')
          ids = [
              document_id
              for module in modules['modules']
              for document_id in module['documentIds']
          ]
          if modules['totalDocuments'] != expected or len(ids) != expected:
              raise SystemExit('Metadata module generation lost official registry records.')
          if len(ids) != len(set(ids)):
              raise SystemExit('Metadata module generation duplicated official registry records.')
          databases = list(Path('data/build/official-clinical-databases').glob('*.db'))
          if len(databases) != len(modules['modules']):
              raise SystemExit('Not every primary category produced a SQLite database.')
          print(json.dumps({
              'officialRecords': expected,
              'modules': len(modules['modules']),
              'databases': len(databases),
              'coverage': ledger['summary']['coverageCounts'],
              'status': ledger['summary']['statusCounts'],
          }, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: official-clinical-registry-validation
          path: |
            data/build/official-clinical-registry-probe
            data/raw/official-clinical-registry
            data/build/official-clinical-registry-report.json
            data/build/official-clinical-coverage-ledger.json
            data/build/official-clinical-modules/module-build-report.json
            data/build/official-clinical-databases/*.report.json
          if-no-files-found: error
