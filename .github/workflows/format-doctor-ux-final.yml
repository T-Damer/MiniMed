name: Final format doctor UX branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - name: Wire deterministic HTML preparation format
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          models = Path('tools/ingest/src/localmed_ingest/models.py')
          text = models.read_text(encoding='utf-8')
          text = text.replace(
              'Literal["auto", "pdf", "text", "markdown"]',
              'Literal["auto", "pdf", "text", "markdown", "html"]',
          )
          text = text.replace(
              'Literal["pdf", "text", "markdown"]',
              'Literal["pdf", "text", "markdown", "html"]',
          )
          models.write_text(text, encoding='utf-8')

          registry = Path('tools/ingest/src/localmed_ingest/source_registry.py')
          text = registry.read_text(encoding='utf-8')
          text = text.replace(
              'from .models import (',
              'from .html_import import extract_html\nfrom .models import (',
          )
          text = text.replace(
              'Literal["pdf", "text", "markdown"]:',
              'Literal["pdf", "text", "markdown", "html"]:',
          )
          text = text.replace(
              '    if suffix in {".md", ".markdown"}:\n        return "markdown"\n',
              '    if suffix in {".md", ".markdown"}:\n        return "markdown"\n'
              '    if suffix in {".html", ".htm"}:\n        return "html"\n',
          )
          text = text.replace(
              '    if source_format == "pdf":\n        return extract_pdf(path, source.extraction)\n'
              '    return extract_text(path, source_format)\n',
              '    if source_format == "pdf":\n        return extract_pdf(path, source.extraction)\n'
              '    if source_format == "html":\n        return extract_html(path)\n'
              '    return extract_text(path, source_format)\n',
          )
          registry.write_text(text, encoding='utf-8')
          PY
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check --write
      - run: pnpm typecheck
      - name: Publish final formatting
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: wire and format HTML ingestion'
          git push origin HEAD:agent/doctor-datasets-model-diagnostics
