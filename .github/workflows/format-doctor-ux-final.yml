name: Final format doctor UX branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'agent/doctor-datasets-model-diagnostics'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/doctor-datasets-model-diagnostics
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check --write
      - run: pnpm typecheck
      - name: Publish final formatting
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore: format doctor UX feature'
          git push origin HEAD:agent/doctor-datasets-model-diagnostics
