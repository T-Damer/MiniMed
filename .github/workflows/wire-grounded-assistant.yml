name: Wire grounded local assistant

on:
  pull_request:
    branches: [agent/drug-law-catalogs]

permissions:
  contents: write

jobs:
  wire-and-verify:
    if: github.event.pull_request.head.ref == 'agent/grounded-local-assistant'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/grounded-local-assistant
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Add structured-task controller methods and app composition
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          controller = Path('apps/app/src/features/models/controller.ts')
          text = controller.read_text(encoding='utf-8')
          old_import = '''  LocalModelSession,\n  LocalModelState,\n} from './types';'''
          new_import = '''  LocalModelSession,\n  LocalModelState,\n  LocalModelStructuredRequest,\n  LocalModelStructuredResponse,\n} from './types';'''
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          elif new_import not in text:
              raise SystemExit('Controller type import block was not found.')
          marker = '''  public modelById(modelId: string | null): LocalModelDescriptor | null {'''
          methods = '''  public canRunStructuredTasks(): boolean {\n    return this.state.phase === 'ready' && this.session !== null;\n  }\n\n  public async completeStructuredTask(\n    request: LocalModelStructuredRequest,\n  ): Promise<LocalModelStructuredResponse> {\n    const session = this.session;\n    if (!session || this.state.phase !== 'ready') {\n      throw new Error('Локальная модель не готова к обработке поиска.');\n    }\n    return session.completeStructured(request);\n  }\n\n'''
          if methods not in text:
              if marker not in text:
                  raise SystemExit('Controller modelById marker was not found.')
              text = text.replace(marker, methods + marker, 1)
          controller.write_text(text, encoding='utf-8')

          app = Path('apps/app/src/app/App.tsx')
          text = app.read_text(encoding='utf-8')
          import_marker = "import { LocalModelController } from '../features/models/controller';\n"
          imports = (
              import_marker
              + "import { GroundedAssistantStatus } from '../features/models/GroundedAssistantStatus';\n"
              + "import { GroundedMedicalCore } from '../features/models/GroundedMedicalCore';\n"
          )
          if "GroundedMedicalCore" not in text:
              if import_marker not in text:
                  raise SystemExit('App model-controller import marker was not found.')
              text = text.replace(import_marker, imports, 1)
          state_marker = '''  const modelController = createLocalModelController();\n  let coreToClose: MedicalCore | undefined;'''
          state_replacement = '''  const modelController = createLocalModelController();\n  const [assistantCore, setAssistantCore] = createSignal<GroundedMedicalCore>();\n  let coreToClose: MedicalCore | undefined;'''
          if state_marker in text:
              text = text.replace(state_marker, state_replacement, 1)
          elif state_replacement not in text:
              raise SystemExit('App model-controller state marker was not found.')
          replace_marker = '''    coreToClose = next.core;\n    setReady(next);\n  };'''
          replace_replacement = '''    coreToClose = next.core;\n    const assistant = assistantCore();\n    if (assistant) assistant.setBase(next.core);\n    else setAssistantCore(new GroundedMedicalCore(next.core, modelController));\n    setReady(next);\n  };'''
          if replace_marker in text:
              text = text.replace(replace_marker, replace_replacement, 1)
          elif replace_replacement not in text:
              raise SystemExit('App core replacement marker was not found.')
          init_marker = '''      coreToClose = initialized.core;\n      setReady(initialized);\n      void modelController.start();'''
          init_replacement = '''      coreToClose = initialized.core;\n      setAssistantCore(new GroundedMedicalCore(initialized.core, modelController));\n      setReady(initialized);\n      void modelController.start();'''
          if init_marker in text:
              text = text.replace(init_marker, init_replacement, 1)
          elif init_replacement not in text:
              raise SystemExit('App initialization marker was not found.')
          search_marker = '''                <SearchWorkspace core={state().core} />'''
          search_replacement = '''                <Show when={assistantCore()}>\n                  {(assistant) => <GroundedAssistantStatus assistant={assistant()} />}\n                </Show>\n                <SearchWorkspace core={assistantCore() ?? state().core} />'''
          if search_marker in text:
              text = text.replace(search_marker, search_replacement, 1)
          elif search_replacement not in text:
              raise SystemExit('App search workspace marker was not found.')
          app.write_text(text, encoding='utf-8')
          PY
      - name: Format and verify grounded assistant
        run: |
          pnpm check --write
          pnpm typecheck
          pnpm test:unit
          pnpm build
      - name: Publish integration
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/app/src
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'feat(models): wire grounded assistant into search'
          git push origin HEAD:agent/grounded-local-assistant
