name: Prepare MiniMed 0.3.2 release bump

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/bump-release-032.yml

permissions:
  contents: write

jobs:
  bump:
    if: github.head_ref == 'agent/content-module-installer'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/content-module-installer
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project tools/ingest --all-groups --locked
      - name: Apply release version
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path('.')
          for path in root.rglob('package.json'):
              if 'node_modules' in path.parts:
                  continue
              data = json.loads(path.read_text(encoding='utf-8'))
              if data.get('version') == '0.3.1':
                  data['version'] = '0.3.2'
                  path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          android = Path('apps/app/android/app/build.gradle')
          text = android.read_text(encoding='utf-8')
          text = text.replace('versionCode 9', 'versionCode 10')
          text = text.replace('versionName "0.3.1"', 'versionName "0.3.2"')
          android.write_text(text, encoding='utf-8')

          ios = Path('apps/app/ios/App/App.xcodeproj/project.pbxproj')
          text = ios.read_text(encoding='utf-8')
          text = text.replace('CURRENT_PROJECT_VERSION = 9;', 'CURRENT_PROJECT_VERSION = 10;')
          text = text.replace('MARKETING_VERSION = 0.3.1;', 'MARKETING_VERSION = 0.3.2;')
          ios.write_text(text, encoding='utf-8')

          for path in [
              Path('content/fixtures/manifest.yaml'),
              Path('content/pilot-rf/manifest.yaml'),
              Path('content/regulatory-rf-pilot/manifest.yaml'),
          ]:
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'(?m)^version:\s*0\.3\.1\s*$', 'version: 0.3.2', text)
              path.write_text(text, encoding='utf-8')

          state = Path('docs/CURRENT_STATE.md')
          text = state.read_text(encoding='utf-8')
          text = text.replace('Updated: 21 July 2026', 'Updated: 22 July 2026')
          text = text.replace('Repository version: `0.3.1`', 'Repository version: `0.3.2`')
          text = text.replace('monolithic `0.3.1` pilot', 'monolithic `0.3.2` pilot')
          state.write_text(text, encoding='utf-8')

          modules = Path('apps/app/src/features/modules/ModuleCatalogView.tsx')
          text = modules.read_text(encoding='utf-8').replace('Текущее состояние 0.3.1', 'Текущее состояние 0.3.2')
          modules.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          section = '''## [0.3.2] - 2026-07-22

### Added

- A modular-content foundation with a validated GitHub catalog, multi-store routing, rollback records, and a portable atomic installer state machine.
- A searchable document archive, direct document opening, readable medical-domain map, sticky document reader, and local document filtering.
- A versioned Russian symptom-expression lexicon covering abdominal distension, respiratory wording, and neuroinfection-related signs.
- Non-blocking clinical clarifications for ambiguous neuroinfection queries, dedicated next-diagnostics and differential branches, and 500 ms debounced search.
- Phosphor-style local medical glyphs, passive module-update badges, compact progressive search results, exact-fragment source reading, and scroll-to-top navigation.

### Changed

- Search results now show one best fragment per document first; additional matches, surrounding context, and the full document are opened progressively.
- Current medication remains visible as patient context but no longer acts as a diagnostic symptom in patient-case retrieval.
- Android and iOS application versions, workspace packages, and content-pack manifests are aligned to 0.3.2 with native build number 10.
- Module updates never interrupt the clinical search flow; availability is indicated only on the Modules icon and page.

### Verification boundary

- The portable installer is tested with injected downloader, staging, validator, registry, and rollback adapters; real Android/iOS filesystem downloads and WorkManager notifications remain a later slice.
- The application still embeds the existing 15-document pilot pack. Full extracted recommendations, structured tables, source PDFs, and dedicated medication cards remain planned modular artifacts.
- The query parser and retrieval are deterministic and source-grounded. A local neural reranker or generative model is not included in this release.

'''
          marker = '## [0.3.1] - 2026-07-21\n'
          if '## [0.3.2] - 2026-07-22' not in text:
              text = text.replace(marker, section + marker)
          changelog.write_text(text, encoding='utf-8')
          PY
      - run: pnpm content:compile
      - run: pnpm check --write
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm benchmark:all
      - run: |
          rm -f .github/workflows/bump-release-032.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'release: prepare MiniMed 0.3.2'
          git push origin HEAD:agent/content-module-installer
