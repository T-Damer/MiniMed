name: Diagnose final local model checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: diagnose-final-local-model
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/local-model-auto-selection'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/local-model-auto-selection
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format and validate
        shell: bash
        run: |
          set +e
          pnpm check:write >/tmp/model-write.log 2>&1
          write_status=$?
          pnpm check >/tmp/model-check.log 2>&1
          check_status=$?
          pnpm typecheck >/tmp/model-typecheck.log 2>&1
          type_status=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$check_status" -eq 0 ] && [ "$type_status" -eq 0 ]; then
            rm -f .agent-model-final.md
            rm -f .github/workflows/diagnose-local-model-final.yml
            git add -A
            git commit -m 'style(models): format hardened model harness'
            git push origin HEAD:agent/local-model-auto-selection
            exit 0
          fi
          {
            echo '# Final local model validation failure'
            echo
            echo "Run: $GITHUB_RUN_ID"
            echo
            echo "check:write=$write_status check=$check_status typecheck=$type_status"
            echo
            echo '## Biome'
            echo '```text'
            tail -n 500 /tmp/model-check.log
            echo '```'
            echo
            echo '## TypeScript'
            echo '```text'
            tail -n 500 /tmp/model-typecheck.log
            echo '```'
          } >.agent-model-final.md
          git add -A
          git commit -m 'chore(ci): record final local model failure'
          git push origin HEAD:agent/local-model-auto-selection
          exit 1
