name: Validate full-source pull request

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/validate-full-source-pr.yml
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: validate-full-source-pr
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name != 'issues' || (github.event.issue.user.login == 'T-Damer' && github.event.issue.title == '[ci] Validate full MiniMed source')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Report validation run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment 14 --body "Full-source validation run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} (run_id=${GITHUB_RUN_ID})."

      - name: Check out full-source branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-source-0.3.0-alpha.1
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.10.0'
          enable-cache: true

      - name: Install locked dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile 2>&1 | tee install-js.log
          uv sync --project tools/ingest --all-groups --locked 2>&1 | tee install-python.log

      - name: Run repository verification
        shell: bash
        run: |
          set -euo pipefail
          pnpm verify 2>&1 | tee verify.log

      - name: Run Chromium E2E
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec playwright install --with-deps chromium 2>&1 | tee playwright-install.log
          pnpm test:e2e 2>&1 | tee e2e.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-source-validation-logs
          if-no-files-found: warn
          retention-days: 14
          path: |
            install-js.log
            install-python.log
            verify.log
            playwright-install.log
            e2e.log
            data/build/*report*.json
            data/build/*benchmark*.json
            playwright-report/**
            test-results/**

      - name: Close successful trigger issue
        if: github.event_name == 'issues' && success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "${{ github.event.issue.number }}" --comment "Full-source validation succeeded. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
